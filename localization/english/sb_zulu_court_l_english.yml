l_english:
sb_zulu_court.200.t:0 "Rumors in the Royal Household"
sb_zulu_court.200.d:0 "Stories now pass from homestead to regiment that another branch of the royal house may yet hold the stronger claim. Such talk can be smothered, but not without cost."
sb_zulu_court.200.f:0 "A rumor of succession is never merely a rumor. In a royal house it is the beginning of a faction."
sb_zulu_court.200.a:0 "Silence the whispers."
sb_zulu_court.200.b:0 "Let them talk."
sb_zulu_court.201.t:0 "Regiments Demand Cattle"
sb_zulu_court.201.d:0 "Several amabutho complain that their cattle dues and wartime expectations have not been honored. To satisfy them would steady the king's standing among the regiments, but it would come at real cost."
sb_zulu_court.201.f:0 "A regiment that believes itself cheated does not forget the slight, least of all once it is under arms."
sb_zulu_court.201.a:0 "Pay what is owed."
sb_zulu_court.201.b:0 "They must endure it."
sb_zulu_court.202.t:0 "Factions in the Great House"
sb_zulu_court.202.d:0 "Senior women of the royal household and their allies are pressing competing claims at court. To back one side might quiet the palace for a time, but it would also feed jealousies elsewhere."
sb_zulu_court.202.f:0 "The throne is not held only in the cattle kraal. It is bargained over in the royal homestead."
sb_zulu_court.202.a:0 "Buy peace."
sb_zulu_court.202.b:0 "Balance the factions."
sb_zulu_court.203.t:0 "Coastal Traders"
sb_zulu_court.203.d:0 "Coastal intermediaries offer access to more firearms and powder if the court will tolerate their growing influence. The bargain could strengthen the chiefdom's military modernization, but it would also loosen royal control over the coast."
sb_zulu_court.203.f:0 "The king might buy guns, but the coast always named a price of its own."
sb_zulu_court.203.a:0 "Take the guns."
sb_zulu_court.203.b:0 "Tighten the leash."
