l_english:
 sb_zulu_court.200.t:0 "Rumors in the Royal House"
 sb_zulu_court.200.d:0 "Stories now pass from homestead to regiment that another branch of the royal house may yet hold the stronger claim. Such talk can be smothered, but not for free."
 sb_zulu_court.200.f:0 "\"A rumor about succession is never only a rumor.\""
 sb_zulu_court.200.a:0 "Silence the whispers with gifts and cattle."
 sb_zulu_court.200.b:0 "Let them talk; loyalty must be earned openly."
 sb_zulu_court.201.t:0 "The Regiments Demand Cattle"
 sb_zulu_court.201.d:0 "Several amabutho complain that their cattle dues and wartime expectations have not been honored. To satisfy them would steady the king's standing among the regiments, but it would come at real cost."
 sb_zulu_court.201.f:0 "\"A regiment that feels cheated does not forget it on the march.\""
 sb_zulu_court.201.a:0 "Pay what is owed and keep the regiments loyal."
 sb_zulu_court.201.b:0 "The treasury cannot indulge every complaint."
 sb_zulu_court.202.t:0 "Factions in the Great House"
 sb_zulu_court.202.d:0 "Senior women of the royal household and their allies are pressing competing claims at court. To back one side might quiet the palace for a time, but it would also feed jealousies elsewhere."
 sb_zulu_court.202.f:0 "\"The throne is not only held in the cattle kraal; it is bargained over in the royal homestead as well.\""
 sb_zulu_court.202.a:0 "Buy peace in the court."
 sb_zulu_court.202.b:0 "Balance the factions and trust the king's prestige."
 sb_zulu_court.203.t:0 "Traders on the Coast"
 sb_zulu_court.203.d:0 "Coastal intermediaries offer access to more firearms and powder if the court will tolerate their growing influence. The bargain could strengthen the chiefdom's military modernization, but it would also loosen royal control over the coast."
 sb_zulu_court.203.f:0 "\"The king may buy guns, but the coast always asks its own price.\""
 sb_zulu_court.203.a:0 "Take the guns and tolerate the traders."
 sb_zulu_court.203.b:0 "Keep the coast on a tighter leash."
