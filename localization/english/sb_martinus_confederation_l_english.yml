l_english:
 dp_sb_martinus_humiliation:0 "Pretorius Standoff"
 dp_sb_martinus_humiliation_desc:0 "A coercive diplomatic play over Martinus Pretorius' claim to the Orange Free State presidency."
 dp_sb_martinus_humiliation_tooltip:0 "Launch a locked diplomatic play with [concept_humiliation] at stake on both sides."

 sb_martinus_confederation.001.t:0 "The Cape Alignment"
 sb_martinus_confederation.001.d:0 "The Orange Free State now sits inside Britain's imperial orbit, but London would rather not police the interior alone. Cape ministers argue that a closer constitutional link to Cape Town would stabilize the frontier, secure trade routes, and keep the Free State from drifting into Transvaal politics."
 sb_martinus_confederation.001.f:0 ""Responsible government may be local, but the imperial road still runs through Cape Town.""
 sb_martinus_confederation.001.a:0 "Accept Cape alignment"
 sb_martinus_confederation.001.b:0 "Keep the republic separate"

 sb_martinus_confederation.010.t:0 "Martinus Pretorius' Ambition"
 sb_martinus_confederation.010.d:0 "Martinus Wessel Pretorius, son of the late Andries Pretorius, has made himself the central figure of the Transvaal republic. His supporters now speak of the Orange Free State as the missing half of a wider Boer settlement, and of a shared presidency as the first step toward unity across the Vaal."
 sb_martinus_confederation.010.f:0 ""If the Voortrekkers crossed the mountains as one people, why should they remain divided by the river?""
 sb_martinus_confederation.010.a:0 "Send an expedition to press the claim"
 sb_martinus_confederation.010.b:0 "Revoke the claim"

 sb_martinus_confederation.020.t:0 "Pretorius Presses His Claim"
 sb_martinus_confederation.020.d:0 "Transvaal envoys have arrived in Bloemfontein with Pretorius' claim to the presidency. The demand is dressed as republican unity, but everyone understands the pressure behind it: accept a dual presidency now, or rally the commandos before the Transvaal turns a claim into a crisis."
 sb_martinus_confederation.020.f:0 ""A presidency granted under pressure is still a presidency, and a refusal may yet become a war.""
 sb_martinus_confederation.020.a:0 "Rally the commandos"
 sb_martinus_confederation.020.b:0 "Give in to Pretorius"

 sb_martinus_confederation.030.t:0 "The Free State Calls"
 sb_martinus_confederation.030.d:0 "The Orange Free State has asked Lydenburg to stand against Pretorius' pressure. Supporting Bloemfontein may preserve the independence of the frontier republics; standing aside may leave the Transvaal president free to decide the shape of Boer politics."
 sb_martinus_confederation.030.f:0 ""A frontier republic chooses its friends carefully, and its enemies more carefully still.""
 sb_martinus_confederation.030.a:0 "Support the Orange Free State"
 sb_martinus_confederation.030.b:0 "Give Martinus free rein"

 sb_martinus_confederation.031.t:0 "The Free State Calls"
 sb_martinus_confederation.031.d:0 "The Orange Free State has asked Zoutpansberg to stand against Pretorius' pressure. The appeal is blunt: either help Bloemfontein resist a dual presidency, or accept that the Transvaal may speak for the frontier republics."
 sb_martinus_confederation.031.f:0 ""The northern frontier is distant from Bloemfontein, but not distant from the consequences.""
 sb_martinus_confederation.031.a:0 "Support the Orange Free State"
 sb_martinus_confederation.031.b:0 "Give Martinus free rein"

 sb_martinus_confederation.041.t:0 "The Orange Free State Alone"
 sb_martinus_confederation.041.d:0 "The Orange Free State has rallied its commandos, but no other Boer republic has committed to its side. Pretorius can still force the issue, though a compromise would preserve his claim without risking a frontier war."
 sb_martinus_confederation.041.f:0 ""A threat unbacked may still carry weight, but it carries less certainty.""
 sb_martinus_confederation.041.a:0 "Force the issue"
 sb_martinus_confederation.041.b:0 "Reach a compromise"

 sb_martinus_confederation.042.t:0 "Lydenburg Backs the Free State"
 sb_martinus_confederation.042.d:0 "Lydenburg has backed the Orange Free State against Martinus Pretorius. What began as a presidential claim is now a test of whether the smaller republics will accept Transvaal leadership or defend a looser Boer frontier."
 sb_martinus_confederation.042.f:0 ""One ally can turn a claim into a crisis.""

 sb_martinus_confederation.043.t:0 "Zoutpansberg Backs the Free State"
 sb_martinus_confederation.043.d:0 "Zoutpansberg has backed the Orange Free State against Martinus Pretorius. The northern republic's support gives Bloemfontein room to resist, but it also turns a dispute over offices into a wider frontier confrontation."
 sb_martinus_confederation.043.f:0 ""One ally can turn a claim into a crisis.""

 sb_martinus_confederation.044.t:0 "The Frontier Backs the Free State"
 sb_martinus_confederation.044.d:0 "Both Lydenburg and Zoutpansberg have backed the Orange Free State. Pretorius can still force the issue, but he would no longer be facing Bloemfontein alone; the crisis has become a general Boer standoff."
 sb_martinus_confederation.044.f:0 ""A presidency claimed by one republic may be resisted by many.""

 sb_martinus_confederation.050.t:0 "The Final Demand"
 sb_martinus_confederation.050.d:0 "Pretorius has forced the issue. Accepting the dual presidency would avoid bloodshed while placing the Free State inside his political orbit; refusing means meeting the Transvaal and its supporters in a contest of republican honor."
 sb_martinus_confederation.050.f:0 ""There are times when compromise is only another word for surrender.""
 sb_martinus_confederation.050.a:0 "Accept the dual presidency"
 sb_martinus_confederation.050.b:0 "Fight for the republic"

 sb_martinus_confederation.080.t:0 "The Free State Nomination"
 sb_martinus_confederation.080.d:0 "The Orange Free State's Groot Boere have nominated Marthinus Wessel Pretorius as their leader in the election campaign. Son of Andries Pretorius and president of the Transvaal, he now presents himself as the lawful bridge between the republics: not a conqueror crossing the Vaal, but a candidate invited by Bloemfontein's own notables."
 sb_martinus_confederation.080.f:0 ""A commandant may force a frontier. A president must be elected by one.""
 sb_martinus_confederation.080.a:0 "The Free State has opened the road."

 sb_martinus_confederation.081.t:0 "Pretorius and the Groot Boere"
 sb_martinus_confederation.081.d:0 "The Groot Boere have rallied around Marthinus Wessel Pretorius. To his supporters, a shared presidency with the Transvaal promises order, recognition, and a stronger Boer voice between Cape Town and the interior. To his opponents, it threatens to make the Orange Free State a republic in name and a Transvaal appendage in fact."
 sb_martinus_confederation.081.f:0 ""Let the voters decide whether one man may carry two republics.""
 sb_martinus_confederation.081.a:0 "Let the campaign decide."

 sb_martinus_confederation.090.t:0 "A Boer Confederation"
 sb_martinus_confederation.090.d:0 "The dual presidency has held long enough for a deeper settlement to be proposed. The Orange Free State would retain its institutions, but diplomacy and key laws would be drawn into a durable Boer confederation under Transvaal leadership."
 sb_martinus_confederation.090.f:0 ""A union of presidents can become a union of republics.""
 sb_martinus_confederation.090.a:0 "Deepen the union"
 sb_martinus_confederation.090.b:0 "Preserve the dual presidency for now"

 sb_martinus_confederation.110.t:0 "The Boer Confederation"
 sb_martinus_confederation.110.d:0 "The Transvaal has converted its dual presidency with the Orange Free State into a deeper confederal arrangement. British recognition and trade-through agreements now sit beside a Boer federation that London did not authorize."
 sb_martinus_confederation.110.f:0 ""Recognition is not a blank cheque.""
 sb_martinus_confederation.110.a:0 "Let it be"
 sb_martinus_confederation.110.b:0 "Threaten recognition and trade-through"

 sb_martinus_confederation.111.t:0 "Britain Threatens Recognition"
 sb_martinus_confederation.111.d:0 "Britain has threatened to revisit recognition and trade-through arrangements unless the confederation is halted. Backing down preserves the British connection; standing firm risks isolation unless another Great Power is willing to shield the republic."
 sb_martinus_confederation.111.f:0 ""A frontier republic can be recognized by treaty, but it must survive by strength.""
 sb_martinus_confederation.111.a:0 "Back down"
 sb_martinus_confederation.111.b:0 "Stand firm"

 sb_ora_republican_defiance:0 "Republican Defiance"
 sb_ora_republican_defiance_desc:0 "The republic has rejected Cape alignment and rallied its frontier institutions."
 sb_martinus_claim_revoked:0 "Claim Revoked"
 sb_martinus_claim_revoked_desc:0 "The government has stepped back from Pretorius' wider republican claim."
 sb_martinus_mutual_recognition:0 "Mutual Recognition"
 sb_martinus_mutual_recognition_desc:0 "The Boer republics have settled the crisis through mutual recognition."
 sb_martinus_free_state_mandate:0 "Free State Mandate"
 sb_martinus_free_state_mandate_desc:0 "Marthinus Wessel Pretorius is buoyed by Orange Free State support for his wider republican claim."
 sb_ora_pretorius_groot_boere_campaign:0 "Pretorius Campaign"
 sb_ora_pretorius_groot_boere_campaign_desc:0 "The Groot Boere have rallied behind Marthinus Wessel Pretorius during the election campaign."
 sb_ora_separate_republic:0 "Separate Republic"
 sb_ora_separate_republic_desc:0 "The republic has rejected Marthinus Pretorius' legal-union offer."
 sb_gbr_ignored_boer_confederation:0 "Ignored Boer Confederation"
 sb_gbr_ignored_boer_confederation_desc:0 "Britain has chosen not to challenge the Boer confederal settlement."
 sb_trn_confederation_backdown:0 "Confederation Halted"
 sb_trn_confederation_backdown_desc:0 "The government has backed down under British pressure."
 sb_trn_confederation_stood_firm:0 "Confederation Stands Firm"
 sb_trn_confederation_stood_firm_desc:0 "The government has stood firm despite British threats to recognition and trade-through."
