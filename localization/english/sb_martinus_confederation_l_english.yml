l_english:
 dp_sb_martinus_humiliation:0 "Martinus Pretorius Standoff"
 dp_sb_martinus_humiliation_desc:0 "A coercive diplomatic play over Martinus Pretorius' claim to wider Boer leadership."
 dp_sb_martinus_humiliation_tooltip:0 "Start a locked humiliation play over Martinus Pretorius' claim."

 sb_martinus_confederation.001.t:0 "A Cape Alignment"
 sb_martinus_confederation.001.d:0 "With the Orange Free State drawn into Britain's power bloc, Cape politicians have opened the question of whether the republic should accept a closer constitutional link to Cape Town rather than drift into the Transvaal's orbit."
 sb_martinus_confederation.001.f:0 ""There is order in responsible government, but not without a price.""
 sb_martinus_confederation.001.a:0 "Accept Cape alignment."
 sb_martinus_confederation.001.b:0 "Keep the republic separate."

 sb_martinus_confederation.010.t:0 "Martinus' Ambition"
 sb_martinus_confederation.010.d:0 "President Martinus Pretorius speaks openly of a wider Boer settlement. The Orange Free State remains separate, but the idea of a shared presidency has begun to harden into a claim."
 sb_martinus_confederation.010.f:0 ""One volk cannot keep two futures forever.""
 sb_martinus_confederation.010.a:0 "Send an expedition to press the claim."
 sb_martinus_confederation.010.b:0 "Revoke the claim."

 sb_martinus_confederation.020.t:0 "Pretorius Presses His Claim"
 sb_martinus_confederation.020.d:0 "Transvaal envoys have arrived with Martinus Pretorius' claim to the presidency. The republic can rally the commandos and call for Boer support, or concede the dual presidency before the issue turns violent."
 sb_martinus_confederation.020.f:0 ""A presidency granted under pressure is still a presidency.""
 sb_martinus_confederation.020.a:0 "Rally the commandos."
 sb_martinus_confederation.020.b:0 "Give in to Pretorius."

 sb_martinus_confederation.030.t:0 "The Free State Calls"
 sb_martinus_confederation.030.d:0 "The Orange Free State has asked whether Lydenburg will support its resistance to Pretorius' pressure, or allow the Transvaal leader free reign."
 sb_martinus_confederation.030.f:0 ""A frontier republic chooses its friends carefully.""
 sb_martinus_confederation.030.a:0 "Support the Orange Free State."
 sb_martinus_confederation.030.b:0 "Give Martinus free reign."

 sb_martinus_confederation.031.t:0 "The Free State Calls"
 sb_martinus_confederation.031.d:0 "The Orange Free State has asked whether Zoutpansberg will support its resistance to Pretorius' pressure, or allow the Transvaal leader free reign."
 sb_martinus_confederation.031.f:0 ""A frontier republic chooses its friends carefully.""
 sb_martinus_confederation.031.a:0 "Support the Orange Free State."
 sb_martinus_confederation.031.b:0 "Give Martinus free reign."

 sb_martinus_confederation.041.t:0 "The Orange Free State Alone"
 sb_martinus_confederation.041.d:0 "The Orange Free State has rallied, but no other Boer republic has committed to its side. Martinus can force the issue or accept a compromise."
 sb_martinus_confederation.041.f:0 ""A threat unbacked may still carry weight.""
 sb_martinus_confederation.041.a:0 "Force the issue."
 sb_martinus_confederation.041.b:0 "Reach a compromise."

 sb_martinus_confederation.042.t:0 "Lydenburg Backs the Free State"
 sb_martinus_confederation.042.d:0 "Lydenburg has backed the Orange Free State against Martinus Pretorius. The standoff now risks dividing the Boer frontier."
 sb_martinus_confederation.042.f:0 ""One ally can turn a claim into a crisis.""

 sb_martinus_confederation.043.t:0 "Zoutpansberg Backs the Free State"
 sb_martinus_confederation.043.d:0 "Zoutpansberg has backed the Orange Free State against Martinus Pretorius. The standoff now risks dividing the Boer frontier."
 sb_martinus_confederation.043.f:0 ""One ally can turn a claim into a crisis.""

 sb_martinus_confederation.044.t:0 "The Frontier Backs the Free State"
 sb_martinus_confederation.044.d:0 "Both Lydenburg and Zoutpansberg have backed the Orange Free State. Martinus can still force the issue, but the crisis has become a general Boer standoff."
 sb_martinus_confederation.044.f:0 ""A presidency claimed by one republic may be resisted by many.""

 sb_martinus_confederation.050.t:0 "The Final Demand"
 sb_martinus_confederation.050.d:0 "Pretorius has forced the issue. The Orange Free State must either accept the dual presidency or fight to preserve its separate course."
 sb_martinus_confederation.050.f:0 ""There are times when compromise is only another word for surrender.""
 sb_martinus_confederation.050.a:0 "Give in."
 sb_martinus_confederation.050.b:0 "Fight."

 sb_martinus_confederation.080.t:0 "An Election for Union"
 sb_martinus_confederation.080.d:0 "With the Transvaal consolidated and Martinus Pretorius still in office, his supporters have presented the Orange Free State election as a legal route to union under a shared presidency."
 sb_martinus_confederation.080.f:0 ""If union cannot be marched into being, perhaps it can be voted into office.""
 sb_martinus_confederation.080.a:0 "Accept Martinus."
 sb_martinus_confederation.080.b:0 "Reject Martinus."

 sb_martinus_confederation.090.t:0 "A Boer Confederation"
 sb_martinus_confederation.090.d:0 "The dual presidency has held long enough for a deeper settlement to be proposed: a durable Boer confederation, with the Orange Free State retaining its institutions while aligning its laws and diplomacy to the Transvaal."
 sb_martinus_confederation.090.f:0 ""A union of presidents can become a union of republics.""
 sb_martinus_confederation.090.a:0 "Deepen the union."
 sb_martinus_confederation.090.b:0 "Preserve the dual presidency for now."

 sb_martinus_confederation.110.t:0 "The Boer Confederation"
 sb_martinus_confederation.110.d:0 "The Transvaal has converted its dual presidency with the Orange Free State into a deeper confederal arrangement. British recognition and trade-through agreements now sit beside a Boer federation that London did not authorize."
 sb_martinus_confederation.110.f:0 ""Recognition is not a blank cheque.""
 sb_martinus_confederation.110.a:0 "Let it be."
 sb_martinus_confederation.110.b:0 "Threaten recognition and trade-through."

 sb_martinus_confederation.111.t:0 "Britain Threatens Recognition"
 sb_martinus_confederation.111.d:0 "Britain has threatened to revisit recognition and trade-through arrangements unless the confederation is halted. Backing down preserves the British connection; standing firm risks isolation."
 sb_martinus_confederation.111.f:0 ""A frontier republic can be recognized by treaty, but it must survive by strength.""
 sb_martinus_confederation.111.a:0 "Back down."
 sb_martinus_confederation.111.b:0 "Stand firm."

 sb_ora_republican_defiance:0 "Republican Defiance"
 sb_ora_republican_defiance_desc:0 "The republic has rejected Cape alignment and rallied its frontier institutions."
 sb_martinus_claim_revoked:0 "Claim Revoked"
 sb_martinus_claim_revoked_desc:0 "The government has stepped back from Pretorius' wider republican claim."
 sb_martinus_mutual_recognition:0 "Mutual Recognition"
 sb_martinus_mutual_recognition_desc:0 "The Boer republics have settled the crisis through mutual recognition."
 sb_ora_separate_republic:0 "Separate Republic"
 sb_ora_separate_republic_desc:0 "The republic has rejected Martinus Pretorius' legal-union offer."
 sb_gbr_ignored_boer_confederation:0 "Ignored Boer Confederation"
 sb_gbr_ignored_boer_confederation_desc:0 "Britain has chosen not to challenge the Boer confederal settlement."
 sb_trn_confederation_backdown:0 "Confederation Halted"
 sb_trn_confederation_backdown_desc:0 "The government has backed down under British pressure."
 sb_trn_confederation_stood_firm:0 "Confederation Stands Firm"
 sb_trn_confederation_stood_firm_desc:0 "The government has stood firm despite British threats to recognition and trade-through."
