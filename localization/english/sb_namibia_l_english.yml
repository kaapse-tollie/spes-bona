l_english:
 SWA: "South West Africa"
 SWA_ADJ: "South West African"
 dyn_c_sb_german_south_west_africa: "German South West Africa"
 dyn_c_sb_german_south_west_africa_adj: "German South West African"
 dyn_c_sb_south_west_africa: "South West Africa"
 dyn_c_sb_south_west_africa_adj: "South West African"

 sb_nam_rule_harshness_bar: "Rule Harshness"
 sb_nam_rule_harshness_bar_soft: "Accommodating"
 sb_nam_rule_harshness_bar_harsh: "Harsh"

 je_sb_consolidation_of_south_west_africa: "Consolidation of South West Africa"
 je_sb_consolidation_of_south_west_africa_reason: "With both coastal gateways in one pair of hands, the South West African footholds can now be consolidated into a coherent colonial order."
 je_sb_consolidation_of_south_west_africa_status_accommodating: "The administration is still hedging between mission mediation and limited coercion."
 je_sb_consolidation_of_south_west_africa_status_supervised: "The colony is being organized under close supervision, but without an openly brutal programme."
 je_sb_consolidation_of_south_west_africa_status_coercive: "Labour, land, and movement are being forced into a tighter colonial order."
 je_sb_consolidation_of_south_west_africa_status_brutal: "The administration has embraced a hard settler-colonial line."
 je_sb_consolidation_of_south_west_africa_status_exterminatory: "The colonial regime now rests on naked terror."
 je_sb_consolidation_of_south_west_africa_tt_ports: "Own both #v Lüderitz#! and #v Swakopmund#!."
 je_sb_consolidation_of_south_west_africa_tt_events: "Resolve all four consolidation incidents."
 je_sb_consolidation_of_south_west_africa_tt_namaqualand: "Control at least half of the passable provinces in #v Namaqualand#!."
 je_sb_consolidation_of_south_west_africa_tt_hereroland: "Control at least half of the passable provinces in #v Hereroland#!."

 je_sb_delegate_south_west_affairs_to_cape_button: "Delegate South West Affairs to the Cape"
 je_sb_delegate_south_west_affairs_to_cape_button_desc: "Leave the practical administration of Britain’s South West African footholds to the Cape Colony."

 sb_nam_german_colonial_lobby: "Colonial Lobby"
 sb_nam_german_colonial_lobby_desc: "The Landowners are pushing Berlin toward a harder colonial policy."
 sb_nam_german_colonial_rebuff: "Colonial Rebuff"
 sb_nam_german_colonial_rebuff_desc: "The Landowners resent the refusal to pursue overseas prestige."
 sb_nam_rehoboth_discouraged: "Rehoboth Discouraged"
 sb_nam_rehoboth_discouraged_desc: "The Baster trek has been checked, but at domestic political cost."
 sb_nam_rule_accommodating: "Accommodating Rule"
 sb_nam_rule_accommodating_desc: "The administration is still trying to soften colonial rule through compromise."
 sb_nam_rule_supervised: "Supervised Rule"
 sb_nam_rule_supervised_desc: "The territory is being organized more tightly, but without a fully brutal programme."
 sb_nam_rule_coercive: "Coercive Rule"
 sb_nam_rule_coercive_desc: "Colonial order is now being enforced through harsher labour and land policies."
 sb_nam_rule_brutal: "Brutal Rule"
 sb_nam_rule_brutal_desc: "Settler and administrative interests have embraced a hard line."
 sb_nam_rule_exterminatory: "Exterminatory Rule"
 sb_nam_rule_exterminatory_desc: "The regime is now prepared to rule through naked terror."
 sb_nam_minority_rights_seed_low: "Muted Resistance"
 sb_nam_minority_rights_seed_low_desc: "Discriminated communities are beginning to organize against colonial rule."
 sb_nam_minority_rights_seed_mid: "Gathering Resistance"
 sb_nam_minority_rights_seed_mid_desc: "A broader resistance movement is taking shape."
 sb_nam_minority_rights_seed_high: "Hardening Resistance"
 sb_nam_minority_rights_seed_high_desc: "Colonial repression is radicalizing the territory."
 sb_nam_minority_rights_seed_extreme: "Explosive Resistance"
 sb_nam_minority_rights_seed_extreme_desc: "Resistance is reaching a dangerous pitch."
 sb_nam_minority_rights_seed_maximum: "Implacable Resistance"
 sb_nam_minority_rights_seed_maximum_desc: "The territory is on the edge of open revolt."
 sb_nam_minority_rights_suppressed: "Suppressed Resistance"
 sb_nam_minority_rights_suppressed_desc: "Open resistance has been temporarily checked."
 sb_nam_forced_camps_state: "Forced Camps"
 sb_nam_forced_camps_state_desc: "Confinement and rationing are being used to break resistance."
 sb_nam_forced_camps_movement: "Forced Camps"
 sb_nam_forced_camps_movement_desc: "Confinement has narrowed the movement’s room to organize."
 sb_nam_extermination_orders_state: "Extermination Orders"
 sb_nam_extermination_orders_state_desc: "The colonial regime has embraced exterminatory violence."
 sb_nam_extermination_orders_movement: "Extermination Orders"
 sb_nam_extermination_orders_movement_desc: "Exterminatory violence has torn apart organized resistance."
 sb_nam_resistance_allowed_minor: "Resistance Allowed to Gather"
 sb_nam_resistance_allowed_minor_desc: "The colonial state has hesitated, giving resistance more room to cohere."
 sb_nam_resistance_allowed_major: "Resistance Allowed to Organize"
 sb_nam_resistance_allowed_major_desc: "The authorities have balked at total repression, and resistance is growing bolder."
 sb_nam_colonial_charter: "Colonial Charter"
 sb_nam_colonial_charter_desc: "The territory is being run for extraction through a chartered colonial apparatus."
 sb_nam_mission_colony: "Mission Colony"
 sb_nam_mission_colony_desc: "Missionary and civilizing claims are being used to legitimize colonial rule."
 sb_nam_settlement_campaigns: "Settlement Campaigns"
 sb_nam_settlement_campaigns_desc: "The administration is prioritizing settler migration and land transfer."
 sb_nam_coercive_colony: "Coercive Colony"
 sb_nam_coercive_colony_desc: "Colonial order is being imposed through overt coercion."

 sb_nam.010.t: "The Reich on the World Stage"
 sb_nam.010.d: "A faction around the Junkers argues that Germany cannot remain merely a continental power while the imperial map of Africa is being redrawn."
 sb_nam.010.f: "Prestige, commerce, and missionary protection are being folded into a single colonial argument."
 sb_nam.010.a: "Back an overseas empire"
 sb_nam.010.b: "Europe is enough"

 sb_nam.011.t: "Purchase of Angra Pequena"
 sb_nam.011.d: "German commercial agents have fixed on Angra Pequena as a practical foothold on the South West African coast."
 sb_nam.011.f: "A small purchase on a neglected shore can become the basis for a far larger claim."
 sb_nam.011.a: "Secure the bay"

 sb_nam.020.t: "Basters Discontent"
 sb_nam.020.d: "Some Creole frontier families would sooner leave than submit to a harder settler-colonial order in the Cape."
 sb_nam.020.f: "What leaves the colony does not always leave its politics behind."
 sb_nam.020.a: "Allow them to go"
 sb_nam.020.b: "Discourage the trek"

 sb_nam.100.t: "Land Dispossession"
 sb_nam.100.d: "Surveyors, concession seekers, and settler spokesmen now press for a firmer statement of who may graze, farm, and hold title in the territory."
 sb_nam.100.f: "Colonial order begins with a line on a map, then a line on the ground."
 sb_nam.100.a: "Survey and reserve the land"
 sb_nam.100.b: "Recognize local grazing rights"

 sb_nam.110.t: "Native Petitions and Mission Protests"
 sb_nam.110.d: "Missionaries and indigenous petitioners warn that a narrow settler regime will poison the whole territory."
 sb_nam.110.f: "The complaints are inconvenient precisely because they are difficult to dismiss as ignorance."
 sb_nam.110.a: "Dismiss the petitions"
 sb_nam.110.b: "Hear the missions"

 sb_nam.120.t: "Labour Coercion"
 sb_nam.120.d: "Settlers and administrators want a more reliable labour supply for transport, ranching, and public works."
 sb_nam.120.f: "The colony can be made cheaper only by making it harsher."
 sb_nam.120.a: "Enforce labour ordinances"
 sb_nam.120.b: "Limit coercive labour"

 sb_nam.130.t: "Border and Grazing Disputes"
 sb_nam.130.d: "Expanding colonial districts collide with long-standing grazing routes and local boundary understandings."
 sb_nam.130.f: "Every imposed frontier produces another quarrel somewhere beyond it."
 sb_nam.130.a: "Impose a punitive settlement"
 sb_nam.130.b: "Negotiate the boundaries"

 sb_nam.140.t: "Administer South West Africa"
 sb_nam.140.d: "The coastal footholds have become a coherent colonial project. The question is no longer whether the territory will be ruled, but how."
 sb_nam.140.f: "A chartered shell can turn a precarious foothold into a durable administration."
 sb_nam.140.a: "Extraction first"
 sb_nam.140.b: "Missionary stewardship"
 sb_nam.140.c: "Settlement campaigns"
 sb_nam.140.d_option: "Rule through coercion"

 sb_nam.150.t: "South West Africa Proclaimed"
 sb_nam.150.d: "A colonial administration now stands between the coast and the interior."
 sb_nam.150.f: "Consolidation ends the scramble, but not the conflict."
 sb_nam.150.a: "Press on"

 sb_nam.200.t: "Forced Camps"
 sb_nam.200.d: "The administration proposes to break indigenous resistance through confinement, rationing, and harsher labour discipline."
 sb_nam.200.f: "A camp is presented as temporary order. It rarely remains either."
 sb_nam.200.a: "Approve the camps"
 sb_nam.200.b: "Do not go that far"

 sb_nam.201.t: "Extermination Orders"
 sb_nam.201.d: "Some in the colonial administration now demand a final solution to resistance in the territory."
 sb_nam.201.f: "What is proposed would not merely pacify the colony. It would scar it permanently."
 sb_nam.201.a: "Issue the orders"
 sb_nam.201.b: "Refuse"
