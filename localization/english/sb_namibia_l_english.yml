l_english:
 SWA: "South West Africa"
 SWA_ADJ: "South West African"
 dyn_c_sb_german_south_west_africa: "Deutsch-Südwestafrika"
 dyn_c_sb_german_south_west_africa_adj: "Deutsch-Südwestafrikanisch"
 dyn_c_sb_south_west_africa: "South West Africa"
 dyn_c_sb_south_west_africa_adj: "South West African"

 sb_nam_rule_harshness_bar: "Colonial Rule Harshness"
 sb_nam_rule_harshness_bar_soft: "Accommodating Rule"
 sb_nam_rule_harshness_bar_harsh: "Harsh Rule"

 je_sb_consolidation_of_south_west_africa: "Consolidation of South West Africa"
 je_sb_consolidation_of_south_west_africa_reason: "[ROOT.GetCountry.GetName] now holds the coastal gateways of Lüderitz and Swakopmund, making it possible to bind Namaqualand and Hereroland into a South West African colonial administration.\n\n#b Colonial Rule Harshness#! runs from #v 0#! to #v 10#!. It begins from the administering country's laws: [GetLawType('law_frontier_colonization').GetName] #n +1#!, [GetLawType('law_colonial_resettlement').GetName] #n +3#!, [GetLawType('law_colonial_exploitation').GetName] #n +6#!; [GetLawType('law_racial_segregation').GetName] #n +1#!, [GetLawType('law_national_supremacy').GetName] #n +2#!, [GetLawType('law_ethnostate').GetName] #n +3#!; [GetLawType('law_cultural_exclusion').GetName] #p -1#! and [GetLawType('law_multicultural').GetName] #p -2#!. Cape Qualified Franchise and a Cape liberal victory can reduce it further.\n\nFour South West African consolidation incidents then each move harshness by #n +1#! or #p -1#!: land policy, mission petitions, forced labour, and border or grazing disputes. The final level sets the colony's permanent administration: #v 0-2#! Mission Colony, #v 3-5#! Chartered Company, #v 6-8#! Extractive Colony, and #v 9+#! Exterminatory Settler-Extractive Colony."
 je_sb_consolidation_of_south_west_africa_status_accommodating: "The South West African administration is still relying on mission mediation, negotiated boundaries, and limited coercion."
 je_sb_consolidation_of_south_west_africa_status_supervised: "South West Africa is being brought under close colonial supervision, but the administration has not committed to an openly brutal programme."
 je_sb_consolidation_of_south_west_africa_status_coercive: "The South West African administration is imposing tighter control over labour, land, and movement."
 je_sb_consolidation_of_south_west_africa_status_brutal: "The South West African administration has embraced a hard settler-colonial line of dispossession and coercion."
 je_sb_consolidation_of_south_west_africa_status_exterminatory: "The South West African colonial regime is prepared to rule through systematic terror."
 je_sb_consolidation_of_south_west_africa_tt_ports: "Own both #v Lüderitz#! and #v Swakopmund#!."
 je_sb_consolidation_of_south_west_africa_tt_events: "Resolve all four consolidation incidents."
 je_sb_consolidation_of_south_west_africa_tt_namaqualand: "Control at least half of the passable provinces in #v Namaqualand#!."
 je_sb_consolidation_of_south_west_africa_tt_hereroland: "Control at least half of the passable provinces in #v Hereroland#!."

 je_sb_delegate_south_west_affairs_to_cape_button: "Delegate South West Affairs to the Cape"
 je_sb_delegate_south_west_affairs_to_cape_button_desc: "Transfer the practical administration of Britain's South West African footholds in Namaqualand and Hereroland to the Cape Colony."

 sb_nam_german_colonial_rebuff: "Colonial Ambition Rebuffed"
 sb_nam_german_colonial_rebuff_desc: "Colonial advocates in Berlin resent the government's refusal to pursue a South West African foothold."
 sb_nam_rehoboth_discouraged: "Rehoboth Discouraged"
 sb_nam_rehoboth_discouraged_desc: "Cape pressure has checked the Rehoboth Baster trek toward South West Africa, but at domestic political cost."
 sb_nam_rule_accommodating: "Accommodating Rule"
 sb_nam_rule_accommodating_desc: "The South West African administration is still trying to soften colonial rule through mission mediation and compromise."
 sb_nam_rule_supervised: "Supervised Rule"
 sb_nam_rule_supervised_desc: "South West Africa is being organized under closer colonial supervision, but without a fully brutal programme."
 sb_nam_rule_coercive: "Coercive Rule"
 sb_nam_rule_coercive_desc: "South West African colonial order is being enforced through harsher labour, land, and movement policies."
 sb_nam_rule_brutal: "Brutal Rule"
 sb_nam_rule_brutal_desc: "Settler and administrative interests in South West Africa have embraced dispossession and direct coercion."
 sb_nam_rule_exterminatory: "Exterminatory Rule"
 sb_nam_rule_exterminatory_desc: "The South West African colonial regime is prepared to rule through systematic terror."
 sb_nam_minority_rights_seed_low: "Muted Resistance"
 sb_nam_minority_rights_seed_low_desc: "Discriminated communities in South West Africa are beginning to organize against colonial rule."
 sb_nam_minority_rights_seed_mid: "Gathering Resistance"
 sb_nam_minority_rights_seed_mid_desc: "A broader South West African resistance movement is taking shape."
 sb_nam_minority_rights_seed_high: "Hardening Resistance"
 sb_nam_minority_rights_seed_high_desc: "Colonial repression is radicalizing South West Africa."
 sb_nam_minority_rights_seed_extreme: "Explosive Resistance"
 sb_nam_minority_rights_seed_extreme_desc: "Resistance to colonial rule in South West Africa is reaching a dangerous pitch."
 sb_nam_minority_rights_seed_maximum: "Implacable Resistance"
 sb_nam_minority_rights_seed_maximum_desc: "South West Africa is on the edge of open revolt against colonial rule."
 sb_nam_minority_rights_suppressed: "Suppressed Resistance"
 sb_nam_minority_rights_suppressed_desc: "Open South West African resistance has been temporarily checked."
 sb_nam_forced_camps_state: "Forced Camps"
 sb_nam_forced_camps_state_desc: "Confinement, rationing, and forced labour are being used in South West Africa to break resistance."
 sb_nam_forced_camps_movement: "Forced Camps"
 sb_nam_forced_camps_movement_desc: "Confinement has narrowed the South West African resistance movement's room to organize."
 sb_nam_extermination_orders_state: "Extermination Orders"
 sb_nam_extermination_orders_state_desc: "The South West African colonial regime has embraced exterminatory violence."
 sb_nam_extermination_orders_country: "Extermination Orders"
 sb_nam_extermination_orders_country_desc: "Exterminatory violence has also broken ordinary subsistence and security for communities facing violent hostility, cultural erasure, or open prejudice."
 sb_nam_extermination_orders_movement: "Extermination Orders"
 sb_nam_extermination_orders_movement_desc: "Exterminatory violence has torn apart organized South West African resistance."
 sb_nam_resistance_allowed_minor: "Resistance Allowed to Gather"
 sb_nam_resistance_allowed_minor_desc: "The colonial state has hesitated, giving South West African resistance more room to cohere."
 sb_nam_resistance_allowed_major: "Resistance Allowed to Organize"
 sb_nam_resistance_allowed_major_desc: "The authorities have balked at total repression in South West Africa, and resistance is growing bolder."
 sb_nam_colonial_charter: "Colonial Charter"
 sb_nam_colonial_charter_desc: "South West Africa is being run for extraction through a chartered colonial company."
 sb_nam_mission_colony: "Mission Colony"
 sb_nam_mission_colony_desc: "South West Africa is being organized around mission mediation and agrarian administration rather than extraction."
 sb_nam_extractive_colony: "Extractive Colony"
 sb_nam_extractive_colony_desc: "South West Africa is being organized around mines, plantations, and racialized labour control."
 sb_nam_extractive_colony_state: "Extractive Colony"
 sb_nam_extractive_colony_state_desc: "The local South West African administration is opening land and labour to extractive colonial expansion."
 sb_nam_exterminatory_settler_extractive_colony: "Exterminatory Settler-Extractive Colony"
 sb_nam_exterminatory_settler_extractive_colony_desc: "South West Africa is being organized around settler claims, extraction, and exterminatory coercion."
 sb_nam_exterminatory_settler_extractive_colony_state: "Exterminatory Settler-Extractive Colony"
 sb_nam_exterminatory_settler_extractive_colony_state_desc: "The local South West African administration is directing settlement and coercive expansion into this state."

 sb_nam.010.t: "Berlin Looks Overseas"
 sb_nam.010.d: "In Berlin, colonial advocates within the Junkers and officer corps argue that Germany should seek an overseas foothold in South West Africa before rival empires divide the coast."
 sb_nam.010.f: "Maps of the African coast have begun to circulate through ministries, clubs, and military messes. Each line is presented as commerce, each harbour as protection, and each mission station as a reason the Reich should no longer remain only a continental power."
 sb_nam.010.a: "Back a colonial programme"
 sb_nam_010_a_tt: "Promise to pursue [GetLawType('law_colonial_exploitation').GetName] and prepare a later purchase at Angra Pequena/Lüderitz."
 sb_nam.010.b: "Keep Germany in Europe"
 sb_nam_010_b_tt: "Reject the South West African colonial lobby, angering its sponsor in government."

 sb_nam.011.t: "Angra Pequena and Lüderitz"
 sb_nam.011.d: "German commercial agents propose buying Angra Pequena, the bay soon to be known as Lüderitz, as Germany's first practical foothold on the South West African coast."
 sb_nam.011.f: "The harbour is small, the shoreline dry, and the price far from trivial. Yet a single recognized purchase can become a flag, a port, and then the argument for a colony."
 sb_nam.011.a: "Secure the bay"
 sb_nam_011_a_tt: "Pay #v £100,000#! to secure #v Lüderitz#!, establish a port, and gain progress toward [GetTechnology('malaria_prevention').GetName]."
 sb_nam.011.b: "Decline the purchase"
 sb_nam_011_b_tt: "Decline the Angra Pequena/Lüderitz purchase and abandon this foothold."

 sb_nam.020.t: "The Rehoboth Trek"
 sb_nam.020.d: "Cape policy is pushing Rehoboth Baster frontier families toward the interior, where a trek into South West Africa could create a new buffer community beyond direct colonial control."
 sb_nam.020.f: "Wagons are not merely loaded with furniture, rifles, and church books. They carry old grievances from the Cape frontier, and those grievances do not disappear once the wheels cross another dry riverbed."
 sb_nam.020.a: "Allow the trek"
 sb_nam_020_a_tt: "Create a Rehoboth Baster foothold in South West Africa and move Baster families from the Cape."
 sb_nam.020.b: "Discourage the move"
 sb_nam_020_b_tt: "Block the Rehoboth trek, discouraging the frontier movement at domestic political cost."

 sb_nam.100.t: "South West Africa: Land Policy"
 sb_nam.100.d: "Surveyors, concession seekers, and settler spokesmen in South West Africa are pressing the administration to define who may graze, farm, and hold title in Namaqualand and Hereroland."
 sb_nam.100.f: "First comes the line on the map. Then come the pegs in the ground, the signatures in the office, and the guards who insist that an old route has become somebody else's property."
 sb_nam.100.a: "Survey and reserve the land"
 sb_nam_rule_harshness_increase_tt: "Colonial Rule Harshness in South West Africa will increase by #n 1#!."
 sb_nam.100.b: "Recognize local grazing rights"
 sb_nam_rule_harshness_decrease_tt: "Colonial Rule Harshness in South West Africa will decrease by #p 1#!."

 sb_nam.110.t: "South West Africa: Mission Petitions"
 sb_nam.110.d: "Missionaries and indigenous petitioners in South West Africa warn that a narrow settler regime will turn local communities against the colonial administration."
 sb_nam.110.f: "The petitions arrive folded, translated, annotated, and delayed. They are inconvenient because they speak in the language of the administration itself: promises, protection, law."
 sb_nam.110.a: "Dismiss the petitions"
 sb_nam.110.b: "Hear the missions"

 sb_nam.120.t: "South West Africa: Forced Labour"
 sb_nam.120.d: "Settlers and administrators in South West Africa want forced labour rules to secure workers for transport, ranching, and public works."
 sb_nam.120.f: "The ledgers call it shortage. The district officers call it order. Those summoned from their homes call it what it is: another demand made under the shadow of a rifle."
 sb_nam.120.a: "Enforce labour ordinances"
 sb_nam.120.b: "Limit forced labour"

 sb_nam.130.t: "South West Africa: Grazing Boundaries"
 sb_nam.130.d: "Expanding colonial districts in South West Africa are colliding with long-standing grazing routes and local boundary agreements."
 sb_nam.130.f: "A frontier can be drawn in an office in an afternoon. It takes longer to explain why the waterhole, the winter pasture, or the cattle path beyond it has suddenly changed hands."
 sb_nam.130.a: "Impose a punitive settlement"
 sb_nam.130.b: "Negotiate the boundaries"

 sb_nam.140.t: "Administer South West Africa"
 sb_nam.140.d: "[ROOT.GetCountry.GetName] has consolidated Lüderitz, Swakopmund, Namaqualand, and Hereroland into a coherent South West African colonial project. The colony's permanent administration will now be fixed by the harshness of the rule already imposed."
 sb_nam.140.f: "The reports no longer describe scattered purchases and isolated posts. They describe districts, labour needs, police powers, mission claims, settler pressure, and the machinery required to make a foothold permanent."
 sb_nam.140.a: "Proclaim the administration"
 sb_nam_140_mission_tt: "Create #v South West Africa#! as a #v Mission Colony#!.\n\n#bold Laws:#! [GetLawType('law_colonial_administration').GetName], [GetLawType('law_oligarchy').GetName], [GetLawType('law_subjecthood').GetName], [GetLawType('law_agrarianism').GetName], [GetLawType('law_colonial_resettlement').GetName], mission-style religious schooling where valid, and restrictive colonial baseline laws.\n\n#bold Permanent modifier:#! Mission Colony: reduced radicalism from open-prejudice increases."
 sb_nam_140_charter_tt: "Create #v South West Africa#! as a #v Chartered Company#!.\n\n#bold Laws:#! [GetLawType('law_colonial_administration').GetName], [GetLawType('law_oligarchy').GetName], [GetLawType('law_subjecthood').GetName], [GetLawType('law_extraction_economy').GetName], [GetLawType('law_colonial_exploitation').GetName], and restrictive colonial baseline laws.\n\n#bold Permanent modifier:#! Colonial Charter: #p +10%#! plantation throughput and #p +10%#! mining throughput."
 sb_nam_140_extractive_tt: "Create #v South West Africa#! as an #v Extractive Colony#!.\n\n#bold Laws:#! [GetLawType('law_colonial_administration').GetName], [GetLawType('law_oligarchy').GetName], [GetLawType('law_racial_segregation').GetName], [GetLawType('law_extraction_economy').GetName], [GetLawType('law_colonial_exploitation').GetName], and restrictive colonial baseline laws.\n\n#bold Permanent country modifier:#! #p +10%#! plantation throughput, #p +10%#! mining throughput, and #n +10%#! radicalism gain for pops facing violent hostility, cultural erasure, or open prejudice.\n\n#bold Namaqualand and Hereroland modifier:#! #p +25%#! colony growth."
 sb_nam_140_exterminatory_tt: "Create #v South West Africa#! as an #v Exterminatory Settler-Extractive Colony#!.\n\n#bold Laws:#! [GetLawType('law_colonial_administration').GetName], [GetLawType('law_autocracy').GetName], [GetLawType('law_racial_segregation').GetName], [GetLawType('law_extraction_economy').GetName], [GetLawType('law_colonial_exploitation').GetName], [GetLawType('law_censorship').GetName], and restrictive colonial baseline laws.\n\n#bold Permanent country modifier:#! #p +10%#! plantation throughput, #p +10%#! mining throughput, #n +20%#! radicalism gain for pops facing violent hostility, cultural erasure, or open prejudice, and #n -2#! Standard of Living for those pops.\n\n#bold Namaqualand and Hereroland modifier:#! #p +50%#! colony growth and #p +10%#! migration attraction."

 sb_nam.150.t: "South West Africa Proclaimed"
 sb_nam.150.d: "A South West African colonial administration now stands between the coast and the interior, claiming authority over Lüderitz, Swakopmund, Namaqualand, and Hereroland."
 sb_nam.150.f: "The proclamation settles the question of administration. It does not settle the question of land, labour, sovereignty, or resistance."
 sb_nam.150.a: "Consolidate the colony"
 sb_nam_150_a_tt: "Seed South West African minority-rights resistance according to the final Colonial Rule Harshness level."

 sb_nam.151.t: "Play as South West Africa?"
 sb_nam.151.d: "A new South West African colonial administration has been proclaimed in Namaqualand and Hereroland. Because [ROOT.GetCountry.GetName] has an interest in Southern Africa, you may continue as [ROOT.GetCountry.GetName] or take control of South West Africa."
 sb_nam.151.f: "A colonial government has its own offices, budgets, garrisons, and ambitions. What began as a distant question of empire can now be played from the colonial capital itself."
 sb_nam.151.a: "Remain with [ROOT.GetCountry.GetName]"
 sb_nam_151_a_tt: "Continue playing as [ROOT.GetCountry.GetName]."
 sb_nam.151.b: "Play as South West Africa"
 sb_nam_151_b_tt: "Switch to #v South West Africa#!."

 sb_nam.200.t: "South West Africa: Forced Camps"
 sb_nam.200.d: "The South West African administration proposes forced camps, rationing, and harsher labour discipline to break indigenous resistance."
 sb_nam.200.f: "The memorandum calls the camps temporary. It calls the rations efficient, the fences necessary, and the confinement a practical answer to disorder. The words are clean. The policy is not."
 sb_nam.200.a: "Approve the camps"
 sb_nam_200_a_tt: "Impose forced camps in Namaqualand and Hereroland, suppressing organized resistance for ten years."
 sb_nam.200.b: "Do not go that far"
 sb_nam_200_b_tt: "Refuse forced camps, allowing resistance to gather."

 sb_nam.201.t: "South West Africa: Extermination Orders"
 sb_nam.201.d: "Hardliners in the South West African colonial administration now demand exterminatory violence against communities accused of sustaining resistance."
 sb_nam.201.f: "The order is written as policy, but everyone in the room understands what it means. It would not merely defeat resistance. It would mark the colony with a crime that cannot be hidden by new maps or clean reports."
 sb_nam.201.a: "Issue the orders"
 sb_nam_201_a_tt: "Issue extermination orders in Namaqualand and Hereroland, shattering organized resistance through systematic terror and reducing the Standard of Living of pops at Acceptance Statuses 1-3."
 sb_nam.201.b: "Refuse"
 sb_nam_201_b_tt: "Refuse extermination orders, allowing resistance to organize further."
