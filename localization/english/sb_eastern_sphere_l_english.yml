l_english:
 sb_imperial_confederation.001.t:0 "The Confederation Question"
 sb_imperial_confederation.001.d:0 "The growth of separate Boer republics has forced Britain and the Cape to consider a more deliberate policy for the South African interior. Trade, recognition, and colonial authority are now being discussed as tools for keeping the inland republics inside an imperial system."
 sb_imperial_confederation.001.f:0 "\"The Boers might call it independence; in London it is more often called a problem of routes, ports, and influence.\""
 sb_imperial_confederation.001.a:0 "The scheme takes shape."
 MZQ:0 "Mozambique Company"
 MZQ_ADJ:0 "Mozambican"
 dyn_c_sb_mozambique_company:0 "Mozambique Company"
 dyn_c_sb_mozambique_company_adj:0 "Mozambican"
 dyn_c_sb_portuguese_mozambique:0 "Portuguese Mozambique"
 dyn_c_sb_portuguese_mozambique_adj:0 "Portuguese Mozambican"

 sb_zulu_drift_mpande_reserved:0 "Mpande's Reserved Court"
 sb_zulu_mpande_transition:0 "Managed Succession"
 sb_zulu_dynasty.093.b:0 "Back Cetshwayo."
 sb_zulu_dynasty.093.c:0 "Back Mbuyazi."
 sb_zulu_dynasty.094.t:0 "Mpande's Last Decision"
 sb_zulu_dynasty.094.d:0 "Mpande's succession settlement has endured long enough for the court to look beyond crisis management. Cetshwayo's faction now expects the king to decide whether the heir should rule in his own name or wait upon his father's caution."
 sb_zulu_dynasty.094.f:0 "\"A king may choose a son. He may also choose the hour at which that son becomes king.\""
 sb_zulu_dynasty.094.a:0 "Step aside for Cetshwayo."
 sb_zulu_dynasty.094.b:0 "Remain on the throne."

 decision_sb_anglo_zulu_ultimatum:0 "Issue the Zulu Ultimatum"
 decision_sb_anglo_zulu_ultimatum_desc:0 "Demand that the Zulu kingdom yield Natal's claimed territory before the frontier crisis hardens into war."
 dp_sb_anglo_zulu_return_state_locked:0 "Anglo-Zulu War"
 dp_sb_anglo_zulu_return_state_locked_desc:0 "Natal presses a locked return-state demand against the Zulu kingdom."
 dp_sb_anglo_zulu_return_state_locked_tooltip:0 "Start the #v Anglo-Zulu War#! as a locked return-state diplomatic play."
 sb_anglo_zulu.010.t:0 "Ultimatum to Ulundi"
 sb_anglo_zulu.010.d:0 "Natal's ministers argue that the Zulu kingdom cannot be left as an armed power across the frontier. With colonial administration in place, the claim to Zululand can now be pressed as an imperial demand."
 sb_anglo_zulu.010.f:0 "\"The question is no longer whether Ulundi disputes our border, but whether the border may exist under arms at all.\""
 sb_anglo_zulu.010.a:0 "Issue the ultimatum."
 sb_anglo_zulu.010.b:0 "Hold back for now."
 sb_anglo_zulu.020.t:0 "Zulu Victory on the Frontier"
 sb_anglo_zulu.020.d:0 "The Natal demand has failed. Zulu commanders, regiments, and court factions now draw a clear lesson from the war: survival depends on arms as much as royal legitimacy."
 sb_anglo_zulu.020.f:0 "\"The rifles taken after battle speak more plainly than any envoy.\""
 sb_anglo_zulu.020.a:0 "The kingdom has endured."
 sb_anglo_zulu.030.t:0 "Natal Enforces the Frontier"
 sb_anglo_zulu.030.d:0 "Natal has forced its claim over Zululand. The old frontier question now moves from diplomacy into colonial administration."
 sb_anglo_zulu.030.f:0 "\"A frontier settled by war rarely stays quiet, but it is settled all the same.\""
 sb_anglo_zulu.030.a:0 "The pressure is resolved."

 je_sb_consolidating_gaza_lobby:0 "Soshangane's Gaza kingdom commands the lower Limpopo, Delagoa approaches, and routes north toward Zambezia, but conquest has not yet become settled rule. Bring the conquered districts to order and incorporate Zambezia before the founder leaves power."
 je_sb_consolidating_gaza:0 "Consolidating Gaza"
 je_sb_consolidating_gaza_reason:0 "Soshangane's Gaza kingdom was not a compact homeland, but a military order built by Nguni regiments over Tonga, Shona, Sena, Lacustrine Bantu, and other Mozambican communities. Its authority reaches from the Delagoa approaches toward Zambezia, but many chiefs still read Gaza rule as conquest rather than obligation.\n\nWhile Soshangane remains ruler, settle the Gaza-held districts of Lourenco Marques and Zambezia, and make Zambezia part of the kingdom's regular administration. If the founder departs first, succession will turn local autonomy into open resistance."
 je_sb_consolidating_gaza_status:0 "Complete this by reducing turmoil in the Gaza-held parts of Lourenco Marques and Zambezia until both show no visible unrest, then fully incorporate Gaza-held Zambezia."
 je_sb_consolidating_gaza_complete_lourenco_turmoil_tt:0 "Gaza-held Lourenco Marques has no visible turmoil."
 je_sb_consolidating_gaza_complete_zambezia_turmoil_tt:0 "Gaza-held Zambezia has no visible turmoil."
 je_sb_consolidating_gaza_complete_zambezia_incorporated_tt:0 "Gaza-held Zambezia is fully incorporated."
 je_sb_consolidating_gaza_fail_soshangane_tt:0 "Soshangane is no longer the ruler of Gaza."
 je_sb_consolidating_gaza_invalid_subject_tt:0 "Gaza is no longer independent."
 je_sb_consolidating_gaza_invalid_holdings_tt:0 "Gaza no longer holds land in Lourenco Marques or Zambezia."
 sb_gaza_northern_focus:0 "Northern Military Focus"
 sb_gaza_southern_focus:0 "Southern Consolidation Focus"
 sb_gaza_collectors:0 "Royal Collectors"
 sb_gaza_open_regiments:0 "Opened Regiments"
 sb_gaza_narrow_regiments:0 "Narrow Regimental Core"
 sb_gaza_consolidated_recruitment:0 "Consolidated Gaza Recruitment"
 sb_gaza_local_unrest:0 "Local Unrest"
 sb_gaza_local_order:0 "Local Accommodation"
 sb_gaza.001.t:0 "The Kingdom of the Limpopo"
 sb_gaza.001.d:0 "Soshangane kaZikode Nxumalo rules a kingdom made by migration, war, and tribute. Gaza's Nguni military households command the lower Limpopo and the road toward Delagoa, while northern tributaries link the court to Zambezia and the caravan routes beyond."
 sb_gaza.001.f:0 "\"The king's messengers can reach the coast, the river chiefs, and the road north. Whether those roads carry obedience once the regiments leave is the question before the court.\""
 sb_gaza.001.a:0 "Conquest must become government."
 sb_gaza.010.t:0 "The Road North"
 sb_gaza.010.d:0 "Gaza cannot consolidate every frontier at once. The court may strengthen its hold over Zambezia and the Musapa-linked routes, or concentrate first on the Limpopo and Delagoa approaches that secure the southern heartland."
 sb_gaza.010.f:0 "\"A road is not held because an army crossed it once. It is held when messengers, cattle, wives, and tribute can pass without asking another chief's leave.\""
 sb_gaza.010.a:0 "Secure the northern routes."
 sb_gaza.010.b:0 "Concentrate on the Limpopo."
 sb_gaza.020.t:0 "Tribute and Mediation"
 sb_gaza.020.d:0 "Royal collectors can draw wealth from the conquered districts and prove that Gaza rule reaches beyond the army. The same demand may convince Tonga, Shona, Sena, and Makua chiefs that the court intends extraction without mediation."
 sb_gaza.020.f:0 "\"The collector counts cattle. The chief counts insults. Both remember the total.\""
 sb_gaza.020.a:0 "Send the collectors."
 sb_gaza.020.b:0 "Rule through the chiefs."
 sb_gaza.030.t:0 "Opening the Regiments"
 sb_gaza.030.d:0 "The Gaza military system can absorb more men from the subject districts, making the army broader and the kingdom harder to break. It will also make incorporation feel less like alliance and more like conscription."
 sb_gaza.030.f:0 "\"A shield given by the king is an honor. A shield demanded by the king is a warning.\""
 sb_gaza.030.a:0 "Open the regiments."
 sb_gaza.030.b:0 "Keep the regimental core narrow."
 sb_gaza.040.t:0 "Guns on the Caravan Road"
 sb_gaza.040.d:0 "Portuguese posts and caravan routes carry cloth, ivory, powder, and muskets through Gaza's frontier. Raiding those routes could arm the regiments quickly, but the coast will remember who made commerce unsafe."
 sb_gaza.040.f:0 "\"A musket taken on the road may win one battle. The trader it was taken from may cost ten more.\""
 sb_gaza.040.a:0 "Raid for firearms."
 sb_gaza.040.b:0 "Keep the routes open."
 sb_gaza.090.t:0 "The Tributaries Bound"
 sb_gaza.090.d:0 "The Gaza-held districts have quieted while Soshangane still commands the court. The kingdom can preserve the work of local chiefs and tributary mediation, or turn consolidation toward a stronger regimental state."
 sb_gaza.090.f:0 "\"A tributary who sends cattle obeys for a season. A tributary who sends sons has already accepted a different future.\""
 sb_gaza.090.a:0 "Govern through tributary chiefs."
 sb_gaza.090.b:0 "Make the regiments the spine of rule."
 sb_gaza.095.t:0 "The Founder Departs"
 sb_gaza.095.d:0 "Soshangane no longer commands the Gaza kingdom, and the conquered districts have not been settled into regular rule. Chiefs who had submitted to the founder now test whether his successors can compel the same obedience."
 sb_gaza.095.f:0 "\"A kingdom may cross a river quickly. It does not rule the far bank so easily.\""
 sb_gaza.095.a:0 "The settlement has failed."

 sb_mozambique_company.010.t:0 "The Mozambique Administration"
 sb_mozambique_company.010.d:0 "Portugal now controls the Mozambican coast and interior from Lourenco Marques to Mozambique. Lisbon must decide whether this southern African administration will be run as a company, a mission field, a settler colony, or an extractive regime."
 sb_mozambique_company.010.f:0 "\"A colony on paper still needs an office, a road, a port, and a method of extracting obedience.\""
 sb_mozambique_company.010.a:0 "Commerce and private enterprise."
 sb_mozambique_company.010.b:0 "Missions and schools."
 sb_mozambique_company.010.c:0 "Settlement campaigns."
 sb_mozambique_company.010.e:0 "Ruthless extraction."
 sb_mozambique_company_010_company_tt:0 "Creates #v $MZQ$#! as a chartered company and applies the vanilla commerce/private-enterprise colonial package."
 sb_mozambique_company_010_mission_tt:0 "Creates #v $MZQ$#! as a colony and applies the vanilla mission administration package."
 sb_mozambique_company_010_settler_tt:0 "Creates #v $MZQ$#! as a colony and applies the vanilla settler-colony package."
 sb_mozambique_company_010_extraction_tt:0 "Creates #v $MZQ$#! as a colony and applies the vanilla ruthless extraction package."

 je_sb_delagoa_route_to_sea:0 "Delagoa Route to the Sea"
 je_sb_delagoa_route_to_sea_reason:0 "Transvaal can loosen British control over Boer trade by building railways to Pretoria and the East Transvaal, then securing transit through Portuguese Lourenco Marques."
 je_sb_delagoa_route_to_sea_status:0 "Build railways in Transvaal and East Transvaal, then secure trade-through rights with Portugal or Portuguese Mozambique."
 sb_delagoa_route_opened:0 "Delagoa Route Opened"
 sb_delagoa_port_gateway:0 "Delagoa Gateway"
 sb_delagoa_railway_link:0 "Delagoa Railway Link"
 sb_delagoa.010.t:0 "Pretoria Seeks Delagoa Bay"
 sb_delagoa.010.d:0 "The Transvaal has built the railway base needed for a route to Lourenco Marques. A transit agreement would pull Boer trade toward Delagoa Bay and make the port more valuable."
 sb_delagoa.010.f:0 "\"The rails end inland for now, but the map already points to the sea.\""
 sb_delagoa.010.a:0 "Open the route."
 sb_delagoa.010.b:0 "Refuse the arrangement."
 sb_delagoa_010_accept_tt:0 "Creates a 25-year trade-through treaty with Transvaal, including #v 10#! merchant marine support."
 sb_delagoa_010_reject_tt:0 "Relations with Transvaal worsen by #v 25#!. The AI helper will not ask again."
 sb_delagoa.020.t:0 "A Road to the Sea"
 sb_delagoa.020.d:0 "The Delagoa route is open. Transvaal commerce can now move through Lourenco Marques instead of depending entirely on British-controlled corridors."
 sb_delagoa.020.f:0 "\"For Pretoria, the sea was no longer only a British horizon.\""
 sb_delagoa.020.a:0 "The route is secured."
 sb_delagoa.021.t:0 "Pretoria Opens the Route"
 sb_delagoa.021.d:0 "The Transvaal route has brought Boer traffic toward Lourenco Marques. Ports, trade centers, and railways along the corridor stand to benefit."
 sb_delagoa.021.f:0 "\"A railway does not need to own the sea to change who profits from it.\""
 sb_delagoa.021.a:0 "Develop the corridor."

 je_sb_imperial_confederation_scheme_lobby:0 "Britain and the Anglo-African colonies can bind Boer and colonial participants into an imperial trade network, then attempt an early South African confederation once the network has been brought under British authority."
 je_sb_imperial_confederation_scheme:0 "Southern African Imperial Confederation Scheme"
 je_sb_imperial_confederation_scheme_reason:0 "Britain and its Anglo-African colonies can bind the Boer republics economically, then confederate the British subject network into an early Union of South Africa. If Boer states secure non-British sea access, the scheme is politically weakened."
 je_sb_imperial_confederation_scheme_status:0 "Bind independent Boer and Anglo-African participants through imperial trade, then form South Africa once the participant network is under British or Cape authority."
 je_sb_imperial_confederation_bind_trade_button:0 "Bind Trade"
 je_sb_imperial_confederation_bind_trade_button_desc:0 "Give unbound independent participants a five-year imperial trade binding: transit rights, merchant marine support, and a British power-bloc embassy."
 je_sb_imperial_confederation_form_saf_button:0 "Confederate South Africa"
 je_sb_imperial_confederation_form_saf_button_desc:0 "Form South Africa from the British subject network. This will absorb eligible AI participant tags into the new Union."
 sb_imperial_confederation_ignored_delagoa:0 "Ignored Boer Sea Access"
 sb_imperial_confederation.030.t:0 "Boer Access to Delagoa"
 sb_imperial_confederation.030.d:0 "Transvaal has built its own foothold at Lourenco Marques, bypassing the imperial trade network. London must decide whether to defend Portuguese claims, demand submission, or absorb the diplomatic cost."
 sb_imperial_confederation.030.f:0 "\"A Boer port was not merely a customs matter. It was a route around British leverage.\""
 sb_imperial_confederation.030.a:0 "Demand relinquishment to Portugal."
 sb_imperial_confederation.030.b:0 "Demand vassalisation."
 sb_imperial_confederation.030.c:0 "Ignore the matter."
 sb_imperial_confederation_030_relinquish_tt:0 "Transvaal receives an ultimatum to hand its Lourenco Marques holdings to Portugal."
 sb_imperial_confederation_030_vassalize_tt:0 "Britain starts a diplomatic play to make Transvaal a protectorate."
 sb_imperial_confederation.031.t:0 "London Demands Delagoa"
 sb_imperial_confederation.031.d:0 "Britain has demanded that Transvaal relinquish Lourenco Marques to Portugal. Refusal will turn the port question into a wider imperial crisis."
 sb_imperial_confederation.031.f:0 "\"The coast was only a strip of land until the great powers began counting railways.\""
 sb_imperial_confederation.031.a:0 "Back down."
 sb_imperial_confederation.031.b:0 "Refuse."
 sb_imperial_confederation_031_back_down_tt:0 "Portugal gains Transvaal-controlled Lourenco Marques land."
 sb_imperial_confederation_031_refuse_tt:0 "Portugal starts a return-state play and Britain backs Portugal with a protectorate demand where valid."
 sb_imperial_confederation.040.t:0 "Natal Accelerates the Frontier"
 sb_imperial_confederation.040.d:0 "Boer trade through Zululand threatens the imperial trade scheme. Natal has been pushed toward a faster ultimatum against the Zulu kingdom."
 sb_imperial_confederation.040.f:0 "\"Trade routes made quiet frontiers loud.\""
 sb_imperial_confederation.040.a:0 "The pressure rises."
