l_english:
 sb_iron_age_weapons:0 "Iron-Age Weapons"
 sb_iron_age_weapons_desc:0 "This country still relies heavily on older weapons and has not yet secured enough firearms to modernize the army."
 sb_iron_age_weapons_1:0 "Iron-Age Weapons"
 sb_iron_age_weapons_1_desc:0 "Steady firearms imports and drill are reducing the old battlefield weakness, but the army still lags in military research until modernization is complete."
