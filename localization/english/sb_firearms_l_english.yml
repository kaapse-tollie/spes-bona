l_english:
sb_firearms.001.t:0 "A New Art of War"
sb_firearms.001.d:0 "Years of imported muskets, drill, and hard-won battlefield lessons have forced the kingdom's commanders to rethink the art of war. Firearms are no longer a curiosity at the edge of the army. They have become part of its future."
sb_firearms.001.f:0 "The old courage remained, but it no longer marched alone. Powder and drill had begun to decide victory."
sb_firearms.001.a:0 "The army is changed."

je_sb_adopt_firearms:0 "The Adoption of Firearms"
je_sb_adopt_firearms_reason:0 "To survive the new age of war, the kingdom must modernize through imported firearms, domestic arms production, or both."
je_sb_adopt_firearms_status_both:0 "Imported weapons and domestic production are both advancing the program."
je_sb_adopt_firearms_status_treaty:0 "The program presently rests on imported firearms."
je_sb_adopt_firearms_status_industry:0 "The program presently rests on domestic arms production."
je_sb_adopt_firearms_status_no_progress:0 "No meaningful firearms program is underway."
je_sb_adopt_firearms_completion_treaty_tt:0 "Keep access to imported firearms for #v 24 months#!."
je_sb_adopt_firearms_completion_industry_tt:0 "Keep qualifying domestic arms production for #v 24 months#!."

