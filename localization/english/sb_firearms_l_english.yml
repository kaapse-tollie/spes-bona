 sb_new_tactics:0 "New Tactics"
 sb_new_tactics_desc:0 "Imported firearms and hard campaigning have reshaped the kingdom's military thinking and quickened further study."

 je_sb_firearms_acquisition:0 "Acquire Firearms"
 je_sb_firearms_acquisition_reason:0 "Our regiments fight bravely, but shield and spear alone cannot hold forever against musketry. We must secure firearms through trade or build the means to supply them ourselves."
 je_sb_firearms_acquisition_lobby:0 "Our kingdom still fights largely with the old weapons of the region. To stand against musket-armed neighbours and settlers, we must cultivate outside suppliers or build a properly staffed domestic arms industry."
 je_sb_firearms_acquisition_desc:0 "Our warriors are brave, but bravery alone will not stop musket fire forever. We must either sustain a transfer treaty with a country that actually operates an arms industry, or build a well-staffed arms industry of our own. As long as either route remains active, the battlefield malus will shrink month by month. Domestic production or sustained imports remove it entirely after 12 cumulative months."
 je_sb_firearms_acquisition_status_no_progress:0 "No qualifying transfer treaty with an arms-producing country is active. A fully staffed arms industry can also complete this effort from within, and either route will reduce the battlefield penalty month by month while active until the old weapon malus is gone."
 je_sb_firearms_acquisition_status_treaty:0 "A qualifying transfer treaty with an arms-producing country is active. Each full month of steady imports reduces the battlefield penalty, reaching full modernization after 12 cumulative months."
 je_sb_firearms_acquisition_status_industry:0 "A well-staffed arms industry is active. Each full month at at least 90% occupancy reduces the battlefield penalty, reaching full modernization after 12 cumulative months."
 je_sb_firearms_acquisition_status_both:0 "Imports are flowing and a well-staffed arms industry is active. The battlefield penalty is shrinking month by month, using whichever route is furthest along."
 je_sb_firearms_acquisition_completion_treaty_tt:0 "Maintain a qualifying transfer treaty with an arms-producing country for 12 months"
 je_sb_firearms_acquisition_completion_industry_tt:0 "Keep an arms industry at least 90% occupied for 12 months"

 sb_firearms.001.t:0 "New Tactics"
 sb_firearms.001.d:0 "Years of imported muskets, drill, and hard-won battlefield lessons have forced the kingdom's commanders to rethink how they fight. Firearms are no longer a curiosity at the edge of the army. They have become part of its future."
 sb_firearms.001.f:0 "\"The old courage remains, but now it marches with new methods.\""
 sb_firearms.001.a:0 "The army will never fight quite the same way again."
 dingane_amabutho:0 "Dingane's Amabutho"
 swazi_emabutfo:0 "Swazi Emabutfo"
 gaza_impi:0 "Gaza Impi"

 sb_boer_zulu.020.c:0 "Sell the southern strip for guns."

 sb_boer_zulu.025.t:0 "A Kingdom for Guns"
 sb_boer_zulu.025.d:0 "Dingane has not simply refused the Retief deputation. Instead he offers a harder bargain: the Boers may found their coastal republic, but only if Oranje agrees to feed the Zulu Kingdom with imported firearms for five years. It is a dangerous trade. Yet it would open Natal without war, and still loosen our dependence on British ports."
 sb_boer_zulu.025.f:0 "\"Land can be granted once. Guns, once sold, cannot be called back.\""
 sb_boer_zulu.025.a:0 "Accept Dingane's bargain."
 sb_boer_zulu.025.b:0 "Reject it. We will take Natal by force."

 sb_boer_zulu.026.t:0 "The Boers Refuse the Bargain"
 sb_boer_zulu.026.d:0 "The Boers have rejected Dingane's offer of land in exchange for guns. If they will not buy Natal, they may yet try to seize it. The Qwabe frontier must be brought firmly under Zulu authority before the wagons return with muskets and commandos."
 sb_boer_zulu.026.f:0 "\"If they refuse the king's price, then let them face the king's spear.\""
 sb_boer_zulu.026.a:0 "Reclaim the frontier and prepare for war."

 sb_boer_zulu.051.t:0 "Natal Must Be Won by Force"
 sb_boer_zulu.051.d:0 "Dingane offered land for guns; Oranje refused. The Zulu have now moved to absorb the whole southern frontier instead, and the Natal question has become a military one. If we are to win a republic on the coast now, it must be done by commando and laager rather than bargain."
 sb_boer_zulu.051.f:0 "\"Since the bargain has failed, Natal must be taken by force.\""
 sb_boer_zulu.051.a:0 "We must back down."
 sb_boer_zulu.051.b:0 "Then we will take Natal by force. Send for Pretorius!"

 sb_boer_zulu.057.t:0 "Natal Must Be Won by Force"
 sb_boer_zulu.057.d:0 "Oranje reports that Dingane's bargain has collapsed and Natal can now be won only by war. If Transvaal rides south, the commandos may yet secure a Boer republic on the coast. If not, Oranje must fight alone and remember who stayed behind."
 sb_boer_zulu.057.f:0 "\"If Natal is to be taken now, it will be taken by the commandos together.\""
 sb_boer_zulu.057.a:0 "Ride south and stand with Oranje."
 sb_boer_zulu.057.b:0 "They must fend for themselves."
