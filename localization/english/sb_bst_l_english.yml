l_english:
 STA:0 "Sotho-Tswana Nation"
 STA_ADJ:0 "Sotho-Tswana"

 je_sb_bst_ora_frontier:0 "The Basotho-Oranje Frontier"
 je_sb_bst_ora_frontier_reason:0 "The Great Trek has ended, but the Caledon frontier has not settled. As long as Basotho power survives in the Drakensberg, the struggle over Vrystaat remains open."
 je_sb_bst_ora_frontier_status:0 "The Basotho and the Oranje state remain locked in a live frontier contest. Basutoland can raid the Vrystaat frontier, seek British protection, or try to reverse the balance outright."

 je_sb_settle_drakensberg:0 "Settle the Drakensberg"
 je_sb_settle_drakensberg_reason:0 "Basutoland has been broken. The Drakensberg must now be brought firmly into the Boer world through settlement and demographic consolidation."
 je_sb_settle_drakensberg_status:0 "To settle the Drakensberg, Oranje must fully control the state and establish a meaningful Boer presence there."

 je_sb_sotho_tswana_nation:0 "The Sotho-Tswana Nation"
 je_sb_sotho_tswana_nation_reason:0 "If Basutoland masters the Vrystaat and breaks Boer control of the interior, a broader Sotho-Tswana political order can be built."
 je_sb_sotho_tswana_nation_status:0 "Control the Vrystaat and the Drakensberg, research Nationalism, and drive every Boer state from Transvaal and Northern Transvaal to gather the Sotho-Tswana world under Basotho leadership."

 je_sb_bst_raid_oranje_button:0 "Raid the Vrystaat"
 je_sb_bst_raid_oranje_button_desc:0 "Launch a punitive raid into the Oranje frontier. The raid will radicalize local pops, kill some of them, and carry off money for Basutoland."

 sb_seek_british_protection:0 "Seek British Protection"
 sb_seek_british_protection_desc:0 "Appeal directly to Britain for protection against Oranje pressure. London will decide once and only once."

 sb_fold_drakensberg_under_direct_control:0 "Fold Drakensberg Under Direct Control"
 sb_fold_drakensberg_under_direct_control_desc:0 "End indirect rule in Basutoland and bring the mountain state under direct Cape authority."

 sb_proclaim_sotho_tswana_nation:0 "Proclaim the Sotho-Tswana Nation"
 sb_proclaim_sotho_tswana_nation_desc:0 "With the Tswana client state secured and the interior cleared of Boer rivals, Basutoland can proclaim a broader Sotho-Tswana nation."

 sb_bst_frontier.010.t:0 "Basotho Raid the Frontier"
 sb_bst_frontier.010.d:0 "Riders from the mountain kingdom have crossed into the Vrystaat, killed locals, stirred unrest, and carried off cattle and coin. The frontier remains porous and contested."
 sb_bst_frontier.010.f:0 "The Basotho do not need to defeat Oranje in the field to bleed it. A fast raid can do enough."
 sb_bst_frontier.010.a:0 "The frontier is still open."

 sb_bst_frontier.100.t:0 "Basutoland Seeks Protection"
 sb_bst_frontier.100.d:0 "Moshoeshoe's kingdom asks Britain to accept it as a protectorate. A refusal leaves Basutoland to face the Oranje frontier alone. An acceptance brings the mountain kingdom under direct British shelter."
 sb_bst_frontier.100.f:0 "The Basotho ask not for charity, but for a shield."
 sb_bst_frontier.100.a:0 "Accept the appeal."
 sb_bst_frontier.100.b:0 "Britain will not intervene."

 sb_bst_frontier.200.t:0 "Transfer Basutoland to the Cape"
 sb_bst_frontier.200.d:0 "The Cape now governs the entire Basutoland-facing frontier and asks to assume day-to-day authority over the protected mountain kingdom. London can transfer the burden, or keep Basutoland under direct British protection."
 sb_bst_frontier.200.f:0 "The argument from Cape Town is simple: if the frontier is theirs, the responsibility should be too."
 sb_bst_frontier.200.a:0 "Transfer it to the Cape."
 sb_bst_frontier.200.b:0 "Keep it under British protection."

 sb_bst_frontier_raided:0 "Frontier Raided"
 sb_bst_frontier_raided_desc:0 "Recent Basotho incursions have unsettled administration and investment along the Oranje frontier."

 dyn_c_sb_sotho_tswana_nation:0 "Sotho-Tswana Nation"
 dyn_c_sb_sotho_tswana_nation_adj:0 "Sotho-Tswana"
