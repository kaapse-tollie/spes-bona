l_english:
 STA:0 "Sotho-Tswana Nation"
 STA_ADJ:0 "Sotho-Tswana"

 je_sb_bst_ora_frontier:0 "The Caledon Frontier"
 je_sb_bst_ora_frontier_reason:0 "The Caledon frontier remains unsettled. Basutoland and Oranje both claim security in the Vrystaat, and the mountain kingdom may yet fall back into the Drakensberg if the plains are lost."
 je_sb_bst_ora_frontier_lobby:0 "The Caledon frontier binds Basutoland and the Voortrekker republics in a contested interior. Raids, claims, British protection, or conquest may decide who commands the Vrystaat and the Drakensberg."
 je_sb_bst_ora_frontier_status:0 "The frontier remains unsettled. British protection, negotiated survival, or conquest will decide it."

 je_sb_settle_drakensberg:0 "The Drakensberg Settled"
 je_sb_settle_drakensberg_reason:0 "Basutoland has been broken. Oranje must now make its hold in the Drakensberg real."
 je_sb_settle_drakensberg_status:0 "Control the Drakensberg and settle a Boer foothold there."

 je_sb_sotho_tswana_nation:0 "A Sotho-Tswana Nation"
 je_sb_sotho_tswana_nation_reason:0 "Basutoland now stands over the Vrystaat and the mountain kingdom has become a force in the interior. If Boer power can be broken in Transvaal, a wider Sotho-Tswana order may yet be built."
 je_sb_sotho_tswana_nation_status:0 "Hold the Vrystaat and the Drakensberg, research Nationalism, and drive Boer rule from Transvaal."

 je_sb_bst_raid_oranje_button:0 "Raid the Frontier"
 je_sb_bst_raid_oranje_button_desc:0 "Send mounted raiders across the Oranje frontier to seize cattle, coin, provisions, and firearms."
 sb_bst_raid_oranje_frontier_tt:0 "Oranje still holds land across the Caledon frontier."
 sb_bst_raid_oranje_cooldown_tt:0 "We have not raided Oranje this year."
 sb_bst_raid_firearms_progress_tt:0 "Gain #v +5%#! guns progress."

 sb_seek_british_protection:0 "Ask for British Protection"
 sb_seek_british_protection_desc:0 "The Boers threaten us with direct annexation and brutal colonisation, perhaps becoming a protectorate under the British crown is the lesser evil."

 sb_fold_drakensberg_under_direct_control:0 "Impose Direct Rule"
 sb_fold_drakensberg_under_direct_control_desc:0 "Bring Basutoland under direct Cape rule."

sb_proclaim_sotho_tswana_nation:0 "Proclaim a Sotho-Tswana Nation"
sb_proclaim_sotho_tswana_nation_desc:0 "With a Tswana tributary secured and the Boer republics beaten back, Basutoland can proclaim a wider Sotho-Tswana nation."

sb_bst_frontier.010.t:0 "A Raid Across the Frontier"
sb_bst_frontier.010.d:0 "Basotho raiders have crossed into the Vrystaat, carrying off stock, coin, supplies, and captured firearms before slipping back toward the mountains. Whatever Oranje claims on the map, the frontier is still too open to command."
sb_bst_frontier.010.f:0 "By dawn the raiders were gone, leaving empty kraals, scattered goods, and a plain reminded that the mountains were never far away."
sb_bst_frontier.010.a:0 "So the struggle continues."

 sb_bst_frontier.020.t:0 "Into the Mountains"
 sb_bst_frontier.020.d:0 "The lowland foothold in the Vrystaat has been lost. For now, the kingdom must hold to the mountain country, preserve what it can, and wait for a better season."
 sb_bst_frontier.020.f:0 "The plains were yielded, but not the kingdom. In the passes and strongholds of the high country, men spoke not of surrender, but of patience."
 sb_bst_frontier.020.a:0 "We will bide our time."

 sb_bst_frontier.100.t:0 "An Appeal from Basutoland"
 sb_bst_frontier.100.d:0 "Moshoeshoe's kingdom now asks Britain to accept it as a protectorate. If we refuse, Basutoland must face the Oranje frontier alone. If we accept, the mountain kingdom will pass beneath direct British protection."
 sb_bst_frontier.100.f:0 "The petition asked for no charity. It asked only that Britain's name stand between the mountains and the republics pressing toward them."
 sb_bst_frontier.100.a:0 "Take them under protection."
 sb_bst_frontier.100.b:0 "We will not intervene."

 sb_bst_frontier.110.t:0 "Boxed In by Britain"
 sb_bst_frontier.110.d:0 "Basutoland has passed beneath British protection. Whatever claims Oranje once laid upon the mountain country must now be set aside, for the frontier is increasingly hemmed in by British power."
 sb_bst_frontier.110.f:0 "The passes still led into the mountains, but now they led toward British protection. What might once have been seized must now be endured."
 sb_bst_frontier.110.a:0 "So the frontier closes."

 sb_bst_frontier.200.t:0 "The Cape Claims Basutoland"
 sb_bst_frontier.200.d:0 "The Cape now governs the whole Basutoland-facing frontier and asks to assume day-to-day authority over the protected mountain kingdom. London may shift the burden to Cape Town, or keep Basutoland under direct British protection."
 sb_bst_frontier.200.f:0 "Cape ministers say that a frontier governed from Cape Town should also be secured from Cape Town. What they seek is not consultation, but command."
 sb_bst_frontier.200.a:0 "Transfer the charge."
 sb_bst_frontier.200.b:0 "Keep it in British hands."

 sb_bst_frontier.220.t:0 "The Basotho Gun Question"
 sb_bst_frontier.220.d:0 "Cape ministers now govern Basutoland in practice, but Moshoeshoe's people remain armed, organized, and difficult to command from Cape Town. Officials argue that the protectorate can only be governed directly if Basotho firearms are surrendered."
 sb_bst_frontier.220.f:0 "The notice did not merely ask for guns. It asked the mountains to accept that Cape authority could now enter every valley."
 sb_bst_frontier.220.a:0 "Send the notice of disarmament."
 sb_bst_frontier.220.b:0 "Allow them to be."

 sb_bst_frontier.300.t:0 "The Drakensberg Tamed"
 sb_bst_frontier.300.d:0 "Basutoland has been broken as an independent frontier power. Oranje now turns from conquest to settlement, for the mountain country must be held in practice as well as on paper."
 sb_bst_frontier.300.f:0 "The passes had been opened, but every pass still had to be watched."
 sb_bst_frontier.300.a:0 "Settle the mountains."

 sb_bst_frontier.310.t:0 "The Vrystaat Secured"
 sb_bst_frontier.310.d:0 "Basutoland now commands the Vrystaat. What began as frontier resistance has become a wider political project, and the mountain kingdom can begin imagining a Sotho-Tswana order beyond the Caledon."
 sb_bst_frontier.310.f:0 "The plains had not swallowed the mountains. The mountains had come down to rule the plains."
 sb_bst_frontier.310.a:0 "The frontier is ours."

 sb_bst_frontier_raided:0 "Frontier in Alarm"
 sb_bst_frontier_raided_desc:0 "Basotho raids have unsettled the Oranje frontier."

 sb_bst_biding_time:0 "The Mountain Refuge"
 sb_bst_biding_time_desc:0 "Driven from the Vrystaat, the Basotho court gathers its strength in the highlands and waits for a better season."

 dyn_c_sb_sotho_tswana_nation:0 "Sotho-Tswana Nation"
 dyn_c_sb_sotho_tswana_nation_adj:0 "Sotho-Tswana"

 dp_sb_basotho_gun_war:0 "Basotho Gun War"
 dp_sb_basotho_gun_war_tooltip:1 "#header Start the $dp_sb_basotho_gun_war$ [concept_diplomatic_play]#!\n$TOOLTIP_DELIMITER$\n$dp_sb_basotho_gun_war_desc$"
 dp_sb_basotho_gun_war_desc:0 "Attempt to impose direct Cape rule over Basutoland after ordering Basotho disarmament."
