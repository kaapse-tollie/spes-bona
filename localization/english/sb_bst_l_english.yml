l_english:
 STA:0 "Sotho-Tswana Nation"
 STA_ADJ:0 "Sotho-Tswana"

 je_sb_bst_ora_frontier:0 "The Caledon Frontier"
 je_sb_bst_ora_frontier_reason:0 "The Great Trek has ended, yet the Caledon frontier remains unsettled. So long as Basutoland holds the Drakensberg, the question of the Vrystaat cannot be considered closed."
 je_sb_bst_ora_frontier_status:0 "Basutoland and Oranje still contend for the frontier. Raiding, British protection, or conquest may yet decide the question."

 je_sb_settle_drakensberg:0 "The Drakensberg Settled"
 je_sb_settle_drakensberg_reason:0 "Basutoland has been broken. If Oranje is to hold what it has won, the Drakensberg must now be settled and bound securely to the Boer world."
 je_sb_settle_drakensberg_status:0 "Control the whole Drakensberg and establish a meaningful Boer presence there."

 je_sb_sotho_tswana_nation:0 "A Sotho-Tswana Nation"
 je_sb_sotho_tswana_nation_reason:0 "Basutoland now stands over the Vrystaat and the mountain kingdom has become a force in the interior. If Boer power can be broken in Transvaal, a wider Sotho-Tswana order may yet be built."
 je_sb_sotho_tswana_nation_status:0 "To build such a state, Basutoland must hold the Vrystaat and the Drakensberg, embrace Nationalism, and drive Boer rule from Transvaal and Northern Transvaal."

 je_sb_bst_raid_oranje_button:0 "Raid the Frontier"
 je_sb_bst_raid_oranje_button_desc:0 "Send mounted raiders into the Oranje districts, carrying off cattle and coin while unrest spreads behind them."

 sb_seek_british_protection:0 "Appeal to Britain"
 sb_seek_british_protection_desc:0 "Ask Britain to take Basutoland under its protection against Oranje pressure. London will answer only once."

 sb_fold_drakensberg_under_direct_control:0 "Impose Direct Rule"
 sb_fold_drakensberg_under_direct_control_desc:0 "End indirect rule in Basutoland and bring the mountain country under direct Cape administration."

 sb_proclaim_sotho_tswana_nation:0 "Proclaim a Sotho-Tswana Nation"
sb_proclaim_sotho_tswana_nation_desc:0 "With a Tswana tributary secured and the Boer republics beaten back, Basutoland can proclaim a wider Sotho-Tswana nation."

 sb_bst_frontier.010.t:0 "A Raid Across the Frontier"
 sb_bst_frontier.010.d:0 "Basotho riders have crossed into the Vrystaat, driving off cattle, carrying away coin, and leaving dead settlers in their wake. The frontier remains open, and Oranje's hold upon it is weaker than its maps suggest."
 sb_bst_frontier.010.f:0 "At dawn the riders were gone again, leaving only trampled kraals, scattered livestock, and the knowledge that the mountain kingdom could still strike where it pleased."
 sb_bst_frontier.010.a:0 "So the struggle continues."

 sb_bst_frontier.020.t:0 "Into the Mountain Fastness"
 sb_bst_frontier.020.d:0 "The Basotho foothold in the Vrystaat has been lost. For now, the kingdom must withdraw into the highlands, preserve what strength it can, and endure the loss of the lowlands until a better season returns."
 sb_bst_frontier.020.f:0 "The plains lay open to the enemy, but the mountains remained. In the passes and strongholds of the high country, men spoke less of defeat than of waiting."
 sb_bst_frontier.020.a:0 "We will bide our time."

 sb_bst_frontier.100.t:0 "An Appeal from Basutoland"
 sb_bst_frontier.100.d:0 "Moshoeshoe's kingdom now asks Britain to accept it as a protectorate. If we refuse, Basutoland must face the Oranje frontier alone. If we accept, the mountain kingdom will pass beneath direct British protection."
 sb_bst_frontier.100.f:0 "The petition did not ask for charity. It asked for shelter, and for the weight of Britain to stand between the mountains and the republics pressing toward them."
 sb_bst_frontier.100.a:0 "Take them under protection."
 sb_bst_frontier.100.b:0 "We will not intervene."

 sb_bst_frontier.200.t:0 "The Cape Claims Basutoland"
 sb_bst_frontier.200.d:0 "The Cape now governs the whole Basutoland-facing frontier and asks to assume day-to-day authority over the protected mountain kingdom. London may shift the burden to Cape Town, or keep Basutoland under direct British protection."
 sb_bst_frontier.200.f:0 "Cape ministers argue that a frontier administered from Cape Town ought also to be secured from Cape Town. What they ask for is not advice, but authority."
 sb_bst_frontier.200.a:0 "Transfer the charge."
 sb_bst_frontier.200.b:0 "Keep it in British hands."

 sb_bst_frontier_raided:0 "Frontier in Alarm"
 sb_bst_frontier_raided_desc:0 "Recent Basotho incursions have shaken confidence and unsettled administration along the Oranje frontier."

 sb_bst_biding_time:0 "The Mountain Refuge"
 sb_bst_biding_time_desc:0 "With the Vrystaat foothold lost, the Basotho court has gathered what remains of the kingdom into the highlands and bent its economy toward endurance."

 dyn_c_sb_sotho_tswana_nation:0 "Sotho-Tswana Nation"
 dyn_c_sb_sotho_tswana_nation_adj:0 "Sotho-Tswana"
