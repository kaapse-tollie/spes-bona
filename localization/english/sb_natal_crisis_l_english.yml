l_english:
 sb_natal_crisis.020.c:0 "Take guns for the southern strip."
 sb_natal_crisis.025.t:0 "Land for Guns"
 sb_natal_crisis.025.d:0 "Dingane does not simply refuse the Retief deputation. He offers a harsher bargain: the Boers may found their coastal republic only if Oranje supplies the Zulu kingdom with imported firearms for five years. It is dangerous, but it would open Natal without war."
 sb_natal_crisis.025.f:0 "Land might be granted once. Guns, once delivered, would remain in the kingdom's hands long after the bargain was forgotten."
 sb_natal_crisis.025.a:0 "Accept the bargain."
 sb_natal_crisis.025.b:0 "Then we must take Natal."
 sb_natal_crisis.026.t:0 "Dingane's Price Refused"
 sb_natal_crisis.026.d:0 "The Boers have refused land for guns. If they will not buy Natal, they may try to take it, and the Qwabe frontier must be brought firmly under royal authority before the wagons return with muskets and commandos."
 sb_natal_crisis.026.f:0 "If the Boers would not meet the king's price, then they would meet his answer in the field."
 sb_natal_crisis.026.a:0 "Prepare for war."
 sb_natal_crisis.051.t:0 "Natal by Force"
 sb_natal_crisis.051.d:0 "The bargain has failed. The Zulu now move to absorb the southern frontier, and the Natal question becomes a military one. If a republic is to be won on the coast, it must be won by commando and laager."
 sb_natal_crisis.051.f:0 "What was not granted in council would now have to be won by mounted men and wagons."
 sb_natal_crisis.051.a:0 "We must withdraw."
 sb_natal_crisis.051.b:0 "Send for Pretorius."
 sb_natal_crisis.010.t:0 "Toward Natal"
 sb_natal_crisis.010.d:0 "The trekkers of Oranje now look toward Natal. Beyond the Tugela lie richer pasture, a road to the sea, and perhaps a sister republic. Yet no settlement can be planted there without first reckoning with Dingane, and Piet Retief offers to ride to the king himself."
 sb_natal_crisis.010.f:0 "Natal offered pasture, ports, and a way out of inland dependence. It also offered Dingane."
 sb_natal_crisis.010.a:0 "Send Retief."
 sb_natal_crisis.010.b:0 "The risk is too great."
 sb_natal_crisis_010_a_warning_tt:0 "#bold #n Sending Retief may yet bring war with the Zulu kingdom.#!#!"
 sb_natal_crisis.020.t:0 "Retief Before Dingane"
 sb_natal_crisis.020.d:0 "Retief has recovered the stolen cattle, yet the Boer deputation still stands before Dingane asking leave to settle south of the Tugela. Some councillors see a buffer against Port Natal; others see future masters arriving with wagons and rifles."
 sb_natal_crisis.020.f:0 "A king might grant pasture, but he had first to judge what followed the herds."
 sb_natal_crisis.020.a:0 "Grant the strip."
 sb_natal_crisis.020.b:0 "Kill Retief."
 sb_natal_crisis.021.t:0 "Whispers at Court"
 sb_natal_crisis.021.d:0 "Dingane's concession has bought time on the frontier, but not silence at court. Men who favored harder measures now whisper that the king has traded prestige for peace."
 sb_natal_crisis.021.f:0 "The bargain quieted the frontier for a moment, but not the kraal."
 sb_natal_crisis.021.a:0 "The throne must endure."
 sb_natal_crisis.030.t:0 "Natalia"
 sb_natal_crisis.030.d:0 "Dingane has recognized Boer settlement south of the Tugela. A precarious bargain now becomes a republic: Natalia, thinly peopled, ambitious, and exposed. For Oranje it promises a road to the sea and less dependence on British ports."
 sb_natal_crisis.030.f:0 "The road to the sea had opened, but no one mistook it for a secure one."
 sb_natal_crisis.030.a:0 "Let Natalia be founded."
 sb_natal_crisis.030.b:0 "Lead Natalia."
 sb_natal_crisis.050.t:0 "Retief Murdered"
 sb_natal_crisis.050.d:0 "Dingane has answered the Retief expedition with murder and annexation. The Qwabe lands south of the Tugela are already being absorbed, and the Natal venture now turns on whether Oranje will answer grief with war."
 sb_natal_crisis.050.f:0 "The deputation did not return. From that moment the Natal venture ceased to be negotiation."
 sb_natal_crisis.050.a:0 "We must withdraw."
 sb_natal_crisis.050.b:0 "Send for Pretorius."
 sb_natal_crisis.070.t:0 "Blood River"
 sb_natal_crisis.070.d:0 "The Zulu have been beaten back and the road to Natal forced open. What Dingane would not concede in council has now been decided by laager and musket. A new Boer republic may now be founded on the coast."
 sb_natal_crisis.070.f:0 "Blood River had opened Natal, but not ended the struggle for it."
 sb_natal_crisis.070.a:0 "Let Natalia be founded."
 sb_natal_crisis.070.b:0 "Lead Natalia."
 sb_natal_crisis.080.t:0 "Natal Held"
 sb_natal_crisis.080.d:0 "The Boers have been crushed, though some of their strange weapons were taken from the field. Natal now lies fully in Zulu hands, and Dingane's authority has survived its hardest trial since the first wagons crossed toward the coast."
 sb_natal_crisis.080.f:0 "Let the Boers carry the tale inland if they wished: Natal remained Zulu land."
 sb_natal_crisis.080.a:0 "We must consider our next step."
 sb_natal_crisis_080_b_warning_tt:0 "#bold #n Seizing Port Natal may bring Britain into the struggle.#!#!"
 sb_natal_crisis.085.t:0 "Port Natal Raided"
 sb_natal_crisis.085.d:0 "Reports have at last reached Britain that Dingane's victory over the Boers has spilled onto the coast itself. What began as a frontier struggle in Natal now threatens British authority on the southeastern seaboard."
 sb_natal_crisis.085.f:0 "The coast, British officials now insisted, could not be left to those who struck first and negotiated later."
 sb_natal_crisis.085.a:0 "Britain must answer."
 sb_natal_crisis.085.b:0 "We have larger concerns."
 sb_natal_crisis.100.t:0 "The Coast Question"
 sb_natal_crisis.100.d:0 "Natalia is no longer an improvised trekker settlement. With a port active on the southeastern seaboard, the Colonial Office argues that a Boer-controlled coast weakens the Cape and cannot be left to harden into a permanent power."
 sb_natal_crisis.100.f:0 ""No uncertain sovereignty," argued the Colonial Office, "can be tolerated on this coast.""
 sb_natal_crisis.100.a:0 "Let the ultimatum go."
 sb_natal_crisis.100.b:0 "Let Natalia stand."
 sb_natal_crisis.110.t:0 "Britain's Ultimatum"
 sb_natal_crisis.110.d:0 "Britain now demands that Natalia submit to the Crown. Submission would preserve the settlement but turn it into a colony. Refusal means a quick strike for Port Natal and an appeal to the inland republics."
 sb_natal_crisis.110.f:0 "The sea offered no shelter if it belonged to Britain."
 sb_natal_crisis.110.a:0 "Submit and preserve what remains."
 sb_natal_crisis.110.b:0 "Refuse. Seize Port Natal and stand."
 sb_natal_crisis.111.t:0 "Natalia Appeals to Oranje"
 sb_natal_crisis.111.d:0 "Britain has demanded submission from Natalia, and the republic has answered by seizing Port Natal before the Crown can dictate the coast from ashore. Oranje is now asked to renew the common Boer cause."
 sb_natal_crisis.111.f:0 "If Natal stood alone, the coast was lost."
 sb_natal_crisis.111.a:0 "We will stand with Natalia."
 sb_natal_crisis.111.b:0 "The risk is too great."
 sb_natal_crisis.112.t:0 "Shall Transvaal Answer?"
 sb_natal_crisis.112.d:0 "Britain has demanded that Natalia submit, and the coast has answered with defiance. If Transvaal supports Natalia now, the Boer republics will stand together against imperial command of the sea-road."
 sb_natal_crisis.112.f:0 ""If the coast falls today, the interior will answer for it tomorrow.""
 sb_natal_crisis.112.a:0 "We will answer."
 sb_natal_crisis.112.b:0 "Natal stands alone."
 sb_natal_crisis.113.t:0 "Shall Zoutpansberg Answer?"
 sb_natal_crisis.113.d:0 "Britain now moves openly against Natalia. If Zoutpansberg joins the struggle, the crisis becomes a wider Boer stand against imperial pressure on the coast."
 sb_natal_crisis.113.f:0 "Natalia now asks whether the northern trekkers still remember the common cause."
 sb_natal_crisis.113.a:0 "We will answer."
 sb_natal_crisis.113.b:0 "We stand aside."
 sb_natal_crisis.114.t:0 "Natalia Defiant"
 sb_natal_crisis.114.d:0 "Natalia has rejected the British ultimatum. What might have been settled by submission must now be settled by force, and the road to the southeast becomes a matter of war."
 sb_natal_crisis.114.f:0 ""Then force will decide it.""
 sb_natal_crisis.114.a:0 "Force their submission."
 sb_natal_crisis.115.t:0 "Natalia Lost"
 sb_natal_crisis.115.d:0 "Whether by submission or defeat, Natalia can no longer stand apart from Britain. The republic is now being folded into imperial rule, and many Boer families prepare to abandon the coast rather than live beneath the Crown."
 sb_natal_crisis.115.f:0 ""If Natal cannot remain free, the wagons must turn inland again.""
 sb_natal_crisis.115.a:0 "Then we must yield."
 sb_natal_crisis.116.t:0 "Natal Refugees"
 sb_natal_crisis.116.d:0 "Natalia has passed under British rule, and Boer families unwilling to remain on the coast now turn inland once more. Oranje receives them as refugees carrying stock, wagons, and resentment from a lost republic."
 sb_natal_crisis.116.f:0 ""The sea-road is closed. Then we must make room inland.""
 sb_natal_crisis.116.a:0 "Receive them."
 sb_natal_crisis.117.t:0 "Natal Refugees in Transvaal"
 sb_natal_crisis.117.d:0 "Natalia has passed under British rule, and the surviving Boer families now look north toward Transvaal. Their arrival will bring manpower, wagons, and a renewed bitterness toward the Crown in equal measure."
 sb_natal_crisis.117.f:0 ""If the coast is barred to us, the highveld must receive us.""
 sb_natal_crisis.117.a:0 "Receive them."
 sb_natal_crisis.118.t:0 "Shall Lydenburg Answer?"
 sb_natal_crisis.118.d:0 "Britain's move against Natalia now tests every inland republic. If Lydenburg answers the call, the crisis becomes a shared Boer war. If not, Natalia may be crushed alone and the Empire will learn how easily the frontier can be divided."
 sb_natal_crisis.118.f:0 ""If Natalia falls without aid, none of us should expect lighter terms later," the eastern men warned."
 sb_natal_crisis.118.a:0 "Lydenburg will answer."
 sb_natal_crisis.118.b:0 "We shall stand aside."
sb_natal_crisis_gain_firearms_10:0 "Gain #v +10%#! progress toward #bold Adoption of Firearms#!"
