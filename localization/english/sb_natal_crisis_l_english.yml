l_english:
 sb_natal_crisis.020.c:0 "Sell the southern strip for guns."
 sb_natal_crisis.025.t:0 "A Kingdom for Guns"
 sb_natal_crisis.025.d:0 "Dingane has not simply refused the Retief deputation. Instead he offers a harder bargain: the Boers may found their coastal republic, but only if Oranje agrees to feed the Zulu Kingdom with imported firearms for five years. It is a dangerous trade. Yet it would open Natal without war, and still loosen our dependence on British ports."
 sb_natal_crisis.025.f:0 "\"Land can be granted once. Guns, once sold, cannot be called back.\""
 sb_natal_crisis.025.a:0 "Accept Dingane's bargain."
 sb_natal_crisis.025.b:0 "Reject it. We will take Natal by force."
 sb_natal_crisis.026.t:0 "The Boers Refuse the Bargain"
 sb_natal_crisis.026.d:0 "The Boers have rejected Dingane's offer of land in exchange for guns. If they will not buy Natal, they may yet try to seize it. The Qwabe frontier must be brought firmly under Zulu authority before the wagons return with muskets and commandos."
 sb_natal_crisis.026.f:0 "\"If they refuse the king's price, then let them face the king's spear.\""
 sb_natal_crisis.026.a:0 "Reclaim the frontier and prepare for war."
 sb_natal_crisis.051.t:0 "Natal Must Be Won by Force"
 sb_natal_crisis.051.d:0 "Dingane offered land for guns; Oranje refused. The Zulu have now moved to absorb the whole southern frontier instead, and the Natal question has become a military one. If we are to win a republic on the coast now, it must be done by commando and laager rather than bargain."
 sb_natal_crisis.051.f:0 "\"Since the bargain has failed, Natal must be taken by force.\""
 sb_natal_crisis.051.a:0 "We must back down."
 sb_natal_crisis.051.b:0 "Then we will take Natal by force. Send for Pretorius!"
sb_natal_crisis.010.t:0 "An Expedition to Natal"
sb_natal_crisis.010.d:0 "The trekkers of Oranje now look toward Natal. Beyond the Tugela lie richer pasture, a possible road to the sea, and perhaps a sister Boer republic whose coast could loosen the interior's dependence on British ports and British markets. But no settlement can be planted there without first reckoning with Dingane. Piet Retief now offers to ride to the Zulu king himself and ask leave to found a Boer community in southern Natal."
sb_natal_crisis.010.f:0 "\"If Natal is to be ours, it must first be asked for or fought for.\""
sb_natal_crisis.010.a:0 "Send Retief to Dingane."
sb_natal_crisis.010.b:0 "Natal is too dangerous a venture."
sb_natal_crisis_010_a_warning_tt:0 "#bold #n Sending Retief may still lead to war with the Zulu Chiefdom.#!#!"
 sb_natal_crisis.020.t:0 "Retief at uMgungundlovu"
 sb_natal_crisis.020.d:0 "Retief has done as he claimed he would and recovered the cattle taken on the frontier, yet the Boer deputation still stands before Dingane asking leave to settle south of the Tugela. Some councillors see an opportunity to turn these settlers into a buffer against the British at Port Natal. Others warn that men who arrive with wagons and rifles do not ask for land as guests, but as future masters."
 sb_natal_crisis.020.f:0 "\"A king may grant pasture, but he must judge what follows the herds.\""
 sb_natal_crisis.020.a:0 "Honor the bargain and grant them the southern strip."
 sb_natal_crisis.020.b:0 "Kill Retief and seize the whole frontier."
 sb_natal_crisis.021.t:0 "Murmurs at the Royal Kraal"
 sb_natal_crisis.021.d:0 "Dingane's concession has bought time on the frontier, but not silence at court. Men who already favored harder measures now whisper that the king has traded away prestige for peace, and that the southern frontier may yet become a wound the dynasty cannot easily close."
 sb_natal_crisis.021.f:0 "\"A bargain may quiet the frontier, but it does not quiet the court.\""
 sb_natal_crisis.021.a:0 "The throne must weather the whispers."
 sb_natal_crisis.030.t:0 "Natalia Proclaimed"
sb_natal_crisis.030.d:0 "Dingane has recognized Boer settlement south of the Tugela. A precarious bargain now becomes a republic of its own: Natalia, thinly peopled, ambitious, and exposed. Yet for Oranje this new Boer republic is more than a frontier experiment. It promises transit to the sea and a first step away from total dependence on British ports and British markets."
sb_natal_crisis.030.f:0 "\"The road to the ocean is open, but it will not remain unchallenged.\""
sb_natal_crisis.030.a:0 "Excellent. Let Natalia be founded."
sb_natal_crisis.030.b:0 "Found Natalia and lead it."
 sb_natal_crisis.050.t:0 "Retief is Killed"
 sb_natal_crisis.050.d:0 "Dingane has answered the Retief expedition with murder and annexation. The Qwabe lands south of the Tugela are already being absorbed into the Zulu frontier, and the whole Natal venture now stands or falls on whether Oranje is willing to turn grief into revenge. To retreat is humiliating. To fight means calling on Pretorius and staking Boer hopes on the field."
 sb_natal_crisis.050.f:0 "\"Retief is dead. If Natal is to be won now, it must be won in vengeance.\""
 sb_natal_crisis.050.a:0 "We must back down."
 sb_natal_crisis.050.b:0 "We will avenge Retief. Send for Pretorius!"
 sb_natal_crisis.070.t:0 "Victory at Blood River"
sb_natal_crisis.070.d:0 "The Zulu have been beaten back and the road to Natal has been forced open. What Dingane would not concede in council has now been decided by laager, musket, and the bitter memory of Blood River. A new Boer republic may now be founded on the coast, and with it a route that weakens Oranje's dependence on British ports and British markets."
sb_natal_crisis.070.f:0 "\"Blood River has opened Natal, but not ended the struggle for it.\""
sb_natal_crisis.070.a:0 "Excellent. Let Natalia be founded."
sb_natal_crisis.070.b:0 "Establish Natalia and lead it."
sb_natal_crisis.080.t:0 "Dingane Holds Natal"
sb_natal_crisis.080.d:0 "The Boers have been crushed, despite their strange weapons which we have picked a few items of up. Natal remains now fully under Zulu hands. Dingane's authority has survived its hardest trial since the first wagons crossed toward the coast. With the lands south of the Tugela river now firmly under control of the royal court, some ponder whether to press ahead and seize the small european trading port of Port Natal."
sb_natal_crisis.080.f:0 "\"Let them carry their story inland: Natal is Zulu land!\""
sb_natal_crisis.080.a:0 "We must weigh our next move carefully."
sb_natal_crisis_080_b_warning_tt:0 "#bold #n Seizing Port Natal may bring Great Britain into the war.#!#!"
sb_natal_crisis.085.t:0 "The Raid on Port Natal"
sb_natal_crisis.085.d:0 "Weeks after the seizure of Port Natal, reports have at last reached Britain that Dingane's victory over the Boers has spilled onto the coast itself. What began as a frontier struggle in Natal now threatens to become a direct test of British authority on the southeastern seaboard. If Britain answers now, it will be with annexation rather than a mere protectorate demand."
sb_natal_crisis.085.f:0 "\"The coast cannot be left to those who strike first and negotiate later.\""
sb_natal_crisis.085.a:0 "Then Britain must answer."
sb_natal_crisis.085.b:0 "We have larger concerns than Port Natal."
 sb_natal_crisis.100.t:0 "The Natal Question"
 sb_natal_crisis.100.d:0 "Natalia has crossed the threshold from improvised trekker settlement to functioning coastal republic. With a port now active on the southeastern seaboard, the colonial office argues that the question can no longer be postponed: a Boer-controlled coast weakens the Cape, threatens British influence in southern Africa, and cannot be left to ripen into a permanent independent power."
 sb_natal_crisis.100.f:0 "\"No uncertain sovereignty can be tolerated on this coast.\""
 sb_natal_crisis.100.a:0 "Send the ultimatum."
 sb_natal_crisis.100.b:0 "Let Natalia stand — for now."
 sb_natal_crisis.110.t:0 "An Ultimatum from Britain"
 sb_natal_crisis.110.d:0 "Britain now demands that Natalia submit to the Crown. London is not content to let a Boer republic escape imperial economic control on the southeastern coast. Submission would preserve the settlement but turn it into a British colony. Refusal means a quick strike for Port Natal and an appeal to the inland republics before Britain can close the coast."
 sb_natal_crisis.110.f:0 "\"The sea offers no shelter if it belongs to Britain.\""
 sb_natal_crisis.110.a:0 "Submit and preserve what we can."
 sb_natal_crisis.110.b:0 "Refuse — seize Port Natal and stand."
 sb_natal_crisis.111.t:0 "Natal Appeals to Oranje"
 sb_natal_crisis.111.d:0 "Britain has demanded submission from Natalia, and the republic has answered by seizing Port Natal before the Crown can dictate the coast from a foothold on shore. Oranje is now asked to renew the common Boer cause. If Oranje refuses, Natalia will face Britain alone and remember who left it so."
 sb_natal_crisis.111.f:0 "\"If Natal stands alone, the coast is lost. If we stand together, Britain must reckon with all of us.\""
 sb_natal_crisis.111.a:0 "Oranje will stand with Natalia."
 sb_natal_crisis.111.b:0 "We cannot risk war with Britain."
 sb_natal_crisis.112.t:0 "Shall Transvaal Support Natalia?"
 sb_natal_crisis.112.d:0 "Britain has demanded that Natalia submit, and the coast has answered with defiance. If Transvaal supports Natalia now, the Boer republics will stand together against imperial control of the sea-road. If not, Britain will learn that the coast can be picked off from the interior one republic at a time."
 sb_natal_crisis.112.f:0 "\"If the coast falls today, the interior may answer for it tomorrow.\""
 sb_natal_crisis.112.a:0 "We will support Natalia."
 sb_natal_crisis.112.b:0 "Natal must face its own fate."
 sb_natal_crisis.113.t:0 "Shall Zoutpansberg Support Natalia?"
 sb_natal_crisis.113.d:0 "Britain now moves openly against Natalia. If Zoutpansberg joins the struggle, the crisis becomes a wider Boer stand against imperial pressure on the coast. If it stays aloof, Natalia may fall alone and London will learn that the inland republics can be dealt with one by one."
 sb_natal_crisis.113.f:0 "\"Natalia asks whether the northern trekkers still remember the common cause.\""
 sb_natal_crisis.113.a:0 "Zoutpansberg will stand with Natalia."
 sb_natal_crisis.113.b:0 "We cannot risk war with Britain."
 sb_natal_crisis.114.t:0 "Natalia Defies the Crown"
 sb_natal_crisis.114.d:0 "Natalia has rejected the British ultimatum. What might have been resolved by submission must now be settled by force, and the road to the southeast becomes a matter of war rather than argument."
 sb_natal_crisis.114.f:0 "\"Then we shall instruct them by arms.\""
 sb_natal_crisis.114.a:0 "Compel submission."
 sb_natal_crisis.115.t:0 "The Republic Is Lost"
 sb_natal_crisis.115.d:0 "Whether by submission or by defeat, Natalia can no longer stand apart from Britain. The republic is being folded into imperial rule, and many Boer families now prepare to abandon the coast rather than live beneath the Crown."
 sb_natal_crisis.115.f:0 "\"If Natal cannot remain free, then the wagons must turn inland again.\""
 sb_natal_crisis.115.a:0 "We have no choice but to yield."
 sb_natal_crisis.116.t:0 "Refugees from Natal"
 sb_natal_crisis.116.d:0 "Natalia has fallen under British rule, and Boer families unwilling to remain on the coast now turn inland once more. Oranje receives them not as pioneers setting out in hope, but as refugees carrying stock, wagons, and resentment from a lost republic."
 sb_natal_crisis.116.f:0 "\"The sea-road is shut to us. Then we must make room inland.\""
 sb_natal_crisis.116.a:0 "Take them in."
 sb_natal_crisis.117.t:0 "Refugees from Natal"
 sb_natal_crisis.117.d:0 "Natalia has fallen under British rule, and the surviving Boer families now look north toward Transvaal. Their arrival will bring manpower, wagons, and a renewed bitterness toward the Crown in equal measure."
 sb_natal_crisis.117.f:0 "\"If the coast is barred, the highveld must receive them.\""
 sb_natal_crisis.117.a:0 "Take them in."
 sb_natal_crisis.118.t:0 "Shall Lydenburg Support Natalia?"
 sb_natal_crisis.118.d:0 "Britain's move against Natalia now tests every inland republic. If Lydenburg answers the call, the British crisis becomes a shared Boer war. If not, Natalia may be crushed alone and the empire will learn how easily the frontier can be divided."
 sb_natal_crisis.118.f:0 "\"If Natalia falls without aid, none of us should expect gentler terms later.\""
 sb_natal_crisis.118.a:0 "Lydenburg will support Natalia."
 sb_natal_crisis.118.b:0 "We must stand aside."
 sb_natal_crisis_gain_firearms_10:0 "Gain #v 10% firearms#! prgress"
