l_english:
 sb_griqualand_west.020.t:0 "Kimberley"
 sb_griqualand_west.020.d:0 "Diamonds around Kimberley have transformed an inland frontier dispute into a regional sovereignty crisis. The fields sit under [SCOPE.sCountry('kimberley_holder').GetName], but the Cape cannot ignore what they will do to trade, migration, and Boer ambition across the interior."
 sb_griqualand_west.020.f:0 "\"Once the stones are known, no map will remain innocent for long.\""
 sb_griqualand_west.020.a:0 "Send an envoy to London for an expedition."
 sb_griqualand_west.020.b:0 "Offer protection from the Boers."
 sb_griqualand_west.020.c:0 "Ask London to organize an expedition."
 sb_griqualand_west.020.e:0 "Do nothing."
 sb_griqualand_west.021.t:0 "Diamonds at Kimberley"
 sb_griqualand_west.021.d:0 "Prospectors have confirmed that the ground around Kimberley contains diamonds in quantity. What had been a remote frontier holding is now a magnet for capital, migrants, and claims from every power with an interest in Southern Africa."
 sb_griqualand_west.021.f:0 "\"The first stone was small enough to pocket. The rush it began was not.\""
 sb_griqualand_west.021.a:0 "The fields are ours to work."
 sb_griqualand_west.022.t:0 "A Cape Petition Over Kimberley"
 sb_griqualand_west.022.d:0 "The Cape ministry has asked London to back a firmer settlement around Kimberley. The request frames the diamond fields as an imperial trade and security problem, but endorsing it would also pull Britain deeper into the sovereignty dispute."
 sb_griqualand_west.022.f:0 "\"No frontier petition is ever merely local once the stones glitter brightly enough.\""
 sb_griqualand_west.022.a:0 "Authorize the expedition."
 sb_griqualand_west.022.b:0 "London has other priorities."
 sb_griqualand_west_kimberley_london_expedition_tt:0 "Britain backs a coercive Kimberley claim, adding pressure and claims against the current holder of the fields."
 sb_griqualand_west_kimberley_wbl_protection_tt:0 "If the Cape is fully liberal, Waterboersland is annexed directly; otherwise Waterboersland becomes a Cape puppet."
 sb_griqualand_west_glw_arbitration_tt:0 "Sets the opening Griqualand West route to a treaty-first arbitration path."
 sb_griqualand_west_glw_hardline_tt:0 "Sets the opening Griqualand West route to a hardline regularization path and sharpens frontier claims."
