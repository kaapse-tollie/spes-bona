l_english:
sb_griqualand_west.020.t:0 "Kimberley in Question"
sb_griqualand_west.020.d:0 "Diamonds around Kimberley have transformed a frontier dispute into a question of regional sovereignty. The fields lie under [SCOPE.sCountry('kimberley_holder').GetName], but the Cape cannot ignore what they will do to trade, migration, and Boer ambition across the interior."
sb_griqualand_west.020.f:0 "Once the stones were known, no map in the interior could remain innocent for long. Every frontier line now had a price attached to it."
sb_griqualand_west.020.a:0 "Ask London to act."
sb_griqualand_west.020.b:0 "Offer protection."
sb_griqualand_west.020.c:0 "Leave it to London."
sb_griqualand_west.020.e:0 "Do nothing."
sb_griqualand_west.021.t:0 "The Kimberley Diamond Fields"
sb_griqualand_west.021.d:0 "Prospectors have confirmed that the ground around Kimberley holds diamonds in quantity. What had been a remote frontier holding is now a magnet for capital, migrants, and rival claims from every power with an interest in Southern Africa."
sb_griqualand_west.021.f:0 "The first stone was small enough to pocket. The rush that followed was not, and before long the whole interior would feel its pull."
sb_griqualand_west.021.a:0 "The fields will be worked."
sb_griqualand_west.022.t:0 "The Cape Petitions London"
sb_griqualand_west.022.d:0 "The Cape ministry has asked London to back a firmer settlement around Kimberley. The petition presents the diamond fields as an imperial question of trade and security, but to endorse it would also draw Britain deeper into the sovereignty dispute."
sb_griqualand_west.022.f:0 "No frontier petition is ever merely local once the stones glitter brightly enough. Kimberley now asks London for more than attention."
sb_griqualand_west.022.a:0 "Authorize it."
sb_griqualand_west.022.b:0 "We have other priorities."
sb_griqualand_west_kimberley_london_expedition_tt:0 "Britain backs a coercive settlement at Kimberley, sharpening pressure and claims against the present holder of the fields."
sb_griqualand_west_kimberley_wbl_protection_tt:0 "A fully liberal Cape annexes Waterboersland directly; otherwise it is reduced to a Cape puppet."
sb_griqualand_west_glw_arbitration_tt:0 "Places Griqualand West on a treaty-first course."
sb_griqualand_west_glw_hardline_tt:0 "Places Griqualand West on a hardline course and sharpens frontier claims."
