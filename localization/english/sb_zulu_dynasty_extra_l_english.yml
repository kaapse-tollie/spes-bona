 sb_boer_zulu.203.t:0 "Traders on the Coast"
 sb_boer_zulu.203.d:0 "Coastal intermediaries offer access to more firearms and powder if the court is willing to tolerate their growing influence. The exchange could strengthen the chiefdom's military modernization, but it would also loosen royal control over who profits from the coast."
 sb_boer_zulu.203.f:0 "\"The king may buy guns, but the coast always asks its own price.\""
 sb_boer_zulu.203.a:0 "Take the guns and tolerate the traders."
 sb_boer_zulu.203.b:0 "Keep the coast on a tighter leash."
 sb_boer_zulu.095.t:0 "Boer Consolidation on the Frontier"
 sb_boer_zulu.095.d:0 "The eastern Boer republics are no longer a scattering of trekker camps. With Lydenburg folded into a more coherent Transvaal polity, pressure is now falling on our western frontier. Boer negotiators speak of regularizing settlement and securing the escarpment, but what they want are the northern marches that our people still hold."
 sb_boer_zulu.095.f:0 "\"A small kingdom does not always choose the ground on which it bargains.\""
 sb_boer_zulu.095.a:0 "Buy time. Give up the northern frontier for guns and peace."
 sb_boer_zulu.095.b:0 "Refuse them. The frontier will not be sold."
 sb_boer_zulu_095_a_tt:0 "Cede the four disputed frontier provinces to #v Transvaal#!, gain firearms assistance, improve relations, and secure a long truce."
 sb_boer_zulu_095_b_tt:0 "Keep the disputed frontier, worsen relations with #v Transvaal#!, and leave the issue unsettled."
 sb_boer_zulu.096.t:0 "Between a Rock and a Hard Place"
 sb_boer_zulu.096.d:0 "The frontier has hardened around us. Boer consolidation presses from the inland plateau, while Britain's authority now stands openly in Natal. Some of our councillors argue that accommodation with the empire could preserve Swazi independence better than facing both neighbors alone. Others warn that one protector soon invites another master."
sb_boer_zulu.096.f:0 "\"When the plains close and the coast belongs to another, a kingdom survives by choosing which power to keep nearest.\""
sb_boer_zulu.096.a:0 "Seek accommodation with Britain."
sb_boer_zulu.096.b:0 "Stand apart. We will depend on ourselves."
sb_boer_zulu_096_a_tt:0 "Remain independent, but seek British backing through trade ties, a guarantee, and an embassy presence."
sb_boer_zulu_096_b_tt:0 "Remain independent and unaligned, gaining a temporary defensive prestige boost instead of British shelter."
sb_boer_zulu.097.t:0 "The Swazi Broken"
sb_boer_zulu.097.d:0 "Dingane has forced the Swazi from the field and restored the aura of strength that had been fraying since the Natal crisis. The court reads the victory as proof that the king can still settle the nearer frontier by arms, and his councillors now speak more openly of the escarpment and marches beyond."
sb_boer_zulu.097.f:0 "\"A king who masters the nearer hills need not fear whispers from farther off.\""
sb_boer_zulu.097.a:0 "The eastern frontier remembers its master."
