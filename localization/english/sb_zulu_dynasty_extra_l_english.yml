 sb_boer_zulu.094.t:0 "The Swazi Question"
 sb_boer_zulu.094.d:0 "Dingane's court now looks eastward toward the Swazi. The frontier there is unsettled, the royal house is eager for a demonstration of strength, and some counsellors argue that victory over the Swazi would steady the dynasty after the humiliations of the Natal struggle. Others warn that another failed campaign could undo the throne entirely."
 sb_boer_zulu.094.f:0 "\"A king who cannot master the nearer frontier invites questions at every other one.\""
 sb_boer_zulu.094.a:0 "Strike at the Swazi and settle the frontier."
 sb_boer_zulu.094.b:0 "We cannot risk another failure."

 sb_boer_zulu.200.t:0 "Rumors in the Royal House"
 sb_boer_zulu.200.d:0 "Stories now pass from homestead to regiment that another branch of the royal house may yet have a stronger claim than the king's chosen line. Such talk can be smothered, but not for free."
 sb_boer_zulu.200.f:0 "\"A rumor about succession is never only a rumor.\""
 sb_boer_zulu.200.a:0 "Silence the whispers with gifts and cattle."
 sb_boer_zulu.200.b:0 "Let them talk; loyalty must be earned openly."


 sb_boer_zulu.201.t:0 "The Regiments Demand Cattle"
 sb_boer_zulu.201.d:0 "Several amabutho complain that their cattle dues and wartime expectations have not been honored. Paying them would steady the king's standing among the regiments, but it would come at real cost."
 sb_boer_zulu.201.f:0 "\"A regiment that feels cheated does not forget it on the march.\""
 sb_boer_zulu.201.a:0 "Pay what is owed and keep the regiments loyal."
 sb_boer_zulu.201.b:0 "The treasury cannot indulge every complaint."

 sb_boer_zulu.202.t:0 "Factions in the Great House"
 sb_boer_zulu.202.d:0 "Senior women of the royal household and their allies are pressing competing claims at court. Backing one side might quiet the palace for a time, but it risks feeding jealousies elsewhere."
 sb_boer_zulu.202.f:0 "\"The throne is not only held in the cattle kraal; it is bargained over in the royal homestead as well.\""
 sb_boer_zulu.202.a:0 "Buy peace in the court."
 sb_boer_zulu.202.b:0 "Balance the factions and trust the king's prestige."

