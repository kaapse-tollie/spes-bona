 je_sb_zulu_enforce_dynastic_claims_button:0 "Enforce Dynastic Claims"
 je_sb_zulu_enforce_dynastic_claims_button_desc:0 "Commit the court and the royal household to actively policing rival lines and asserting the crown's preferred succession."
 je_sb_zulu_enforce_dynastic_claims_button_tt:0 "Requires at least #v 100#! available [concept_authority]"
 je_sb_zulu_relax_dynastic_claims_button:0 "Relax Dynastic Claims"
 je_sb_zulu_relax_dynastic_claims_button_desc:0 "Ease the pressure on rival houses and let the court breathe, at the cost of some of the throne's direct grip on the succession."

 sb_zulu_enforcing_dynastic_claims:0 "Dynastic Claims Enforced"
 sb_zulu_enforcing_dynastic_claims_desc:0 "The royal court is spending heavily from its political capacity to police rival claimants, steady the succession, and present a single accepted line of inheritance."
 sb_zulu_drift_enforced_dynastic_claims:0 "Dynastic Claims Enforced"

 sb_boer_principality_status:0 "Principality Recognized"
 sb_boer_principality_status_desc:0 "The republic now carries itself with the dignity and political weight of an established inland principality."
 sb_boer_grand_principality_status:0 "Grand Principality of the Highveld"
 sb_boer_grand_principality_status_desc:0 "The republic's authority now extends broadly enough across the highveld to justify a grander standing among the inland states."

