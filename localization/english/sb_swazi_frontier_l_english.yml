l_english:
sb_swazi_frontier_rearmed:0 "The Frontier Rearmed"
sb_swazi_frontier_rearmed_desc:0 "Fresh firearms and a temporary settlement have steadied the kingdom's western marches."
sb_swazi_frontier_grievance:0 "A Frontier Grievance"
sb_swazi_frontier_grievance_desc:0 "The disputed northern frontier remains a live grievance within the republic, and settlers and commandants are pressing for a harder line."
sb_swazi_frontier_muster:0 "A Frontier Muster"
sb_swazi_frontier_muster_desc:0 "The Swazi have called up men from the frontier districts, swelling a small standing force into a broader defensive host."
sb_swazi_frontier_muster_vs_player:0 "Frontier Resolve"
sb_swazi_frontier_muster_vs_player_desc:0 "With a dangerous enemy pressing the kingdom, the Swazi councils have committed additional reserves to the defense of the frontier."
sb_swazi_frontier.094.t:0 "The Swazi Frontier"
sb_swazi_frontier.094.d:0 "Dingane's court now looks eastward toward the Swazi. The frontier there is unsettled, and some councillors argue that victory would steady the dynasty after the humiliations of the Natal struggle. Others warn that another failed campaign could undo the throne altogether."
sb_swazi_frontier.094.f:0 "A king who cannot master the nearer frontier, said the harder councillors, invites questions at every other one."
sb_swazi_frontier.094.a:0 "Strike east."
sb_swazi_frontier.094.b:0 "We cannot risk it."
sb_swazi_frontier.095.t:0 "Boer Pressure in the West"
sb_swazi_frontier.095.d:0 "The eastern Boer republics are no longer a scattering of trekker camps. With Lydenburg folded into a more coherent Transvaal polity, pressure now falls upon our western frontier. Boer negotiators speak of regularizing settlement and securing the escarpment, but what they seek are the northern marches our people still hold."
sb_swazi_frontier.095.f:0 "A small kingdom does not always choose the ground on which it bargains. Sometimes it is merely forced to decide what can still be preserved."
sb_swazi_frontier.095.a:0 "Buy time with land."
sb_swazi_frontier.095.b:0 "The frontier is not for sale."
sb_swazi_frontier_095_a_tt:0 "Cede the four disputed frontier provinces to #v Transvaal#!, gain firearms assistance, improve relations, and secure a long truce."
sb_swazi_frontier_095_b_tt:0 "Keep the disputed frontier, worsen relations with #v Transvaal#!, and leave the question unresolved."
sb_swazi_frontier.096.t:0 "Caught Between Powers"
sb_swazi_frontier.096.d:0 "The frontier has hardened around us. Boer consolidation presses from the inland plateau, while Britain's authority now stands openly in Natal. Some councillors argue that accommodation with the Empire could preserve Swazi independence better than facing both neighbors alone. Others warn that one protector soon invites another master."
sb_swazi_frontier.096.f:0 "When the plains close and the coast belongs to another, a kingdom survives by choosing which power it may safely keep nearest."
sb_swazi_frontier.096.a:0 "Seek British accommodation."
sb_swazi_frontier.096.b:0 "We will stand alone."
sb_swazi_frontier_096_a_tt:0 "Remain independent, but seek British backing through trade ties, a guarantee, and a diplomatic presence."
sb_swazi_frontier_096_b_tt:0 "Remain independent and unaligned, gaining a temporary defensive prestige bonus instead of British shelter."
sb_swazi_frontier.097.t:0 "The Swazi Defeated"
sb_swazi_frontier.097.d:0 "Dingane has forced the Swazi from the field and restored the aura of strength that had frayed since the Natal crisis. The court now reads the victory as proof that the nearer frontier can still be settled by arms."
sb_swazi_frontier.097.f:0 "A king who masters the nearer hills, the court now says, need not fear whispers from farther off."
sb_swazi_frontier.097.a:0 "So the frontier remembers."
