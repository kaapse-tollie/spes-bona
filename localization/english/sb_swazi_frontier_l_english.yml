l_english:
sb_swazi_frontier_rearmed:0 "Frontier Rearmed"
sb_swazi_frontier_rearmed_desc:0 "Fresh firearms and a temporary settlement have allowed the kingdom to steady its western marches."
sb_swazi_frontier_grievance:0 "Swazi Frontier Grievance"
sb_swazi_frontier_grievance_desc:0 "The disputed northern Swazi frontier remains a living grievance within the republic, and its settlers and commandants are pressing for a harder line."
sb_swazi_frontier_muster:0 "Swazi Frontier Muster"
sb_swazi_frontier_muster_desc:0 "The Swazi have called up men from the frontier districts, swelling a small standing force into a larger defensive host."
sb_swazi_frontier_muster_vs_player:0 "Swazi Frontier Resolve"
sb_swazi_frontier_muster_vs_player_desc:0 "With a dangerous enemy pressing the kingdom, the Swazi councils have committed additional reserves and command to the defense of the frontier."
 sb_swazi_frontier.094.t:0 "The Swazi Question"
 sb_swazi_frontier.094.d:0 "Dingane's court now looks eastward toward the Swazi. The frontier there is unsettled, and some councillors argue that victory would steady the dynasty after the humiliations of the Natal struggle. Others warn that another failed campaign could undo the throne altogether."
 sb_swazi_frontier.094.f:0 "\"A king who cannot master the nearer frontier invites questions at every other one.\""
 sb_swazi_frontier.094.a:0 "Strike at the Swazi and settle the frontier."
 sb_swazi_frontier.094.b:0 "We cannot risk another failure."
 sb_swazi_frontier.095.t:0 "Boer Consolidation on the Frontier"
 sb_swazi_frontier.095.d:0 "The eastern Boer republics are no longer a scattering of trekker camps. With Lydenburg folded into a more coherent Transvaal polity, pressure now falls upon our western frontier. Boer negotiators speak of regularizing settlement and securing the escarpment, but what they seek are the northern marches our people still hold."
 sb_swazi_frontier.095.f:0 "\"A small kingdom does not always choose the ground on which it bargains.\""
 sb_swazi_frontier.095.a:0 "Buy time. Give up the northern frontier for guns and peace."
 sb_swazi_frontier.095.b:0 "Refuse them. The frontier will not be sold."
 sb_swazi_frontier_095_a_tt:0 "Cede the four disputed frontier provinces to #v Transvaal#!, gain firearms assistance, improve relations, and secure a long truce."
 sb_swazi_frontier_095_b_tt:0 "Keep the disputed frontier, worsen relations with #v Transvaal#!, and leave the question unsettled."
 sb_swazi_frontier.096.t:0 "Between a Rock and a Hard Place"
 sb_swazi_frontier.096.d:0 "The frontier has hardened around us. Boer consolidation presses from the inland plateau, while Britain's authority now stands openly in Natal. Some councillors argue that accommodation with the empire could preserve Swazi independence better than facing both neighbors alone. Others warn that one protector soon invites another master."
sb_swazi_frontier.096.f:0 "\"When the plains close and the coast belongs to another, a kingdom survives by choosing which power to keep nearest.\""
sb_swazi_frontier.096.a:0 "Seek accommodation with Britain."
sb_swazi_frontier.096.b:0 "Stand apart. We will depend on ourselves."
sb_swazi_frontier_096_a_tt:0 "Remain independent, but seek British backing through trade ties, a guarantee, and an embassy presence."
sb_swazi_frontier_096_b_tt:0 "Remain independent and unaligned, gaining a temporary defensive prestige boost instead of British shelter."
sb_swazi_frontier.097.t:0 "The Swazi Broken"
sb_swazi_frontier.097.d:0 "Dingane has forced the Swazi from the field and restored the aura of strength that had been fraying since the Natal crisis. The court reads the victory as proof that the king can still settle the nearer frontier by arms."
sb_swazi_frontier.097.f:0 "\"A king who masters the nearer hills need not fear whispers from farther off.\""
sb_swazi_frontier.097.a:0 "The eastern frontier remembers its master."
