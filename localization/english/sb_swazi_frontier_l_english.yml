l_english:
sb_swz_seek_british_protection:0 "Ask for British Protection"
sb_swz_seek_british_protection_desc:0 "Boer pressure grows on the plateau and the coast already lies in British hands. Direct British protection may be the lesser evil."
sb_swazi_frontier_rearmed:0 "The Frontier Rearmed"
sb_swazi_frontier_rearmed_desc:0 "Fresh firearms and a temporary settlement have steadied the western marches."
sb_swazi_frontier_grievance:0 "A Frontier Grievance"
sb_swazi_frontier_grievance_desc:0 "The disputed northern frontier remains a grievance within the republic, and commandants press for a harder line."
sb_swazi_frontier_muster:0 "A Frontier Muster"
sb_swazi_frontier_muster_desc:0 "Men from the frontier districts have swollen the kingdom's small standing force into a broader defensive host."
sb_swazi_frontier_muster_vs_player:0 "Frontier Resolve"
sb_swazi_frontier_muster_vs_player_desc:0 "Facing a dangerous enemy, the Swazi councils have committed fresh reserves to the frontier."
sb_swazi_frontier.094.t:0 "The Swazi Frontier"
sb_swazi_frontier.094.d:0 "Dingane's court now looks eastward toward the Swazi. Some councillors argue that victory there would steady the dynasty after Natal; others warn that another failed campaign could undo the throne altogether."
sb_swazi_frontier.094.f:0 "The harder councillors said that a king who could not master the nearer frontier would be doubted on every other."
sb_swazi_frontier.094.a:0 "Strike east."
sb_swazi_frontier.094.b:0 "We cannot risk it."
sb_swazi_frontier.095.t:0 "Boer Pressure in the West"
sb_swazi_frontier.095.d:0 "The eastern Boer republics are no longer a scattering of camps. With Lydenburg folded into a firmer Transvaal, pressure now falls upon our western frontier."
sb_swazi_frontier.095.f:0 "A small kingdom rarely chooses the ground of its bargaining. It chooses only what may still be kept."
sb_swazi_frontier.095.a:0 "Buy time with land."
sb_swazi_frontier.095.b:0 "The frontier is not for sale."
sb_swazi_frontier_095_a_tt:0 "Cede the four disputed provinces to #v Transvaal#!, gain firearms support, improve relations, and secure a long truce."
sb_swazi_frontier_095_b_tt:0 "Keep the disputed frontier, worsen relations with #v Transvaal#!, and leave the question open."
sb_swazi_frontier.097.t:0 "The Swazi Defeated"
sb_swazi_frontier.097.d:0 "Dingane has forced the Swazi from the field and restored the aura of strength that had frayed since the Natal crisis. The court now reads the victory as proof that the nearer frontier can still be settled by arms."
sb_swazi_frontier.097.f:0 "A king who masters the nearer hills, the court now said, need not fear whispers from farther off."
sb_swazi_frontier.097.a:0 "So the frontier remembers."
sb_swazi_frontier.100.t:0 "An Appeal from Swaziland"
sb_swazi_frontier.100.d:0 "The Swazi kingdom now asks Britain to accept it as a protectorate. If we refuse, it must face the Boer frontier alone. If we accept, the kingdom will pass beneath direct British protection."
sb_swazi_frontier.100.f:0 "The petition did not ask Britain to rule the kingdom well. It asked only that Britain rule it before the frontier republics did."
sb_swazi_frontier.100.a:0 "Take them under protection."
sb_swazi_frontier.100.b:0 "We will not intervene."
