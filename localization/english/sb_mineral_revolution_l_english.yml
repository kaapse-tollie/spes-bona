l_english:
sb_mineral_revolution.010.t:0 "The Mineral Age"
sb_mineral_revolution.010.d_liberal:0 "Diamonds have altered the scale of politics in Southern Africa. The Cape's liberal settlement survived the earlier frontier crisis, but the fields now threaten to drag every constitutional principle into harsher contention."
sb_mineral_revolution.010.d_settler:0 "Diamonds have altered the scale of politics in Southern Africa. Under a harder frontier order, the fields look less like a windfall than a test of whether power can be consolidated first."
sb_mineral_revolution.010.d_compromise:0 "Diamonds have altered the scale of politics in Southern Africa. The Cape's compromise held the earlier quarrel in check, but mineral wealth now threatens to sharpen every old dispute."
sb_mineral_revolution.010.d_default:0 "Diamonds are redrawing old frontiers, stiffening imperial interests, and turning local disputes into regional crises."
sb_mineral_revolution.010.f:0 "A field of stones may yet reorder kingdoms, colonies, and republics alike."
sb_mineral_revolution.010.a:0 "A new age begins."
