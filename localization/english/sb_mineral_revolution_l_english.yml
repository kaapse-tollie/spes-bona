l_english:
sb_mineral_revolution.010.t:0 "The Mineral Age"
sb_mineral_revolution.010.d_liberal:0 "Diamonds have altered the scale of politics in Southern Africa. The Cape's liberal settlement survived the earlier frontier crisis, yet the mineral fields now threaten to drag every constitutional principle into a harsher imperial contest."
sb_mineral_revolution.010.d_settler:0 "Diamonds have altered the scale of politics in Southern Africa. Under the Cape's harder frontier order, the mineral fields look less like a windfall than a test of whether power can be consolidated before imperial, Griqua, or Boer rivals do so first."
sb_mineral_revolution.010.d_compromise:0 "Diamonds have altered the scale of politics in Southern Africa. The Cape's compromise held the earlier constitutional quarrel in check, but mineral wealth now threatens to sharpen every old dispute."
sb_mineral_revolution.010.d_default:0 "Diamonds have altered the scale of politics in Southern Africa. Mineral wealth is redrawing old frontiers, stiffening imperial interests, and turning local disputes into regional crises."
sb_mineral_revolution.010.f:0 "A field of stones may yet reorder kingdoms, colonies, and republics alike. The old frontier age is passing into something larger and less governable."
sb_mineral_revolution.010.a:0 "A new age begins."
