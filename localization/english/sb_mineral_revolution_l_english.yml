l_english:
 sb_mineral_revolution.010.t:0 "The Mineral Revolution"
 sb_mineral_revolution.010.d_liberal:0 "Diamonds have changed the scale of politics in Southern Africa. The Cape's liberal settlement has survived the earlier frontier crisis, but the mineral fields now threaten to drag every constitutional principle into a harsher imperial contest. Merchants, missionaries, Griqua intermediaries, and inland republics alike are being pulled toward the same contested wealth."
 sb_mineral_revolution.010.d_settler:0 "Diamonds have changed the scale of politics in Southern Africa. Under the Cape's harder frontier order, the mineral fields look less like a distant windfall and more like a test of whether power can be consolidated before rivals - imperial, Griqua, or Boer - do so first."
 sb_mineral_revolution.010.d_compromise:0 "Diamonds have changed the scale of politics in Southern Africa. The Cape's compromise settlement has kept earlier constitutional fractures from breaking the colony apart, but the new mineral wealth threatens to revive every old dispute in sharper form."
 sb_mineral_revolution.010.d_default:0 "Diamonds have changed the scale of politics in Southern Africa. Mineral wealth is beginning to redraw old frontiers, stiffen imperial interests, and turn local sovereignty disputes into regional crises."
 sb_mineral_revolution.010.f:0 "\"A field of stones may yet reorder kingdoms, colonies, and republics alike.\""
 sb_mineral_revolution.010.a:0 "A new age is beginning."
