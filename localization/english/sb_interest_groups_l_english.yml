l_english:
ig_burghers:0 "Burghers"
ig_burghers_desc:0 "The Cape's urban middle class values orderly reform, municipal competence, and commercial stability above the harsher resentments of the frontier."
ig_mission_churches:0 "Mission Churches"
ig_mission_churches_desc:0 "The Mission Churches combine the Anglican establishment with the Cape's missionary network. They favor moral reform, education, and a more paternal but less openly racial politics than the settler frontier camp."
ig_frontier_farmers:0 "Frontier Farmers"
ig_frontier_farmers_desc:0 "The Frontier Farmers are the settler communities of the Cape borderlands. They prize local autonomy, land, and hard frontier security over the caution of Cape Town."
ig_groot_boere:0 "Groot-Boere"
ig_groot_boere_desc:0 "The Groot-Boere are the leading Boer notables, commandant families, and richer burghers of the trekker republics. They favor oligarchic rule, white burgher supremacy, and a militia republic of landholders."
ig_kommandante:0 "Kommandante"
ig_kommandante_desc:0 "The Kommandante represent the field commandants and mounted commando leaders of the Boer republics. They are devoted to citizen-militia traditions and distrust centralized military politics."
ig_ng_kerk:0 "NG Kerk"
ig_ng_kerk_desc:0 "The Nederduitse Gereformeerde Kerk represents the conservative Dutch Reformed establishment of the Boer republics. It upholds patriarchal order, religious schooling, and the covenantal self-understanding of the trekker polity."
ig_klein_boere:0 "Klein-Boere"
ig_klein_boere_desc:0 "The Klein-Boere are the smallholding trekker farmers and pastoral households of the frontier republics. They are intensely localist, expansionist, and suspicious of distant authority."

ideology_sb_burgher_civic:0 "Burgher Civic"
ideology_sb_burgher_civic_desc:0 "This interest group favors orderly reform, commercial administration, and municipal competence over overt racial favoritism."
ideology_sb_mission_churches:0 "Missionary Humanitarian"
ideology_sb_mission_churches_desc:0 "This interest group combines Protestant moral reform with missionary humanitarianism. It favors education, limited imperial reform, and a less coercive racial order than the hard frontier camp."
ideology_sb_cape_ig_liberal:0 "Cape Liberal"
ideology_sb_cape_ig_liberal_desc:0 "Cape liberals favor a civic order in which race is not formally the measure of political belonging."
ideology_sb_volksraad_elitism:0 "Volksraad Elitism"
ideology_sb_volksraad_elitism_desc:0 "This interest group believes political authority should rest with the landholding burgher elite of a racially exclusive frontier republic."
ideology_sb_kleinboer_agrarianism:0 "Klein-Boer Agrarianism"
ideology_sb_kleinboer_agrarianism_desc:0 "This interest group sees the republic as a commonwealth of independent smallholders, protected from outside interference and sustained by the frontier farm."
ideology_sb_boer_commando_republicanism:0 "Commando Republicanism"
ideology_sb_boer_commando_republicanism_desc:0 "This interest group treats military authority and republican citizenship as inseparable, favoring mounted citizen-commandos over professional armies."
ideology_sb_ng_kerk:0 "NG Kerk Orthodoxy"
ideology_sb_ng_kerk_desc:0 "This interest group fuses conservative Reformed religion with the social order of the Boer republics, favoring patriarchal authority and religious schooling."

sb_ig_trait_civic_grievances:0 "Civic Grievances"
sb_ig_trait_civic_grievances_desc:0 "When alienated, the urban burghers obstruct reform through petitions, municipal quarrels, and administrative resistance."
sb_ig_trait_mission_disquiet:0 "Mission Disquiet"
sb_ig_trait_mission_disquiet_desc:0 "When offended, the mission churches undermine moral legitimacy through pulpits, petitions, and public reproach."
sb_ig_trait_mission_schools:0 "Mission Schools"
sb_ig_trait_mission_schools_desc:0 "A loyal mission-church network spreads literacy and schooling through parishes, mission stations, and church patronage."
sb_ig_trait_laager_politics:0 "Laager Politics"
sb_ig_trait_laager_politics_desc:0 "Disgruntled Boer notables retreat into factional localism whenever they feel the republic slipping from their hands."
sb_ig_trait_stirring_the_masses:0 "Stirring the Masses"
sb_ig_trait_stirring_the_masses_desc:0 "Liberal academics and activists spread sharp criticism of the state's treatment of non-European peoples."
sb_ig_trait_republican_notables:0 "Republican Notables"
sb_ig_trait_republican_notables_desc:0 "When loyal, the leading burgher notables lend their weight to the authority and standing of the republic."
sb_ig_trait_god_and_volk:0 "God and Volk"
sb_ig_trait_god_and_volk_desc:0 "God has entrusted His favor to the Boer volk; it is their hallowed duty to bring order to this forsaken land."
sb_ig_trait_be_fruitful_and_multiply:0 "Be Fruitful and Multiply"
sb_ig_trait_be_fruitful_and_multiply_desc:0 "Among the common people, the first virtues are the making of families and the raising of children."
