l_english:
ig_burghers:0 "Cape Burghers"
ig_burghers_desc:0 "The urban burghers of the Cape value orderly reform, municipal competence, and commercial stability above the harsher resentments of the frontier."
ig_mission_churches:0 "Missionary Churches"
ig_mission_churches_desc:0 "The Missionary Churches unite the Anglican establishment with the Cape's missionary network. They favor moral reform, schooling, and a more paternal but less openly racial politics than the settler frontier camp."
ig_frontier_farmers:0 "Eastern Frontier Farmers"
ig_frontier_farmers_desc:0 "The Frontier Farmers are the settler communities of the Cape borderlands. They value local autonomy, land, and hard frontier security over the caution of Cape Town."
ig_groot_boere:0 "Groot Boere"
ig_groot_boere_desc:0 "The Groot Boere are the leading Boer notables, commandant families, and richer burghers of the trekker republics. They favor oligarchic rule, white burgher supremacy, and a militia republic of landholders."
ig_kommandante:0 "Commandants"
ig_kommandante_desc:0 "The Commandants are the field leaders and mounted commando heads of the Boer republics. They are devoted to citizen-militia traditions and distrust centralized military politics."
ig_ng_kerk:0 "Nederduitse Gereformeerde Kerk"
ig_ng_kerk_desc:0 "The Nederduitse Gereformeerde Kerk represents the conservative Dutch Reformed establishment of the Boer republics. It upholds patriarchal order, religious schooling, and the covenantal view the trekkers hold of their republics."
ig_klein_boere:0 "Klein Boere"
ig_klein_boere_desc:0 "The Klein Boere are the smallholding trekker farmers and pastoral households of the frontier republics. They are intensely localist, expansionist, and suspicious of distant authority."

ideology_sb_burgher_civic:0 "Burgher Civic Order"
ideology_sb_burgher_civic_desc:0 "This interest group favors orderly reform, commercial administration, and municipal competence over cruder racial favoritism."
ideology_sb_mission_churches:0 "Missionary Humanitarianism"
ideology_sb_mission_churches_desc:0 "This interest group combines Protestant moral reform with missionary humanitarianism. It favors education, limited imperial reform, and a less coercive racial order than the frontier hardliners."
ideology_sb_cape_ig_liberal:0 "Cape Liberalism"
ideology_sb_cape_ig_liberal_desc:0 "Cape liberals favor a civic order in which race is not formally taken as the measure of political belonging in law."
ideology_sb_volksraad_elitism:0 "Volksraad Oligarchy"
ideology_sb_volksraad_elitism_desc:0 "This interest group believes political authority should rest with the landholding burgher elite alone in an exclusive frontier republic."
ideology_sb_kleinboer_agrarianism:0 "Smallholder Agrarianism"
ideology_sb_kleinboer_agrarianism_desc:0 "This interest group sees the republic as a commonwealth of stubborn smallholders, sheltered from outside interference and sustained by the frontier farm."
ideology_sb_boer_commando_republicanism:0 "Commando Republican Tradition"
ideology_sb_boer_commando_republicanism_desc:0 "This interest group treats command service and republican citizenship as inseparable, favoring mounted citizen-commandos over professional armies."
ideology_sb_ng_kerk:0 "Reformed Orthodoxy"
ideology_sb_ng_kerk_desc:0 "This interest group binds conservative Reformed religion to the social order of the Boer republics, favoring patriarchal authority and confessional schooling."

sb_ig_trait_civic_grievances:0 "Burgher Grievances"
sb_ig_trait_civic_grievances_desc:0 "When alienated, the urban burghers obstruct reform through petitions, municipal quarrels, and municipal obstruction."
sb_ig_trait_mission_disquiet:0 "Missionary Disquiet"
sb_ig_trait_mission_disquiet_desc:0 "When offended, the mission churches assail the state's moral legitimacy through pulpits, petitions, and public reproach."
sb_ig_trait_mission_schools:0 "Mission Education"
sb_ig_trait_mission_schools_desc:0 "A loyal mission-church network spreads literacy through parishes, mission stations, and church patronage."
sb_ig_trait_laager_politics:0 "Laager Factionalism"
sb_ig_trait_laager_politics_desc:0 "Disgruntled Boer notables retreat into localist faction whenever they feel the republic slipping from their grasp."
sb_ig_trait_stirring_the_masses:0 "Agitation in the Press"
sb_ig_trait_stirring_the_masses_desc:0 "Liberal academics and activists spread sharp criticism of the state's treatment of non-European subjects and dependents."
sb_ig_trait_republican_notables:0 "Notables of the Republic"
sb_ig_trait_republican_notables_desc:0 "When loyal, the leading burgher notables lend their weight to the republic's authority, dignity, and standing."
sb_ig_trait_god_and_volk:0 "God and the Volk"
sb_ig_trait_god_and_volk_desc:0 "God has entrusted His favor to the Boer volk; it is their duty to bring order to this forsaken land."
sb_ig_trait_be_fruitful_and_multiply:0 "Fruitful Households"
sb_ig_trait_be_fruitful_and_multiply_desc:0 "Among the common people, the first virtues are marriage, household order, and the raising of many children."
