l_english:
 ig_burghers:0 "Burghers"
 ig_burghers_desc:0 "The Burghers represent the Cape's urban middle class of merchants, clerks, and administrators. They value orderly reform, municipal competence, and commercial stability more than the exclusionary resentments common to the vanilla petty bourgeoisie."
 ig_mission_churches:0 "Mission Churches"
 ig_mission_churches_desc:0 "The Mission Churches combine the Anglican establishment with the Cape's missionary and humanitarian religious networks. They favor moral reform, education, and a more paternalist but less overtly racial politics than the frontier settler camp."
 ig_frontier_farmers:0 "Frontier Farmers"
 ig_frontier_farmers_desc:0 "The Frontier Farmers are the settler agrarian communities of the Cape borderlands. They prize local autonomy, land hunger, and hard frontier security over the caution of Cape Town."
 ig_groot_boere:0 "Groot-Boere"
 ig_groot_boere_desc:0 "The Groot-Boere are the leading Boer notables, commandant families, and wealthier burgher elites who dominate the early trekker republics. They favor oligarchic rule, white burgher supremacy, and a militia republic of landholders."
 ig_kommandante:0 "Kommandante"
 ig_kommandante_desc:0 "The Kommandante represent the field commandants and mounted commando leadership of the Boer republics. They are fiercely committed to citizen-militia traditions and distrust centralized standing-army politics."
 ig_ng_kerk:0 "NG Kerk"
 ig_ng_kerk_desc:0 "The Nederduitse Gereformeerde Kerk represents the conservative Dutch Reformed religious establishment of the Boer republics. It upholds patriarchal social order, religious schooling, and the covenantal self-understanding of the trekker polity."
 ig_klein_boere:0 "Klein-Boere"
 ig_klein_boere_desc:0 "The Klein-Boere are the smallholding trekker farmers and pastoral frontier households of the Boer republics. They are intensely localist, expansionist on the frontier, and suspicious of distant or overly centralized authority."

 ideology_sb_burgher_civic:0 "Burgher Civic"
 ideology_sb_burgher_civic_desc:0 "This interest group favors orderly reform, commercial administration, and municipal competence. It is less exclusionary than the vanilla petty bourgeoisie and more inclined toward practical colonial governance."
 ideology_sb_mission_churches:0 "Missionary Humanitarian"
 ideology_sb_mission_churches_desc:0 "This interest group combines Protestant moral reform with missionary humanitarianism. It prefers education, limited imperial reform, and a less coercive racial order than the hard frontier camp."
 ideology_sb_boer_republican:0 "Boer Republican"
 ideology_sb_boer_republican_desc:0 "This interest group believes political authority should rest with the landholding burgher elite of a racially exclusive frontier republic. It favors oligarchic self-government, national militia, and republican autonomy."
 ideology_sb_boer_commandants:0 "Commando Republican"
 ideology_sb_boer_commandants_desc:0 "This interest group sees military authority and republican citizenship as inseparable. It favors mounted citizen-commandos, frontier war readiness, and distrusts professional standing armies."
 ideology_sb_ng_kerk:0 "NG Kerk Orthodoxy"
 ideology_sb_ng_kerk_desc:0 "This interest group fuses conservative Reformed religion with the social order of the Boer republics. It favors patriarchal authority, religious schooling, and a culturally exclusive Christian polity."

 sb_ig_trait_civic_grievances:0 "Civic Grievances"
 sb_ig_trait_civic_grievances_desc:0 "When alienated, the urban burghers obstruct reform through petitions, municipal quarrels, and administrative resistance rather than through overt ethnic agitation."
 sb_ig_trait_mission_disquiet:0 "Mission Disquiet"
 sb_ig_trait_mission_disquiet_desc:0 "When offended, the mission churches undermine moral legitimacy and stir discontent through pulpits, petitions, and public reproach."
 sb_ig_trait_mission_schools:0 "Mission Schools"
 sb_ig_trait_mission_schools_desc:0 "A loyal mission-church network helps spread literacy and schooling through parishes, mission stations, and church patronage."
 sb_ig_trait_laager_politics:0 "Laager Politics"
 sb_ig_trait_laager_politics_desc:0 "Disgruntled Boer notables retreat into factional localism and obstruct wider state-building whenever they feel the republic is slipping from burgher hands."
 sb_ig_trait_republican_notables:0 "Republican Notables"
 sb_ig_trait_republican_notables_desc:0 "When loyal, the leading burgher notables lend their weight to the authority and diplomatic standing of the republic."
