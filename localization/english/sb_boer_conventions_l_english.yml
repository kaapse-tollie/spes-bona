l_english:
sb_boer_conventions_refusal_warning_tt:0 "#n Refusing the convention may provoke British anti-slavery pressure later.#!"
sb_boer_conventions_zpb_frontier_spirit_warning_tt:0 "#n Backing Zoutpansberg's slaveholding frontier may cost us British recognition.#!"
sb_boer_conventions.140.t:0 "The Sand River Convention"
sb_boer_conventions.140.d:0 "Britain is prepared to regularize relations with the Transvaal and acknowledge the republic north of the Vaal, but not without conditions. London expects a stable government, a measure of peace on the frontier, and an end to the slavery practices that have long shadowed the trek."
sb_boer_conventions.140.f:0 "\"Recognition may be purchased, but not without leaving a price behind in our laws.\""
sb_boer_conventions.140.a:0 "Accept the convention and secure recognition."
sb_boer_conventions.140.b:0 "We will not let Britain dictate our republic."
sb_boer_conventions.140.c:0 "Zoutpansberg keeps the true frontier spirit."
sb_boer_conventions.141.t:0 "The Bloemfontein Convention"
sb_boer_conventions.141.d:0 "Britain is now prepared to withdraw its claims to sovereignty between the Orange and the Vaal and recognize the Orange Free State as a settled republic. The price is submission to a more acceptable legal order, especially on the question of slavery."
sb_boer_conventions.141.f:0 "\"A republic acknowledged by Britain is still freer than a sovereignty ruled from London.\""
sb_boer_conventions.141.a:0 "Accept the convention and secure recognition."
sb_boer_conventions.141.b:0 "We shall stand on our own terms."
sb_boer_conventions.143.t:0 "Lawlessness in Northern Transvaal"
sb_boer_conventions.143.d:0 "The Zoutpansberg Boers are widely spoken of as the wildest of the northern trekkers, and their willingness to traffic openly in coerced labor now threatens more than mere embarrassment. The volksraad fears that if their practices continue unchecked, Britain will question the Sand River settlement itself and deny that Transvaal has truly left slavery behind."
sb_boer_conventions.143.f:0 "\"If the north remains lawless, London will say the convention was signed with a fiction rather than a republic.\""
sb_boer_conventions.143.a:0 "Bring order to Zoutpansberg."
sb_boer_conventions.143.b:0 "Zoutpansberg keeps the true frontier spirit."
sb_boer_conventions.146.t:0 "A Frontier Compact"
sb_boer_conventions.146.d:0 "Transvaal has rejected British conditions and turned north instead, offering Zoutpansberg a compact of mutual defense, transit, and eventual unity under a shared frontier order."
sb_boer_conventions.146.f:0 "\"Better a hard road beside our own people than a soft road under another's hand.\""
sb_boer_conventions.146.a:0 "Stand with Transvaal."
sb_boer_conventions.145.t:0 "Britain Questions the Convention"
sb_boer_conventions.145.d:0 "Our failure to bring Zoutpansberg to heel has handed Britain the very pretext the volksraad feared. London now treats northern lawlessness and slave-raiding as proof that Transvaal cannot guarantee the conditions under which it was recognized. The convention is discredited, and the empire is preparing to act in the north."
sb_boer_conventions.145.f:0 "\"A republic that cannot master its own frontier invites another master.\""
sb_boer_conventions.145.a:0 "Then we must face the consequences."
