l_english:
sb_boer_conventions_refusal_warning_tt:0 "#n Refusing the convention may later invite British intervention over slavery.#!"
sb_boer_conventions_zpb_frontier_spirit_warning_tt:0 "#n Backing Zoutpansberg's slaveholding frontier may cost Transvaal British recognition.#!"
sb_boer_conventions.140.t:0 "Sand River"
sb_boer_conventions.140.d:0 "Britain is prepared to recognize the republic north of the Vaal, but not without conditions. London expects a settled government, a quieter frontier, and an end to the slaveholding practices that have so long disgraced the trek."
sb_boer_conventions.140.f:0 "\"Recognition may be bought, but never without a price in our laws.\""
sb_boer_conventions.140.a:0 "Accept the terms."
sb_boer_conventions.140.b:0 "Britain shall not dictate to us."
sb_boer_conventions.140.c:0 "The north keeps the true frontier spirit."
sb_boer_conventions.141.t:0 "Bloemfontein"
sb_boer_conventions.141.d:0 "Britain is prepared to withdraw its claims between the Orange and the Vaal and recognize the Orange Free State as a settled republic. The price is a legal order more acceptable to London, above all in the question of slavery."
sb_boer_conventions.141.f:0 "\"A republic acknowledged by Britain is still freer than a sovereignty ordered from London.\""
sb_boer_conventions.141.a:0 "Accept the terms."
sb_boer_conventions.141.b:0 "We shall answer on our own terms."
sb_boer_conventions.143.t:0 "Zoutpansberg Unchecked"
sb_boer_conventions.143.d:0 "The Zoutpansberg Boers have become notorious even by frontier standards, and their open traffic in coerced labor now threatens more than mere embarrassment. If the north remains unchecked, the volksraad fears London will treat the Sand River settlement as a sham."
sb_boer_conventions.143.f:0 "\"If the north remains lawless, London will say the convention was signed with a fiction, not a republic.\""
sb_boer_conventions.143.a:0 "Bring the north to order."
sb_boer_conventions.143.b:0 "The north keeps the frontier spirit."
sb_boer_conventions.146.t:0 "A Northern Compact"
sb_boer_conventions.146.d:0 "Transvaal has rejected British conditions and turned northward instead, offering Zoutpansberg a compact of defense, transit, and eventual union under a shared frontier order."
sb_boer_conventions.146.f:0 "\"Better a hard road beside our own people than a soft road beneath another's hand.\""
sb_boer_conventions.146.a:0 "Stand with Pretoria."
sb_boer_conventions.145.t:0 "The Convention Discredited"
sb_boer_conventions.145.d:0 "Our failure to bring Zoutpansberg to heel has handed Britain the very pretext the volksraad feared. London now treats northern lawlessness and slave-raiding as proof that Transvaal cannot uphold the conditions under which it was recognized. The convention is discredited, and the Empire is preparing to act in the north."
sb_boer_conventions.145.f:0 "\"A republic that cannot master its own frontier will soon find another master.\""
sb_boer_conventions.145.a:0 "Then we must bear the consequences."
