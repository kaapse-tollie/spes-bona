l_english:
sb_boer_conventions_refusal_warning_tt:0 "#n Refusing may later invite British intervention over slavery.#!"
sb_boer_conventions_zpb_frontier_spirit_warning_tt:0 "#n Backing Zoutpansberg's slave frontier may cost Transvaal British recognition.#!"
sb_boer_conventions.140.t:0 "Sand River"
sb_boer_conventions.140.d:0 "Britain is prepared to recognize the republic north of the Vaal, but not without conditions. London expects a settled government, a quieter frontier, and an end to the slaveholding practices that have so long disgraced the trek."
sb_boer_conventions.140.f:0 ""London will recognize much, but not without its price. In our laws, as in all else, recognition must be paid for.""
sb_boer_conventions.140.a:0 "Accept the terms."
sb_boer_conventions.140.b:0 "Britain shall not dictate to us."
sb_boer_conventions.140.c:0 "The north keeps the true frontier spirit."
sb_boer_conventions.141.t:0 "Bloemfontein"
sb_boer_conventions.141.d:0 "Britain is prepared to withdraw its claims between the Orange and the Vaal and recognize the Orange Free State as a settled republic. The price is a legal order more acceptable to London, above all in the question of slavery."
sb_boer_conventions.141.f:0 ""A republic recognized is still freer than one instructed from London.""
sb_boer_conventions.141.a:0 "Accept the terms."
sb_boer_conventions.141.b:0 "We shall answer on our own terms."
sb_boer_conventions.143.t:0 "Zoutpansberg Unchecked"
sb_boer_conventions.143.d:0 "Even by frontier standards, Zoutpansberg has become a scandal. Its open traffic in coerced labour now threatens the Sand River Convention itself, for London may yet declare that it recognized not a republic but a fiction."
sb_boer_conventions.143.f:0 ""If the north remains as it is, London will say it signed with a fiction.""
sb_boer_conventions.143.a:0 "Bring the north to order."
sb_boer_conventions.143.b:0 "Leave the northern question alone."
sb_boer_conventions.146.t:0 "A Northern Compact"
sb_boer_conventions.146.d:0 "Transvaal has rejected British conditions and turned northward instead, offering Zoutpansberg a compact of defense, transit, and eventual union under a shared frontier order."
sb_boer_conventions.146.f:0 ""Better a hard road among our own people than an easy one under British leave.""
sb_boer_conventions.146.a:0 "Stand with Pretoria."
sb_boer_conventions.145.t:0 "The Convention Discredited"
sb_boer_conventions.145.d:0 "By failing to master Zoutpansberg, we have handed Britain the pretext it sought. London now points to slave-raiding in the north as proof that Transvaal cannot uphold the terms of recognition, and imperial intervention is gathering."
sb_boer_conventions.145.f:0 ""A republic that cannot command its frontier will soon find another master set over it.""
sb_boer_conventions.145.a:0 "Then we must bear the consequences."
sb_boer_conventions.147.t:0 "Pretoria's Demand"
sb_boer_conventions.147.d:0 "Transvaal now demands that Zoutpansberg submit to Pretoria's authority and abandon the slave frontier that has endangered Sand River recognition. To yield would end the northern republic; to resist means asking whether the Boer compact protects frontier autonomy against Pretoria itself."
sb_boer_conventions.147.f:0 ""The treaty was signed at Sand River, but its test lies in the far north.""
sb_boer_conventions.147.a:0 "Submit to Pretoria."
sb_boer_conventions.147.b:0 "Appeal to the Boer compact."
sb_boer_conventions.148.t:0 "Zoutpansberg Appeals to Bloemfontein"
sb_boer_conventions.148.d:0 "Zoutpansberg has appealed to the Boer compact, arguing that Pretoria's crackdown is not law enforcement but the destruction of a sister republic. Supporting them would defend frontier autonomy; standing aside would treat the crisis as an internal Transvaal matter."
sb_boer_conventions.148.f:0 ""A compact between republics can bind arms, or merely bind roads.""
sb_boer_conventions.148.a:0 "The compact must be honored."
sb_boer_conventions.148.b:0 "This is Pretoria's affair."
sb_boer_conventions.149.t:0 "Zoutpansberg Appeals to Natalia"
sb_boer_conventions.149.d:0 "Zoutpansberg has appealed to the Boer compact, asking Natalia to defend a fellow frontier republic against Pretoria's demand for submission. The answer will decide whether the northern crisis remains local or becomes a wider Boer confrontation."
sb_boer_conventions.149.f:0 ""The same road that carries trade can carry commandos.""
sb_boer_conventions.149.a:0 "The compact must be honored."
sb_boer_conventions.149.b:0 "This is Pretoria's affair."
sb_boer_conventions.150.t:0 "The Northern Republic Defies Us"
sb_boer_conventions.150.d:0 "Zoutpansberg has refused submission and invoked the Boer compact. Pretoria must now decide whether to force the issue and risk a wider civil conflict, or retreat from the crackdown and let Britain judge the convention hollow."
sb_boer_conventions.150.f:0 ""A republic that cannot govern its north may soon find its recognition governed from abroad.""
sb_boer_conventions.150.a:0 "Force the issue."
sb_boer_conventions.150.b:0 "Back down."
dp_sb_trn_zpb_crackdown_locked:0 "Order in Zoutpansberg"
dp_sb_trn_zpb_crackdown_locked_desc:0 "A locked Transvaal-Zoutpansberg civil-war play over Pretoria's authority in the northern frontier."
dp_sb_trn_zpb_crackdown_locked_tooltip:0 "Open the scripted Zoutpansberg crackdown war."
