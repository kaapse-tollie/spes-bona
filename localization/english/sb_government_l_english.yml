 RULER_TITLE_CHIEF:0 "Chief"

 gov_absolute_great_chiefdom:0 "Absolute Chiefdom"
 gov_absolute_great_chiefdom_desc:0 "This [concept_government_type] vests power wholly in the [Concept('concept_ruler','$RULER_TITLE_CHIEF$')].\n\n$TRANSFER_OF_POWER_NAME_DESC$"
 gov_great_chiefdom:0 "Chiefdom"
 gov_great_chiefdom_desc:0 "This [concept_government_type] vests power chiefly in the [Concept('concept_ruler','$RULER_TITLE_CHIEF$')].\n\n$TRANSFER_OF_POWER_NAME_DESC$"
 gov_constitutional_great_chiefdom:0 "Constitutional Chiefdom"
 gov_constitutional_great_chiefdom_desc:0 "This [concept_government_type] leaves the [Concept('concept_ruler','$RULER_TITLE_CHIEF$')] as [concept_head_of_state], but subjects government to [Concept('concept_votes','$concept_voting$')] and constitutional law.\n\n$TRANSFER_OF_POWER_NAME_DESC$"
 gov_regency_great_chiefdom:0 "Regency"
 gov_regency_great_chiefdom_desc:0 "This [concept_government_type] vests power in the [Concept('concept_ruler','$RULER_TITLE_REGENT$')], who rules on behalf of a [Concept('concept_ruler','$RULER_TITLE_CHIEF$')] not yet able to take the throne.\n\n$TRANSFER_OF_POWER_NAME_DESC$"
 gov_regency_great_chiefdom_constitutional:0 "Regency"
 gov_regency_great_chiefdom_constitutional_desc:0 "This [concept_government_type] leaves day-to-day power with an elected parliament, while a [Concept('concept_ruler','$RULER_TITLE_REGENT$')] rules in the name of a [Concept('concept_ruler','$RULER_TITLE_CHIEF$')] not yet able to take the throne.\n\n$TRANSFER_OF_POWER_NAME_DESC$"
