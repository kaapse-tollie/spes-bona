l_english:
 RULER_TITLE_CHIEF:0 "Chief"

 gov_absolute_great_chiefdom:0 "Absolute Chiefdom"
 gov_absolute_great_chiefdom_desc:0 "This is a [concept_government_type] where power rests completely with the [Concept('concept_ruler','$RULER_TITLE_CHIEF$')].\n\n$TRANSFER_OF_POWER_NAME_DESC$"
 gov_great_chiefdom:0 "Chiefdom"
 gov_great_chiefdom_desc:0 "This is a [concept_government_type] where power rests mainly with the [Concept('concept_ruler','$RULER_TITLE_CHIEF$')].\n\n$TRANSFER_OF_POWER_NAME_DESC$"
 gov_constitutional_great_chiefdom:0 "Constitutional Chiefdom"
 gov_constitutional_great_chiefdom_desc:0 "This is a [concept_government_type] where the [Concept('concept_ruler','$RULER_TITLE_CHIEF$')] remains the [concept_head_of_state], but [Concept('concept_votes','$concept_voting$')] and a constitution dictate the [Concept('concept_law','$concept_laws$')].\n\n$TRANSFER_OF_POWER_NAME_DESC$"
 gov_regency_great_chiefdom:0 "Regency"
 gov_regency_great_chiefdom_desc:0 "This is a [concept_government_type] where power rests with the [Concept('concept_ruler','$RULER_TITLE_REGENT$')], who rules on behalf of an [Concept('concept_ruler','$RULER_TITLE_CHIEF$')] who is not yet able to take the throne.\n\n$TRANSFER_OF_POWER_NAME_DESC$"
 gov_regency_great_chiefdom_constitutional:0 "Regency"
 gov_regency_great_chiefdom_constitutional_desc:0 "This is a [concept_government_type] where power rests with an elected parliament, and a [Concept('concept_ruler','$RULER_TITLE_REGENT$')] rules on behalf of an [Concept('concept_ruler','$RULER_TITLE_CHIEF$')] who is not yet able to take the throne.\n\n$TRANSFER_OF_POWER_NAME_DESC$"
