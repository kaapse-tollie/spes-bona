l_english:
sb_zulu_dynasty.090.t:0 "The Dynasty Wavers"
sb_zulu_dynasty.090.d:0 "Prestige has bled away from the throne. The regiments grumble, senior houses whisper, and the ruler's failures are now weighed against the ambition of his rivals. What force once contained must now be answered in the oldest Zulu fashion: by another claimant of the royal house."
sb_zulu_dynasty.090.f:0 "When the king's name no longer steadies the regiments, another name is soon spoken."
sb_zulu_dynasty.090.a:0 "The court turns elsewhere."
sb_zulu_dynasty.091.t:0 "Natal Proclaimed"
sb_zulu_dynasty.091.d:0 "Britain has answered Dingane's raid with annexation. The seized coast and conquered Zulu littoral are now being reorganized into the Natal Colony, binding the southeastern seaboard more tightly to imperial rule."
sb_zulu_dynasty.091.f:0 "The Crown would hold the coast, and the coast would take the Crown's name."
sb_zulu_dynasty.091.a:0 "Natal shall be held."
sb_zulu_dynasty.092.t:0 "Dingane Defiant"
sb_zulu_dynasty.092.d:0 "Against expectation, Dingane has survived the British answer to the seizure of Port Natal. A victory that began against the Boers has been crowned by defiance of a great power, and the court cannot ignore the aura now around the king."
sb_zulu_dynasty.092.f:0 "He had faced wagon and redcoat alike and remained king."
sb_zulu_dynasty.092.a:0 "The king's name grows."
sb_zulu_dynasty.093.t:0 "The Royal House Secured"
sb_zulu_dynasty.093.d:0 "The throne is no longer merely surviving events. Through victory, caution, and the management of rivals, the royal house has convinced the chiefdom that the line will endure. A clear heir may now be set forward."
sb_zulu_dynasty.093.f:0 "A throne is strongest when men begin to think of tomorrow as surely as today."
sb_zulu_dynasty.093.a:0 "The house is secured."
