l_english:
 sb_zulu_dynasty.090.t:0 "The Dynasty Totters"
 sb_zulu_dynasty.090.d:0 "Prestige has bled away from the throne. The regiments grumble, senior houses whisper, and the ruler's failures are now being measured against the ambition of his rivals. What could once be contained by force must now be answered in the oldest Zulu fashion: by replacing a faltering ruler with another claimant of the royal house."
 sb_zulu_dynasty.090.f:0 "\"When the king's name no longer steadies the regiments, another name is soon spoken.\""
 sb_zulu_dynasty.090.a:0 "The court turns to another prince."
sb_zulu_dynasty.091.t:0 "The Natal Colony Is Proclaimed"
sb_zulu_dynasty.091.d:0 "Britain has answered Dingane's raid with annexation. The seized coast and the conquered Zulu littoral are now being reorganized into the Natal Colony, binding the southeastern seaboard more tightly to imperial rule."
sb_zulu_dynasty.091.f:0 "\"The coast will be held for the Crown, and the Crown will give it a name of its own.\""
sb_zulu_dynasty.091.a:0 "Natal will be held for the Crown."
 sb_zulu_dynasty.092.t:0 "Dingane Defies the British"
 sb_zulu_dynasty.092.d:0 "Against all expectation, Dingane has survived the British answer to the seizure of Port Natal. A victory that began against the Boers has now been crowned by defiance of a great power. The court will remember the cost, but it cannot deny the aura now surrounding the king."
 sb_zulu_dynasty.092.f:0 "\"He has faced wagon and redcoat alike and yet remains king.\""
 sb_zulu_dynasty.092.a:0 "The king's name carries farther than ever."
 sb_zulu_dynasty.093.t:0 "The Dynasty Secured"
 sb_zulu_dynasty.093.d:0 "The throne is no longer merely surviving events. Through victory, caution, and the management of rivals, the royal house has convinced the chiefdom that the line will endure. A clear heir can now be set forward, and the court begins to treat the dynasty not as an emergency arrangement after Shaka, but as the settled order of the realm."
 sb_zulu_dynasty.093.f:0 "\"A throne is strongest when men begin to think of tomorrow as surely as today.\""
 sb_zulu_dynasty.093.a:0 "The royal house is secured."
