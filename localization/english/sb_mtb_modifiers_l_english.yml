l_english:
 sb_native_conscription_MTB:0 "Native warbands"
 sb_native_conscription_MTB_desc:0 "Mzilikazi has rallied local manpower for a short, violent frontier war. The host can call up many more men than usual, but its battlefield edge is still rooted in irregular fighting rather than drilled permanence."
 sb_native_conscription_MTB_player:0 "Mzilikazi Host"
 sb_native_conscription_MTB_player_desc:0 "Mzilikazi has fully gathered his host for the struggle against the Voortrekkers. Conscription, battlefield performance, and training all surge while the kingdom is fighting for survival."
 sb_blood_river_emergency_mobilization_desc:0 "The republic has thrown every available resource into immediate wartime readiness. Training, mobilization, and cohesion all accelerate while the Natal crisis is active."
