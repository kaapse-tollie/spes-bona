l_english:
sb_native_conscription_MTB:0 "A Gathered Host"
sb_native_conscription_MTB_desc:0 "Mzilikazi has rallied local manpower for a short and violent frontier war. The host can call up far more men than usual, but its strength still lies in irregular fighting rather than drilled permanence."
sb_native_conscription_MTB_player:0 "The Host of Mzilikazi"
sb_native_conscription_MTB_player_desc:0 "Mzilikazi has fully gathered his host for the struggle against the Voortrekkers. Conscription, training, and battlefield performance all rise while the kingdom fights for survival."
sb_blood_river_emergency_mobilization_desc:0 "The republic has thrown every available resource into immediate wartime readiness. Training, mobilization, and cohesion quicken while the Natal crisis remains active."
