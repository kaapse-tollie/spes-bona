l_english:
 sb_griqualand_east.220.t:0 "Griqualand East"
 sb_griqualand_east.220.d:0 "With Philippolis lost and the eastern frontier still unsettled, Griqua leaders now look to the Cape for a more durable settlement. A protected Griqua march-state in the east would secure loyal intermediaries, receive displaced families from Transorangia, and stiffen the colony's hold on the frontier."
 sb_griqualand_east.220.f:0 "\"A people driven from one border may yet become the keystone of another.\""
 sb_griqualand_east.220.a:0 "Establish Griqualand East."
 sb_griqualand_east.221.t:0 "A Willing Union"
 sb_griqualand_east.221.d:0 "Griqualand East has survived its first years as a protected march-state, but its leaders now argue that the Cape's franchise settlement has made separate administration unnecessary. If Griqua rights are recognized within Cape political life, union offers security without surrendering the principle that sent them east."
 sb_griqualand_east.221.f:0 "\"If the law now shelters us, then let the frontier no longer divide us.\""
 sb_griqualand_east.221.a:0 "Bring Griqualand East into the Cape."
