l_english:
sb_griqualand_east.220.t:0 "A Griqua March-State"
sb_griqualand_east.220.d:0 "With Philippolis lost and the eastern frontier unsettled, Griqua leaders now look to the Cape for a more durable settlement. A protected Griqua march-state in the east would stiffen the colony's hold on the frontier."
sb_griqualand_east.220.f:0 "A people driven from one frontier might yet become the keystone of another."
sb_griqualand_east.220.a:0 "Establish it."
sb_griqualand_east.221.t:0 "A Voluntary Union"
sb_griqualand_east.221.d:0 "Griqualand East has survived its first years as a protected march-state, and its leaders now argue that Cape administration can secure what separate rule once had to preserve."
sb_griqualand_east.221.f:0 "If the law now shelters them, say the Griqua leaders, the frontier need no longer divide them from the colony."
sb_griqualand_east.221.a:0 "Bring it into the Cape."
