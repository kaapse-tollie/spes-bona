l_english:
 sb_great_trek.030.t:0 "A Republic in Earnest"
 sb_great_trek.030.d:0 "What began as trekker camps has become a working economy. Farms sustain a larger population, traders bring coastal goods, and the volksraad now has a treasury behind it. The republic is no longer a mere frontier fancy."
 sb_great_trek.030.f:0 "The camps remained, but now there were farms, a treasury, and a council to turn migration into government."
 sb_great_trek.030.a:0 "The republic endures."
 sb_great_trek.031.t:0 "Potchefstroom Established"
 sb_great_trek.031.d:0 "The settlement on the Mooi River has grown beyond its first condition. Farms line the banks, a church stands at the center, and Potchefstroom now looks less like a laager than a town."
 sb_great_trek.031.f:0 "Where wagons once stood alone, there were now streets, stockyards, and the sound of a church bell."
 sb_great_trek.031.a:0 "Our footing is secure."
 sb_great_trek.040.t:0 "The Vrystaat Won"
 sb_great_trek.040.d:0 "Our republic now holds the whole Vrystaat. From the Orange to the Vaal, the land answers to the volksraad in Bloemfontein, and news of that success is already drawing fresh wagons from the Cape."
 sb_great_trek.040.f:0 "Word of a whole country won ran quickly through the Cape. Where there was land, there would soon be wagons."
 sb_great_trek.040.a:0 "Then let them come."
 sb_great_trek.041.t:0 "The Vaal Republic Secured"
 sb_great_trek.041.d:0 "The western Transvaal core is now secure. Potchefstroom and the surrounding districts answer to one republican authority, and the inland republic stands on firmer ground than a line of moving camps."
 sb_great_trek.041.f:0 "North of the Vaal, men had begun to speak less of passing through than of staying."
 sb_great_trek.041.a:0 "The republic is secure."
 sb_great_trek.042.t:0 "The Limpopo Frontier Won"
 sb_great_trek.042.d:0 "Zoutpansberg has grown from a handful of northern commandos into a republic that can claim the wider Limpopo frontier. Farms, laagers, and trading posts now bind the bushveld to the volksraad."
 sb_great_trek.042.f:0 "At the edge of the bushveld the trek had found not an end, but another country."
 sb_great_trek.042.a:0 "Let them come north."
 sb_great_trek.043.t:0 "Natal Secured"
 sb_great_trek.043.d:0 "Natal is no longer merely a coastal foothold. From Port Natal to the inland frontier, farms, wagon roads, and a republican council now bind the region into the wider trek."
 sb_great_trek.043.f:0 "Here the wagons had found the ocean, and with it a republic unlike those of the inland rivers."
 sb_great_trek.043.a:0 "Then let them come."
 sb_great_trek.100.t:0 "A Republic Established"
 sb_great_trek.100.d:0 "Our republic has grown from a scattered collection of trekker camps into a viable state. Farms have been established, people gathered, and government made to function. This land may now be called our own."
 sb_great_trek.100.f:0 "What began in flight had ended in magistrates, farms, and a republic fit to endure."
 sb_great_trek.100.a:0 "So the republic stands."
 sb_great_trek.101.t:0 "A Settled Coast"
 sb_great_trek.101.d:0 "Natalia is no longer merely a frontier laager clinging to the coast. With the trek complete, the republic may begin to exchange its improvised wartime institutions for a more regular civil order suited to a settled maritime state."
 sb_great_trek.101.f:0 "The wagons had found the sea. The harder task was to govern what the sea-road had won."
 sb_great_trek.101.a:0 "Let Natalia be settled."
 sb_great_trek.002.t:0 "After Mzilikazi"
 sb_great_trek.002.d:0 "After Vegkop, the [SCOPE.sCountry('ndebele').GetAdjective] realm is moving north under pressure from Trekboer arms and [SCOPE.sCountry('zulu').GetName]. [SCOPE.sStateRegion('transvaal_region').GetName] now lies open to new claimants."
 sb_great_trek.002.f:0 "Reports from the highveld came in fragments, but on one point they agreed: [SCOPE.sCharacter('mzilikazi').GetFirstNameNoFormatting] was moving north, and the land behind him lay open to whoever could seize and hold it."
 sb_great_trek.002.a:0 "Move while the veld lies open."
 sb_great_trek.002.b:0 "We cannot bear that burden."
 sb_great_trek.002.c:0 "Encourage settlement, but claim it slowly."
 sb_great_trek.006.t:0 "Potchefstroom Founded"
 sb_great_trek.006.d:0 "A Boer foothold now stands beyond the Vaal. What began as Oranje's advance into the western Transvaal can now harden into a separate inland republic centered upon Potchefstroom, with its own commandant and council."
 sb_great_trek.006.f:0 "A laager had become a town, and a town might yet become a republic."
 sb_great_trek.006.a:0 "Play as Transvaal."
 sb_great_trek.006.b:0 "So be it."
