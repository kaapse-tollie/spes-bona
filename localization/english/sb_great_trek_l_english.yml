l_english:
 sb_great_trek.030.t:0 "A Republic in Earnest"
 sb_great_trek.030.d:0 "What began as a handful of trekker camps has become a working economy. Farms sustain a growing population, traders bring goods from the coast, and the Volksraad can at last govern with a treasury behind it. The republic is no longer merely a frontier dream."
 sb_great_trek.030.f:0 "The camps remained, but they were no longer all that existed. A treasury, a council, and settled farms had begun to turn migration into government."
 sb_great_trek.030.a:0 "The republic endures."
 sb_great_trek.031.t:0 "Potchefstroom Established"
 sb_great_trek.031.d:0 "The settlement on the Mooi River has grown beyond its first condition. New farms line the banks, a church stands at the center, and Potchefstroom now looks less like a laager than a town. For the moment, the republic may be sustained."
 sb_great_trek.031.f:0 "Where wagons had once stood alone, there were now streets, stockyards, and a church bell. Potchefstroom had begun to look like a capital."
 sb_great_trek.031.a:0 "Our footing is secure."
 sb_great_trek.040.t:0 "The Vrystaat Won"
 sb_great_trek.040.d:0 "Our republic now controls the whole Vrystaat. From the Orange River to the Vaal, the land answers to the Volksraad in Bloemfontein. News of that success has spread through the Cape Colony, and Boer families who once hesitated are now loading their wagons."
 sb_great_trek.040.f:0 "Word of a whole country won traveled quickly through the Cape. Where there was land, there would soon be wagons following it."
 sb_great_trek.040.a:0 "Then let them come."
 sb_great_trek.041.t:0 "The Vaal Republic Secured"
 sb_great_trek.041.d:0 "The western Transvaal core is now secure. Potchefstroom and the surrounding districts answer to a single republican authority, and the inland republic at last stands on firmer ground than a chain of moving camps. News of that consolidation has stirred the Cape Colony, and Boer families are trekking north in growing numbers."
 sb_great_trek.041.f:0 "North of the Vaal, men now spoke less of passing through and more of remaining. That was the surest sign that a republic had taken root."
 sb_great_trek.041.a:0 "The republic is secure."
 sb_great_trek.042.t:0 "The Limpopo Frontier Won"
 sb_great_trek.042.d:0 "Zoutpansberg has grown from a handful of northern commandos into a republic that can claim the wider Limpopo frontier. Farms, laagers, and trading posts now bind the bushveld to the volksraad, and fresh trekker families are already loading wagons for the north."
 sb_great_trek.042.f:0 "At the edge of the bushveld the trek had found not a stopping-place, but another country to be claimed and settled."
 sb_great_trek.042.a:0 "Let them come north."
 sb_great_trek.043.t:0 "Natal Secured"
 sb_great_trek.043.d:0 "Natal no longer exists only as a coastal foothold won by treaty or laager. From Port Natal to the inland frontier, farms, wagon roads, and a republican council now bind the region into the wider trek, and Boer families in the Cape are beginning to look toward the sea-road."
 sb_great_trek.043.f:0 "Here the wagons had found the ocean, and with it a republic unlike those of the inland rivers. Men in the Cape had already begun to look seaward."
 sb_great_trek.043.a:0 "Then let them come."
 sb_great_trek.100.t:0 "A Republic Established"
 sb_great_trek.100.d:0 "Our republic has grown from a scattered collection of trekker camps into a viable state. Farms have been established, people gathered, and government made to function. This land may now be called our own."
 sb_great_trek.100.f:0 "What had begun in flight and hardship had become something steadier: a country with magistrates, farms, and enough permanence to claim the name of a republic."
 sb_great_trek.100.a:0 "So the republic stands."
 sb_great_trek.101.t:0 "A Settled Coast"
 sb_great_trek.101.d:0 "Natalia is no longer merely a frontier laager clinging to the coast. With the trek complete, the republic may begin to exchange its improvised wartime institutions for a more regular civil order suited to a settled maritime state."
 sb_great_trek.101.f:0 "The wagons had found the sea. The harder task now was to govern what had been won there as something more than a camp with a port."
 sb_great_trek.101.a:0 "Let Natalia be settled."
 sb_great_trek.002.t:0 "After Mzilikazi"
 sb_great_trek.002.d:0 "The aftermath of Vegkop has left the [SCOPE.sCountry('ndebele').GetAdjective] realm moving north after grave losses against armed Trekboer parties and pressure from [SCOPE.sCountry('zulu').GetName]. [SCOPE.sStateRegion('transvaal_region').GetName] now lies open to new claimants."
 sb_great_trek.002.f:0 "News from the highveld arrived in fragments. Some swore that Vegkop shattered [SCOPE.sCharacter('mzilikazi').GetFirstNameNoFormatting]'s power in a single terrible day, while others insisted that [SCOPE.sCountry('zulu').GetAdjectiveNoFormatting] raids had already worn the [SCOPE.sCountry('ndebele').GetNameNoFormatting] thin before the laagers made their stand. Whatever the balance of blows, the outcome is plain enough: [SCOPE.sCharacter('mzilikazi').GetFirstNameNoFormatting] now leads the [SCOPE.sCountry('ndebele').GetAdjectiveNoFormatting] north, leaving [SCOPE.sStateRegion('transvaal_region').GetNameNoFormatting] to whoever can seize and hold it."
 sb_great_trek.002.a:0 "Move while the veld lies open."
 sb_great_trek.002.b:0 "We cannot bear that burden."
 sb_great_trek.002.c:0 "Encourage settlement, but claim it slowly."
 sb_great_trek.006.t:0 "Potchefstroom Founded"
 sb_great_trek.006.d:0 "A Boer foothold now stands beyond the Vaal. What began as Oranje's advance into the western Transvaal can now harden into a separate inland republic centered upon Potchefstroom, with its own commandant and council."
 sb_great_trek.006.f:0 "A laager had become a town, and a town might now become a republic. Beyond the Vaal, a new state was asking to be taken seriously."
 sb_great_trek.006.a:0 "Play as Transvaal."
 sb_great_trek.006.b:0 "So be it."
