l_english:
sb_great_trek.030.t:0 "A Republic Takes Shape"
sb_great_trek.030.d:0 "What began as a handful of trekker camps has become a functioning economy. Our farms produce enough to sustain a growing population, traders bring goods from the coast, and the Volksraad can finally govern with a treasury behind it. The trekker republic is no longer a frontier dream — it is a reality."
sb_great_trek.030.f:0 "\"From nothing, a nation rises.\""
sb_great_trek.030.a:0 "The Free State endures."
 sb_great_trek.031.t:0 "Potchefstroom Grows"
 sb_great_trek.031.d:0 "The settlement on the Mooi River has blossomed beyond recognition. New farms line the riverbanks, a church stands at the town centre, and the smell of cattle and gunpowder marks a community that is decidedly Boer. Our economy can sustain the republic — for now."
 sb_great_trek.031.f:0 "\"The Lord provides for those who labour.\""
 sb_great_trek.031.a:0 "Our republic stands firm."
sb_great_trek.040.t:0 "Masters of the Vrystaat"
sb_great_trek.040.d:0 "Our republic now controls the entire Vrystaat — from the Orange River to the Vaal, the land answers to the Volksraad in Bloemfontein. Word of our success has spread through the Cape Colony. Boer families who hesitated before are now loading their wagons. A great wave of trekkers is heading north to claim their share of this new republic."
sb_great_trek.040.f:0 "\"The whole Vrystaat is ours — come, brothers, there is land enough for all.\""
sb_great_trek.040.a:0 "Let them come!"
sb_great_trek.041.t:0 "The Transvaal Secured"
 sb_great_trek.041.d:0 "The western Transvaal core is now secure. Potchefstroom and the surrounding trekker districts answer to a single republican authority, and the inland republic can at last claim to stand on firmer ground than a chain of migrating camps. News of that consolidation has electrified the Cape Colony. Boer families are trekking north in numbers not seen since the first great exodus."
sb_great_trek.041.f:0 "\"North of the Vaal, a Boer is free.\""
 sb_great_trek.041.a:0 "The western republic is secure."
sb_great_trek.042.t:0 "The Limpopo Frontier Secured"
sb_great_trek.042.d:0 "Zoutpansberg has grown from a handful of northern commandos into a republic that can claim the wider Limpopo frontier. Farms, laagers, and trading posts now bind the bushveld to the volksraad, and fresh trekker families are already loading wagons for the north."
sb_great_trek.042.f:0 "\"At the edge of the bushveld, the trek finds another country.\""
sb_great_trek.042.a:0 "Let them come north."
sb_great_trek.043.t:0 "Natal Secured"
sb_great_trek.043.d:0 "Natal no longer exists only as a coastal foothold won by treaty or laager. From Port Natal to the inland frontier, farms, wagon roads, and a republican council now bind the whole region into the wider trek, and Boer families in the Cape are beginning to look toward the sea-road."
sb_great_trek.043.f:0 "\"Here the wagons meet the ocean, and the trek learns the price of a whole country.\""
sb_great_trek.043.a:0 "Let them come to Natalia."
sb_great_trek.100.t:0 "A Republic Established"
sb_great_trek.100.d:0 "Our republic has grown from a scattered collection of trekker camps into a viable state. With a growing population, established farms, and a functioning government, we can truly call this land our own."
sb_great_trek.100.f:0 "From the trek, a nation is born."
sb_great_trek.100.a:0 "God has blessed our endeavour."
sb_great_trek.101.t:0 "A Coastal Republic Settled"
sb_great_trek.101.d:0 "Natalia is no longer merely a frontier laager clinging to the coast. With the trek complete, the republic can begin to exchange its improvised wartime institutions for a more regular civil order suited to a settled maritime state."
sb_great_trek.101.f:0 "\"The wagons have found the sea; now the republic must learn to govern it.\""
sb_great_trek.101.a:0 "Let Natalia become a proper republic."
 sb_great_trek.002.t:0 "In Mzilikazi's Wake"
 sb_great_trek.002.d:0 "In the aftermath of the Battle of Vegkop, the [SCOPE.sCountry('ndebele').GetAdjective] realm is migrating north after grave losses against armed Trekboer parties and sustained pressure from [SCOPE.sCountry('zulu').GetName]. [SCOPE.sStateRegion('transvaal_region').GetName] now lies open to new claimants."
 sb_great_trek.002.f:0 "News from the High Veld arrived in fragments: some swore that the Battle of Vegkop shattered [SCOPE.sCharacter('mzilikazi').GetFirstNameNoFormatting]'s power in a single terrible day, while others insisted that [SCOPE.sCountry('zulu').GetAdjectiveNoFormatting] raids had already worn the [SCOPE.sCountry('ndebele').GetNameNoFormatting] thin before the laagers made their stand. Whatever the precise balance of blows, the outcome is plain enough. [SCOPE.sCharacter('mzilikazi').GetFirstNameNoFormatting] is leading the [SCOPE.sCountry('ndebele').GetAdjectiveNoFormatting] people north, leaving [SCOPE.sStateRegion('transvaal_region').GetNameNoFormatting] to whoever can seize and hold it."
 sb_great_trek.002.a:0 "Drive into the frontier while the veld lies open."
 sb_great_trek.002.b:0 "Leave it be! The strain of governing that land is too much for us."
 sb_great_trek.002.c:0 "Encourage settlement of [SCOPE.sStateRegion('transvaal_region').GetName], but do not claim these lands all at once."
 sb_great_trek.006.t:0 "The Founding of Potchefstroom"
 sb_great_trek.006.d:0 "A Boer foothold now stands beyond the Vaal. What began as Oranje's advance into the western Transvaal can now harden into a separate inland republic centered on Potchefstroom, with its own commandant, council, and defensive bond to the parent trekker state."
 sb_great_trek.006.f:0 "\"A laager has become a town, and a town can become a republic.\""
 sb_great_trek.006.a:0 "Play as the new Transvaal republic."
 sb_great_trek.006.b:0 "Great!"
