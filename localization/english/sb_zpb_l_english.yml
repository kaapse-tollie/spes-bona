l_english:
 je_sb_zpb_crackdown:0 "Bring Order to Zoutpansberg"
 je_sb_zpb_crackdown_reason:0 "Britain tolerated our recognition on the understanding that the northern districts would not become a permanent reproach to the republic. If Zoutpansberg remains a byword for slave raiding and lawlessness, the convention itself may be called into question."
 je_sb_zpb_crackdown_desc:0 "The Zoutpansberg republic has made itself infamous for its slave-taking frontier practices. If we mean to remain a recognized republic, we must bring the northern district under firmer order before Britain decides to do the work for us."
 je_sb_zpb_crackdown_status:0 "Recognition now depends on proving that Transvaal can master its own frontier. So long as Zoutpansberg remains outside our control, Britain has cause to question whether the northern districts have escaped slavery in anything but name."

 sb_trek_convention_refusal_warning_tt:0 "#n Refusing the convention may provoke British anti-slavery pressure later.#!"
 sb_trek_zpb_frontier_spirit_warning_tt:0 "#n Backing Zoutpansberg's slaveholding frontier may cost us British recognition.#!"

 sb_trek.140.t:0 "The Sand River Convention"
 sb_trek.140.d:0 "Britain is prepared to regularize relations with the Transvaal and acknowledge the republic north of the Vaal, but not without conditions. London expects a stable government, a measure of peace on the frontier, and an end to the slavery practices that have long shadowed the trek."
 sb_trek.140.f:0 "\"Recognition may be purchased, but not without leaving a price behind in our laws.\""
 sb_trek.140.a:0 "Accept the convention and secure recognition."
 sb_trek.140.b:0 "We will not let Britain dictate our republic."

 sb_trek.141.t:0 "The Bloemfontein Convention"
 sb_trek.141.d:0 "Britain is now prepared to withdraw its claims to sovereignty between the Orange and the Vaal and recognize the Orange Free State as a settled republic. The price is submission to a more acceptable legal order, especially on the question of slavery."
 sb_trek.141.f:0 "\"A republic acknowledged by Britain is still freer than a sovereignty ruled from London.\""
 sb_trek.141.a:0 "Accept the convention and secure recognition."
 sb_trek.141.b:0 "We shall stand on our own terms."

 sb_trek.143.t:0 "Lawlessness in Northern Transvaal"
 sb_trek.143.d:0 "The Zoutpansberg Boers are widely spoken of as the wildest of the northern trekkers, and their willingness to traffic openly in coerced labor now threatens more than mere embarrassment. The volksraad fears that if their practices continue unchecked, Britain will question the Sand River settlement itself and deny that Transvaal has truly left slavery behind."
 sb_trek.143.f:0 "\"If the north remains lawless, London will say the convention was signed with a fiction rather than a republic.\""
 sb_trek.143.a:0 "Bring order to Zoutpansberg."
 sb_trek.143.b:0 "Zoutpansberg keeps the true frontier spirit."

 sb_trek.145.t:0 "Britain Questions the Convention"
 sb_trek.145.d:0 "Our failure to bring Zoutpansberg to heel has handed Britain the very pretext the volksraad feared. London now treats northern lawlessness and slave-raiding as proof that Transvaal cannot guarantee the conditions under which it was recognized. The convention is discredited, and the empire is preparing to act in the north."
 sb_trek.145.f:0 "\"A republic that cannot master its own frontier invites another master.\""
 sb_trek.145.a:0 "Then we must face the consequences."
