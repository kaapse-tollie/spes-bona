l_english:
 BSA:0 "British South Africa Company"
 BSA_ADJ:0 "British South African"

 je_sb_mineral_revolution:0 "The Mineral Revolution"
 je_sb_mineral_revolution_reason:0 "Diamonds and new circuits of capital are beginning to reorder Southern Africa. The question is no longer only who rules the frontier, but who can turn mineral wealth into durable political power."
 je_sb_mineral_revolution_status_liberal:0 "The Cape enters the mineral age under a more liberal settlement. Treaty-first politics and negotiated frontier management will be easier to sustain, though they will also be harder to enforce."
 je_sb_mineral_revolution_status_settler:0 "The Cape enters the mineral age under a hard settler order. Annexation, labour discipline, and direct territorial regularization now have stronger political backing."
 je_sb_mineral_revolution_status_compromise:0 "The Cape enters the mineral age under a pragmatic compromise. Negotiation remains possible, but every settlement will have to balance frontier pressure against constitutional restraint."
 je_sb_mineral_revolution_status_default:0 "Southern Africa is entering a new political age shaped by minerals, migration, and imperial capital."

 je_sb_griqualand_west_question:0 "The Griqualand West Question"
 je_sb_griqualand_west_question_reason:0 "The diamond fields have made the northern frontier impossible to ignore. Griqua claims, imperial pressure, and inland republican ambitions now converge around the same contested zone."
 je_sb_griqualand_west_question_status_pending:0 "No durable policy has yet been chosen for the diamond fields. A negotiated settlement and a hard territorial regularization remain open."
 je_sb_griqualand_west_question_status_arbitration:0 "A treaty-first route has been chosen. The diamond fields will be approached as a sovereignty dispute to be mediated, not merely overrun."
 je_sb_griqualand_west_question_status_hardline:0 "A hardline route has been chosen. The diamond fields are being treated as a problem of regularization, control, and formal jurisdiction."

 sb_phase3.010.t:0 "The Mineral Revolution"
 sb_phase3.010.d_liberal:0 "Diamonds have changed the scale of politics in Southern Africa. The Cape's liberal settlement has survived the earlier frontier crisis, but the mineral fields now threaten to drag every constitutional principle into a harsher imperial contest. Merchants, missionaries, Griqua intermediaries, and inland republics alike are being pulled toward the same contested wealth."
 sb_phase3.010.d_settler:0 "Diamonds have changed the scale of politics in Southern Africa. Under the Cape's harder frontier order, the mineral fields look less like a distant windfall and more like a test of whether power can be consolidated before rivals - imperial, Griqua, or Boer - do so first."
 sb_phase3.010.d_compromise:0 "Diamonds have changed the scale of politics in Southern Africa. The Cape's compromise settlement has kept earlier constitutional fractures from breaking the colony apart, but the new mineral wealth threatens to revive every old dispute in sharper form."
 sb_phase3.010.d_default:0 "Diamonds have changed the scale of politics in Southern Africa. Mineral wealth is beginning to redraw old frontiers, stiffen imperial interests, and turn local sovereignty disputes into regional crises."
 sb_phase3.010.f:0 "\"A field of stones may yet reorder kingdoms, colonies, and republics alike.\""
 sb_phase3.010.a:0 "A new age is beginning."

 sb_phase3.020.t:0 "Kimberley"
 sb_phase3.020.d:0 "Diamonds around Kimberley have transformed an inland frontier dispute into a regional sovereignty crisis. The fields sit under [SCOPE.sCountry('kimberley_holder').GetName], but the Cape cannot ignore what they will do to trade, migration, and Boer ambition across the interior."
 sb_phase3.020.f:0 "\"Once the stones are known, no map will remain innocent for long.\""
 sb_phase3.020.a:0 "Send an envoy to London for an expedition."
 sb_phase3.020.b:0 "Offer protection from the Boers."
 sb_phase3.020.c:0 "Ask London to organize an expedition."
 sb_phase3.020.e:0 "Do nothing."

 sb_phase3.021.t:0 "Diamonds at Kimberley"
 sb_phase3.021.d:0 "Prospectors have confirmed that the ground around Kimberley contains diamonds in quantity. What had been a remote frontier holding is now a magnet for capital, migrants, and claims from every power with an interest in Southern Africa."
 sb_phase3.021.f:0 "\"The first stone was small enough to pocket. The rush it began was not.\""
 sb_phase3.021.a:0 "The fields are ours to work."

 sb_phase3.022.t:0 "A Cape Petition Over Kimberley"
 sb_phase3.022.d:0 "The Cape ministry has asked London to back a firmer settlement around Kimberley. The request frames the diamond fields as an imperial trade and security problem, but endorsing it would also pull Britain deeper into the sovereignty dispute."
 sb_phase3.022.f:0 "\"No frontier petition is ever merely local once the stones glitter brightly enough.\""
 sb_phase3.022.a:0 "Authorize the expedition."
 sb_phase3.022.b:0 "London has other priorities."

 sb_phase3_kimberley_london_expedition_tt:0 "Britain backs a coercive Kimberley claim, adding pressure and claims against the current holder of the fields."
 sb_phase3_kimberley_wbl_protection_tt:0 "If the Cape is fully liberal, Waterboersland is annexed directly; otherwise Waterboersland becomes a Cape puppet."
 sb_phase3_glw_arbitration_tt:0 "Sets the opening Griqualand West route to a treaty-first arbitration path."
 sb_phase3_glw_hardline_tt:0 "Sets the opening Griqualand West route to a hardline regularization path and sharpens frontier claims."
