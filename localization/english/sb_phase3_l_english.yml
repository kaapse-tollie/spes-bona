 je_sb_mineral_revolution:0 "The Mineral Revolution"
 je_sb_mineral_revolution_reason:0 "Diamonds and new circuits of capital are beginning to reorder Southern Africa. The question is no longer only who rules the frontier, but who can turn mineral wealth into durable political power."
 je_sb_mineral_revolution_status_liberal:0 "The Cape enters the mineral age under a more liberal settlement. Treaty-first politics and negotiated frontier management will be easier to sustain, though they will also be harder to enforce."
 je_sb_mineral_revolution_status_settler:0 "The Cape enters the mineral age under a hard settler order. Annexation, labour discipline, and direct territorial regularization now have stronger political backing."
 je_sb_mineral_revolution_status_compromise:0 "The Cape enters the mineral age under a pragmatic compromise. Negotiation remains possible, but every settlement will have to balance frontier pressure against constitutional restraint."
 je_sb_mineral_revolution_status_default:0 "Southern Africa is entering a new political age shaped by minerals, migration, and imperial capital."

 je_sb_griqualand_west_question:0 "The Griqualand West Question"
 je_sb_griqualand_west_question_reason:0 "The diamond fields have made the northern frontier impossible to ignore. Griqua claims, imperial pressure, and inland republican ambitions now converge around the same contested zone."
 je_sb_griqualand_west_question_status_pending:0 "No durable policy has yet been chosen for the diamond fields. A negotiated settlement and a hard territorial regularization remain open."
 je_sb_griqualand_west_question_status_arbitration:0 "A treaty-first route has been chosen. The diamond fields will be approached as a sovereignty dispute to be mediated, not merely overrun."
 je_sb_griqualand_west_question_status_hardline:0 "A hardline route has been chosen. The diamond fields are being treated as a problem of regularization, control, and formal jurisdiction."





