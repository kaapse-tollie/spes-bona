 BSA:0 "British South Africa Company"
 BSA_ADJ:0 "British South African"

je_sb_mineral_revolution:0 "The Mineral Age"
je_sb_mineral_revolution_reason:0 "Diamonds and new flows of capital are beginning to reorder Southern Africa. The question is no longer only who commands the frontier, but who can turn mineral wealth into political power."
 je_sb_mineral_revolution_status_liberal:0 "The mineral age begins under a liberal settlement. Treaty-first politics remain possible, but the pressure of the fields will make them harder to sustain."
 je_sb_mineral_revolution_status_settler:0 "The mineral age begins under a hard settler order. Annexation, labor discipline, and direct regularization now have firmer backing."
 je_sb_mineral_revolution_status_compromise:0 "The mineral age begins under a compromise. Negotiation remains possible, but every settlement must now balance frontier pressure against constitutional restraint."
 je_sb_mineral_revolution_status_default:0 "Southern Africa is entering a new age shaped by minerals, migration, and imperial capital."

je_sb_griqualand_west_question:0 "The Kimberley Question"
je_sb_griqualand_west_question_reason:0 "The diamond fields have made the northern frontier impossible to ignore. Griqua claims, imperial pressure, and inland republican ambition now converge upon the same disputed ground."
 je_sb_griqualand_west_question_status_pending:0 "No durable policy has yet been chosen for the diamond fields. Negotiation and coercion alike remain open."
 je_sb_griqualand_west_question_status_arbitration:0 "A treaty-first course has been chosen. The diamond fields are now to be approached as a sovereignty dispute to be mediated."
 je_sb_griqualand_west_question_status_hardline:0 "A hardline course has been chosen. The diamond fields are now treated as a question of control, regularization, and formal jurisdiction."

