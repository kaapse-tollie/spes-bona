 # ECSL Movement
 movement_sb_eastern_cape_separatist:0 "Eastern Cape Separatist League"
 movement_sb_eastern_cape_separatist_short:0 "ECSL"
 movement_sb_eastern_cape_separatist_name:0 "Eastern Cape Separatist League"
 movement_sb_eastern_cape_separatist_desc:0 "Frontier settlers in the Eastern Cape demand greater autonomy from Cape Town, arguing that the colonial government prizes liberal reform above frontier security."
 ideology_sb_settler_separatist:0 "Settler Separatist"
ideology_sb_settler_separatist_desc:0 "Settler separatists believe the Eastern Cape frontier should govern itself, free from the liberal politics of Cape Town. They demand aggressive colonization and a harder racial order."
 sb_no_colonial_affairs:0 "No Colonial Affairs"
 sb_enacting_no_colonial_affairs:0 "Enacting No Colonial Affairs"
ideology_sb_cape_liberal:0 "Cape Liberal"
ideology_sb_cape_liberal_desc:0 "Cape liberals champion the Qualified Franchise: a color-blind vote for men of property and literacy. They resist frontier colonization and oppose the harsher forms of racial segregation."
ideology_sb_settler_colonialist:0 "Settler Colonialist"
ideology_sb_settler_colonialist_desc:0 "Southern African settler agrarians want colonial expansion to serve frontier security, land hunger, and local supremacy, and reject any policy that abandons the frontier."
ideology_sb_boer_commandant_landowner:0 "Boer Commandant"
ideology_sb_boer_commandant_landowner_desc:0 "Boer commandant landowners see political authority and militia service as inseparable. They favor a republic of landholders defended by mounted citizen-commandos rather than a centralized standing army."
amendment_sb_commando_corps:0 "Commando Corps"
amendment_sb_commando_corps_desc:0 "The burgher militia is organized around the commando system: mounted riflemen drawn from the farming districts and bound to the rifle as a badge of citizenship."
law_sb_commandant_general_republic:0 "Boer Republic"
law_sb_commandant_general_republic_desc:0 "In the young Boer republics, the elected head of state still stands close to the commando and the frontier field. Civil authority and military command are fused in a republican Commandant-General rather than separated into a settled civilian presidency."
law_sb_non_racialism:0 "Non-Racialism"
law_sb_non_racialism_desc:0 "The Cape's franchise tradition is recast into a more explicit principle: civil status and political belonging do not formally rest on race, even if wealth, literacy, and colonial hierarchy still shape who may exercise them in practice."
gov_boer_commandant_general_republic:0 "Boer Republic"
gov_boer_commandant_general_republic_desc:0 "This young Boer republic vests civil authority and field command in a single elected Commandant-General, binding the frontier executive, the commando tradition, and the volksraad into a stark republican order built for war and migration."
