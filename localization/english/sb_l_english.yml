CAP_FLAVOR_TEXT:0 "The Cape Colony is Britain's oldest possession in Southern Africa, but its settlement is still contested. Cape Town defends franchise and restraint; the eastern frontier demands harder rule and room to advance."
 ORA_FLAVOR_TEXT:0 "The Orange Republic is still more claim than country. Basotho and Griqua power endure, settler authority is thin, and the Vrystaat belongs only to the power that can hold it."
 TRN_FLAVOR_TEXT:0 "Beyond the Vaal, the trekkers stand near statehood and nearer ruin. If they survive the Ndebele, bind their settlements together, and draw new migration north, their rough polity may yet become a republic."

 # Journal Entries - Cape Politics
 je_sb_cape_politics:0 "The Cape Question"
je_sb_cape_politics_reason:0 "Cape Town and the eastern frontier no longer accept the same settlement. Liberal reform, settler ascendancy, compromise, or partition must decide the colony's course."
 je_sb_cape_politics_lobby:0 "The old Cape balance is breaking. Cape Town defends franchise and law; the eastern frontier demands harder rule and wider settlement; others still hope that compromise might preserve the colony whole."
 je_sb_cape_politics_desc:0 "The Cape Colony is divided between #bold Cape Liberals#! and #bold Eastern Settlers#!.\n\nThe liberals seek to preserve the Cape franchise and secure responsible government. The settlers demand a harder frontier policy and freer scope for expansion.\n\n#b Liberal Victory:#! Liberal strength reaches its full program while [GetLawType('law_cultural_exclusion').GetName] is in force.\n#b Settler Victory:#! Settler strength reaches its full program once the Xhosa frontier has been pacified.\n#b Compromise:#! The balance stays near the center while [GetLawType('law_cultural_exclusion').GetName] is in force and the frontier has been pacified.\n\nIf the #bold Eastern Cape Separatist League#! reaches full secession, the question passes to London as the Albany Question."
 je_sb_cape_politics_completion_header:0 "The Cape Question will be resolved when:\n"
 je_sb_cape_politics_resolution_header:0 "The Cape Question Settled"
 je_sb_cape_politics_complete_liberal:0 "#header Liberal Victory#! Liberal strength has carried the colony."
 je_sb_cape_politics_complete_cultral_exclusion:0 "Enact [GetLawType('law_cultural_exclusion').GetName]." 
 je_sb_cape_politics_complete_settler:0 "#header Settler Victory#! Settler strength has carried the colony."
 je_sb_cape_politics_complete_frontier_pacified:0 "Pacify the Xhosa frontier."
 je_sb_cape_politics_complete_compromise:0 "#header Compromise#! Neither side dominates."
 je_sb_cape_politics_complete_secession:0 "#header Albany Secession#! The eastern settlers have appealed to London for a separate colony."
 je_sb_cape_politics_complete_timeout:0 "#header Failure by Exhaustion#! The Cape question remains unsettled in 1880."
 je_sb_cape_politics_liberal_dominant:0 "The liberals now dominate Cape politics."
 je_sb_cape_politics_liberal_advantage:0 "The liberals hold the advantage."
 je_sb_cape_politics_settler_dominant:0 "The frontier party now dominates the colony."
 je_sb_cape_politics_settler_advantage:0 "The settler party holds the advantage."
 je_sb_cape_politics_balance:0 "Neither camp commands the colony."

