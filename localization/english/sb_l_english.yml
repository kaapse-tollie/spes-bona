 # Great Trek JE
 je_sb_great_trek:0 "The Great Trek"
 je_sb_great_trek_reason:0 "The trek has carried the Boers beyond British rule, but not beyond danger. A republic of wagons and commandos must still become a republic of farms, magistrates, and settled frontiers."
je_sb_great_trek_lobby:0 "The Boer trek beyond the colonial frontier is still only a chain of wagon camps, commandos, and uneasy councils. The Voortrekkers must survive Mzilikazi in the interior, carve out stable republics on the highveld, and decide whether their future lies inland or on the Natal coast. What begins here is not yet Oranje or Transvaal in any settled sense, but the whole uncertain Boer venture beyond the Cape."
 je_sb_great_trek_desc:0 "The wagons have crossed the colonial boundary, yet the #bold Great Trek#! is not complete. A trek republic must first make itself viable in substance, then secure the homeland it claims. Only then can exile harden into statehood.\n\n#b Consolidation:#! Build a working economy, hold the full Vrystaat or the western Transvaal republican core, and turn migration into lasting settlement.\n#b Natal Ambition:#! Oranje may choose to open the Natal question by expedition and negotiation, but the coast invites both Zulu war and British interference."
 je_sb_transvaal_unity:0 "Transvaal Unity"
 je_sb_transvaal_unity_reason:0 "Lydenburg broke away in fear that Transvaal was abandoning the frontier compact. If the republic can prove itself stable, prosperous, and faithful to the burgher order, the eastern highveld may yet be drawn back into union."
 je_sb_transvaal_unity_status:0 "Lydenburg will not return merely because we demand it. We must show that Transvaal is stronger than the splinter republic, yet still true to the conservative frontier order its burghers claim to defend."
 je_sb_transvaal_unity_progress_tt:0 "Maintain a stable conservative republic, keep Lydenburg amicable, and outgrow it economically for 5 cumulative years"
 je_sb_zulu_kingdom:0 "Dynastic Stability"
 je_sb_zulu_kingdom_reason:0 "The Zulu chiefdom still inspires fear, but its royal order is young and brittle. Dingane must survive frontier war, British coastal pressure, and the politics of succession if the house of Senzangakhona is to remain secure."
 je_sb_zulu_kingdom_lobby:0 "Post-Shaka Zululand is powerful but unsettled. Dingane's court sits between Boer encroachment, British interest at Port Natal, and rival claimants within the royal house itself. Victory, prestige, and the careful handling of frontier bargains will decide whether the dynasty steadies itself or breaks."
 je_sb_zulu_kingdom_desc:0 "The Zulu chiefdom's greatest danger is no longer simple conquest, but whether the royal house can remain politically secure through the Natal crisis and the first age of gunpowder warfare. #bold Dynastic Stability#! rises when the ruler appears strong, capable, and victorious; it falls when he appears weak, discredited, or personally unfit to rule.\n\n#b At 0:#! the ruler is overthrown and the chiefdom enters a dynastic crisis.\n#b At 100:#! the dynasty is secured, a stable heir is established, and the court accepts the ruler's house as durable."
 je_sb_zulu_kingdom_status:0 "The royal house remains exposed. Prestige, personal rule, and events on the Natal frontier will decide whether the dynasty holds."
 je_sb_zulu_kingdom_status_secure:0 "The royal house looks increasingly secure. The court is willing to believe the dynasty can endure the frontier storms ahead."
 je_sb_zulu_kingdom_status_steady:0 "The chiefdom is holding together, but the throne is secure only so long as the ruler continues to project strength."
 je_sb_zulu_kingdom_status_precarious:0 "Confidence in the ruler is slipping. Defeat, humiliation, or disorder could turn murmurs at court into open succession politics."
 je_sb_zulu_kingdom_status_crisis:0 "The dynasty stands on the edge of collapse. Another shock may unmake the ruler altogether."
 je_sb_zulu_kingdom_complete_dynasty:0 "Dynastic Stability has reached 100"

 # Trek Events
 # Stage 1 reward — ORA economy established
sb_trek.030.t:0 "A Republic Takes Shape"
sb_trek.030.d:0 "What began as a handful of trekker camps has become a functioning economy. Our farms produce enough to sustain a growing population, traders bring goods from the coast, and the Volksraad can finally govern with a treasury behind it. The trekker republic is no longer a frontier dream — it is a reality."
sb_trek.030.f:0 "\"From nothing, a nation rises.\""
sb_trek.030.a:0 "The Free State endures."

 # Stage 1 reward — TRN economy established
 sb_trek.031.t:0 "Potchefstroom Grows"
 sb_trek.031.d:0 "The settlement on the Mooi River has blossomed beyond recognition. New farms line the riverbanks, a church stands at the town centre, and the smell of cattle and gunpowder marks a community that is decidedly Boer. Our economy can sustain the republic — for now."
 sb_trek.031.f:0 "\"The Lord provides for those who labour.\""
 sb_trek.031.a:0 "Our republic stands firm."

 # Stage 2 reward — ORA controls Vrystaat, mass migration
sb_trek.040.t:0 "Masters of the Vrystaat"
sb_trek.040.d:0 "Our republic now controls the entire Vrystaat — from the Orange River to the Vaal, the land answers to the Volksraad in Bloemfontein. Word of our success has spread through the Cape Colony. Boer families who hesitated before are now loading their wagons. A great wave of trekkers is heading north to claim their share of this new republic."
sb_trek.040.f:0 "\"The whole Vrystaat is ours — come, brothers, there is land enough for all.\""
sb_trek.040.a:0 "Let them come!"

 # Stage 2 reward — TRN controls Transvaal, mass migration
sb_trek.041.t:0 "The Transvaal Secured"
 sb_trek.041.d:0 "The western Transvaal core is now secure. Potchefstroom and the surrounding trekker districts answer to a single republican authority, and the inland republic can at last claim to stand on firmer ground than a chain of migrating camps. News of that consolidation has electrified the Cape Colony. Boer families are trekking north in numbers not seen since the first great exodus."
sb_trek.041.f:0 "\"North of the Vaal, a Boer is free.\""
 sb_trek.041.a:0 "The western republic is secure."
sb_trek.042.t:0 "The Limpopo Frontier Secured"
sb_trek.042.d:0 "Zoutpansberg has grown from a handful of northern commandos into a republic that can claim the wider Limpopo frontier. Farms, laagers, and trading posts now bind the bushveld to the volksraad, and fresh trekker families are already loading wagons for the north."
sb_trek.042.f:0 "\"At the edge of the bushveld, the trek finds another country.\""
sb_trek.042.a:0 "Let them come north."
sb_trek.043.t:0 "Natal Secured"
sb_trek.043.d:0 "Natal no longer exists only as a coastal foothold won by treaty or laager. From Port Natal to the inland frontier, farms, wagon roads, and a republican council now bind the whole region into the wider trek, and Boer families in the Cape are beginning to look toward the sea-road."
sb_trek.043.f:0 "\"Here the wagons meet the ocean, and the trek learns the price of a whole country.\""
sb_trek.043.a:0 "Let them come to Natalia."

 # Great Trek JE completion
 sb_trek.100.t:0 "A Republic Established"
sb_trek.100.d:0 "Our republic has grown from a scattered collection of trekker camps into a viable state. With a growing population, established farms, and a functioning government, we can truly call this land our own."
sb_trek.100.f:0 "From the trek, a nation is born."
sb_trek.100.a:0 "God has blessed our endeavour."

 # Great Trek JE status descriptions
 je_sb_great_trek_stage1_status:0 "Our republic is not yet secure in substance. We must build an economy worthy of statehood before the trek can be said to have taken root."
 je_sb_great_trek_stage2_status:0 "The republic now stands on an economic footing. What remains is to secure the homeland we claim and turn settlement into mastery."
