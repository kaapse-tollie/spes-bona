 concept_sb_responsible_colony:0 "Responsible Colony"
 concept_sb_responsible_colony_desc:0 "A #bold Responsible Colony#! is a self-governing [concept_subject] that remains within the imperial relationship. It keeps its ordinary colonial obligations unless those are separately altered, but governs domestic affairs through its own ministry, may initiate its own [concept_diplomatic_play], may hold its own subjects, and may move beyond simple Crown-colony administration in its internal constitutional order."


