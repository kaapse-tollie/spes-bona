 CAP_FLAVOR_TEXT:0 "The Cape Colony is Britain's oldest possession in southern Africa, yet in 1836 its future is unsettled. Cape Town liberals speak of franchise, restraint, and a more inclusive colonial order, while the eastern frontier clamours for harsher rule, stronger imperial protection, and expansion against the Xhosa."
 ORA_FLAVOR_TEXT:0 "The Orange republic remains a project rather than a settled fact. Trekker authority is thin, Griqua and Basotho claims remain alive, and the Vrystaat will belong only to the power that can feed it, hold it, and persuade new settlers to stake their future there."
 TRN_FLAVOR_TEXT:0 "Beyond the Vaal, the trekkers of Transvaal stand close to statehood but closer still to disaster. If they can survive the Ndebele storm, bind the scattered settlements together, and draw fresh Boer migration north, their rough republic may yet mature into the South African Republic."

 # Journal Entries - Cape Politics
 je_sb_cape_politics:0 "The Soul of the Cape"
 je_sb_cape_politics_reason:0 "No ministry can long satisfy both Cape Town and the eastern frontier. A broader civic order, a harder settler polity, or an imperial partition must sooner or later settle the question."
 je_sb_cape_politics_lobby:0 "The Cape's old political settlement is fraying. In Cape Town, liberals seek to build a new order, one of non-racialism and a qualified franchise. In the east, 1820 English frontier settlers and disgruntled Boers demand a harsher response to Xhosa tribes and free rein for settler expansionism. The laws you pass, the factions you strengthen, and the fate of the Xhosa frontier will shape the character of the Cape, or even whether the Cape remains one polity at all..."
 je_sb_cape_politics_desc:0 "The Cape Colony is divided between #bold Cape Liberals#! and #bold Eastern Settlers#!.\n\nThe liberals seek to secure #v Cultural Exclusion#!, preserve the colony's qualified franchise tradition, and draw the Griqua and other loyal communities more fully into Cape political life. The settlers demand harsher frontier governance, the defeat of the Xhosa polities, and a settlement that keeps power in eastern hands.\n\n#b Liberal Victory:#! the Liberal balance reaches #v 100%#! while #v Cultural Exclusion#! is in force.\n#b Settler Victory:#! the Settler balance reaches #v 100%#! after the eastern frontier has been pacified.\n#b Pragmatic Settlement:#! the balance remains near the centre, #v Cultural Exclusion#! is in force, and the eastern frontier has been pacified.\n\nIf the #bold Eastern Cape Separatist League#! reaches full secession, the constitutional contest passes beyond Cape Town and is laid before London as the Albany question. If no durable settlement emerges by #v 1880#!, the issue curdles into bitterness."
 je_sb_cape_politics_completion_header:0 "The Cape Question will close when:\n"
 je_sb_cape_politics_resolution_header:0 "The Cape Question Is Settled."
 je_sb_cape_politics_complete_liberal:0 "#header Liberal Victory#! - Liberal strength has reached its full programme."
 je_sb_cape_politics_complete_cultral_exclusion:0 "The [GetLawType('law_cultural_exclusion').GetName] [concept_law] has been passed." 
 je_sb_cape_politics_complete_settler:0 "#header Settler Victory#! - Settler strength has reached its full programme."
 je_sb_cape_politics_complete_frontier_pacified:0 "The Xhosa frontier has been pacified."
 je_sb_cape_politics_complete_compromise:0 "#header Pragmatic Compromise#! - Neither side dominates."
 je_sb_cape_politics_complete_failure:0 "#header Failure#! - The date is 1880."
 je_sb_cape_politics_complete_secession:0 "#header Albany has seceded - #! Eastern Cape settlers have risen up and demanded London sanction Albany as a seperate colony."
 je_sb_cape_politics_liberal_dominant:0 "The Liberals are ascendant. A constitutional Cape, broader in franchise and less beholden to settler & imperial interests, is within reach."
 je_sb_cape_politics_liberal_advantage:0 "Liberal influence is growing. Cape Town's lawyers, merchants, and missionaries are gaining ground against settler interest."
 je_sb_cape_politics_settler_dominant:0 "Settler interests dominate. The eastern districts speak more loudly than the western ministries, and the frontier presses for expansion."
 je_sb_cape_politics_settler_advantage:0 "The settler faction is ascendant. Eastern spokesmen demand a harder frontier order and a ministry that acts before it deliberates."
 je_sb_cape_politics_balance:0 "Neither camp commands the whole colony. For now, the Cape survives by compromise and delay."

 # Static Modifiers
 sb_settler_victory:0 "Settler Dominance"

 sb_cape.001.t:0 "The Cape Question"
 sb_cape.001.d:0 "The Sixth Xhosa War has ended, but the eastern frontier is settled only in name. Cape Town's liberals speak of law, franchise, and a more distinctly Cape constitutional order, while the eastern settlers demand a harder frontier, faster expansion, and a ministry that treats their grievances as the colony's first duty. Neither camp yet rules the whole colony, but the quarrel can no longer be ignored."
 sb_cape.001.f:0 "\"The frontier has fallen silent, not settled.\""
 sb_cape.001.a:0 "The tension is plain enough."

 # Events - Cape JE completion
 sb_cape.100.t:0 "The Liberals Prevail"
 sb_cape.100.d:0 "The liberal faction has done more than endure: it has imposed its constitutional settlement on the Cape. With Cultural Exclusion in force, the colony can widen acceptance without abandoning hierarchy altogether. The Griqua are drawn more firmly into the political nation, and the Cape's reputation for guarded openness begins to attract migrants, missionaries, and merchants alike."
 sb_cape.100.d_albany:0 "The Cape's liberals have prevailed, but only after the eastern frontier tore itself away from Cape Town. London has sanctioned Albany as a separate colony, and the old settler bloc has been amputated from Cape politics. What remains can now entrench the Cape Qualified Franchise, draw the Griqua more fully into the political nation, and pursue a more distinctly Cape constitutional order."
 sb_cape.100.d_after_secession:0 "The eastern challenge has been broken, though not before it drove the colony into open rupture. London's refusal forced the question into confrontation, and the frontier separatists have spent their fury without overturning Cape Town. The liberals can now consolidate their constitutional order, widen acceptance for the Griqua, and claim that the Cape has survived its gravest internal test."
 sb_cape.100.f:0 "\"The future of this colony lies not in the lash, but in law.\""
 sb_cape.100.f_albany:0 "\"We have lost the frontier, but kept the principle.\""
 sb_cape.100.f_after_secession:0 "\"They rose against the law and were spent by it.\""
 sb_cape.100.a:0 "The liberal order prevails."

 sb_cape.101.t:0 "The Frontier Prevails"
 sb_cape.101.d:0 "The eastern settlers have carried the day, and this time they have done so in law as well as in agitation. Cape Town's liberal circle has lost command of the colony's direction. Boer settlers are folded into the Cape's accepted political community, colonial expansion becomes a standing duty of government, and the Eastern Cape Separatist League stands down having won the substance of its demands."
 sb_cape.101.f:0 "\"Let the men of the frontier rule the frontier at last.\""
 sb_cape.101.a:0 "The frontier is open."

 sb_cape.102.t:0 "A Pragmatic Balance"
 sb_cape.102.d:0 "Neither liberals nor settlers have mastered the whole colony. Instead, the ministry closes the question through a guarded compromise: the constitutional order is preserved, colonial policy remains in law, and the qualified franchise is widened just far enough to improve the standing of the Griqua and neighbouring southern African peoples without openly overthrowing settler predominance. No party is satisfied, but the colony remains governable."
 sb_cape.102.f:0 "\"If neither side can master the whole colony, then each must yield enough to preserve it.\""
 sb_cape.102.a:0 "We settle for the middle way."

 sb_cape.103.t:0 "The Eastern Cape Secession"
 sb_cape.103.d:0 "We have pursued liberal change so aggressively that the Eastern Cape settlers now consider coexistence with Cape Town impossible. Their committees are armed, their newspapers speak openly of separation, and an ultimatum has been sent to London demanding recognition of a separate colony in the east. The constitutional struggle inside the Cape is over; what follows depends on the imperial answer."
 sb_cape.103.f:0 "\"They ask not merely to resist us, but to be rid of us altogether.\""
 sb_cape.103.a:0 "We await London's response."

 sb_cape.104.t:0 "A Bitter Settlement"
 sb_cape.104.d:0 "For decades the Cape question has been fought in ministries, newspapers, mission stations, and on the eastern frontier, yet no lasting settlement has taken hold. By 1880 the old argument has curdled into grievance and habit. The colony has found not resolution, but exhaustion: movements radicalize, public life grows harsher, and the bitterness of the unfinished settlement will linger for years."
 sb_cape.104.f:0 "\"A question postponed is never a question answered.\""
 sb_cape.104.a:0 "The bitterness lingers."

 # Responsible Government
 sb_cape.020.t:0 "Petition for Responsible Government"
 sb_cape.020.d:0 "The Cape Colony's political leaders have petitioned London for responsible government — the right to an elected parliament and self-governance in domestic affairs. This would make the Cape the most autonomous British colony in Africa, with the ability to manage its own subjects and internal policy."
 sb_cape.020.f:0 "\"We are capable of governing ourselves.\""
 sb_cape.020.a:0 "Responsible government is granted."
 sb_cape.020.b:0 "The time is not yet right."

 sb_cape.200.t:0 "The Albany Question"
 sb_cape.200.d:0 "The crisis in the Cape has entered a new stage. After a full settler rising in the Eastern Cape, Cape Town reports that the separatist committees have gone beyond protest and now demand direct recognition from London as a separate Colony of Albany. The ministry in Cape Town can no longer contain the question by constitutional means alone.\n\nIf we accept, we preserve imperial authority and deny the separatists a full break with the Crown, but we also concede that the Cape can no longer be governed as one political body. If we refuse, we keep the colony formally whole and force Cape Town to crush the eastern revolt without imperial partition."
 sb_cape.200.f:0 "\"If the frontier must be governed differently, then let it be governed differently under the Crown.\""
 sb_cape.200.a:0 "Albany will become a new Colony of Britain."
 sb_cape.200.b:0 "The Cape must remain whole."

 sb_cape.201.t:0 "London Sanctions Albany"
 sb_cape.201.d:0 "A new colony has been created. London has sanctioned Albany, and the eastern districts have been detached from Cape Town under direct imperial authority."
 sb_cape.201.f:0 "\"The map has been redrawn, and with it the future of the Cape.\""
 sb_cape.201.a:0 "London sanctions Albany."
 sb_cape.201.b:0 "Play as Albany."

 sb_cape.202.t:0 "London Refuses Separation"
 sb_cape.202.d:0 "London has refused the eastern ultimatum. The settlers are furious, and their leaders now claim they have been abandoned by both Cape Town and the imperial government. The constitutional question is closed, but the frontier crisis is not: armed bitterness will now have to work itself out without an imperial partition."
 sb_cape.202.f:0 "\"Then they leave us no remedy but our own.\""
 sb_cape.202.a:0 "The crisis deepens."

 sb_cape.203.t:0 "Albany Secured"
 sb_cape.203.d:0 "London has sanctioned Albany as a separate colony, and the eastern settler cause has been translated into a government of its own. Frontier offices are being organized, militia service is being regularized, and fresh migration is already being drawn toward Grahamstown and the border districts."
 sb_cape.203.f:0 "\"What was once a grievance is now an administration.\""
 sb_cape.203.a:0 "Albany will stand on its own frontier."

 sb_cape.111.t:0 "The Convict Crisis"
 sb_cape.111.d:0 "The imperial government now proposes to make the Cape a destination for transported convicts. To officials in London it is an administrative convenience; to many in the colony it is an insult. The frontier interest mutters that labour is labour, but Cape liberals denounce the scheme as proof that the colony is still treated less as a political community than as a receptacle for imperial burdens."
 sb_cape.111.f:0 "\"We are a colony, not a gaol.\""
 sb_cape.111.a:0 "If London insists, we will receive them."
 sb_cape.111.b:0 "The Cape will not be made a gaol."

 sb_cape.120.t:0 "Cape Liberals Demand Action"
 sb_cape.120.d:0 "With the eastern districts and imperial interest now pressing more heavily upon the ministry, the Cape liberals insist that sentiment is no longer enough. If Cape Town truly means to preserve a wider civic order, it must carry [GetLawType('law_cultural_exclusion').GetName] into law and give the colony a constitutional settlement that is not wholly captive to frontier alarms."
 sb_cape.120.f:0 "\"If principle is to survive in this colony, it must be written into statute before the frontier writes over it.\""
 sb_cape.120.a:0 "Commit the ministry to [GetLawType('law_cultural_exclusion').GetName]."
 sb_cape.120.b:0 "Let the liberals agitate harder."

 sb_cape.121.t:0 "Robert Godlonton Demands Action"
 sb_cape.121.d:0 "With the liberal party now ascendant, Robert Godlonton warns that the eastern frontier is again being asked to wait upon Cape Town's scruples. If the government wishes to preserve the loyalty of the eastern districts, it must commit itself to [GetLawType('law_frontier_colonization').GetName] and show that liberal dominance will not come at the frontier's expense."
 sb_cape.121.f:0 "\"The east did not endure war and alarm merely to be lectured by Cape Town once more.\""
 sb_cape.121.a:0 "Commit the ministry to [GetLawType('law_frontier_colonization').GetName]."
 sb_cape.121.b:0 "Refuse him."

 sb_cape.122.t:0 "Eastern Cape Settlers Demand Action"
 sb_cape.122.d:0 "With the liberals ascendant in Cape Town, the settler interest in the eastern districts now demands more than sympathetic words. If the ministry means to govern the whole colony rather than merely its western constituencies, it must commit itself to [GetLawType('law_frontier_colonization').GetName] and prove that frontier security still carries weight in law as well as debate."
 sb_cape.122.f:0 "\"If the frontier is to remain loyal, let the law show it is not forgotten.\""
 sb_cape.122.a:0 "Commit the ministry to [GetLawType('law_frontier_colonization').GetName]."
 sb_cape.122.b:0 "Refuse them."

