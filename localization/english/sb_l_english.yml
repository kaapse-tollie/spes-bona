 # Great Trek JE
 je_sb_great_trek:0 "The Great Trek"
 je_sb_great_trek_reason:0 "The trek has carried the Boers beyond British rule, but not beyond danger. A republic of wagons and commandos must still become a republic of farms, magistrates, and settled frontiers."
 je_sb_great_trek_lobby:0 "The Great Trek has opened two different futures. In the interior, the trekkers must consolidate the Vrystaat and Transvaal before scattered camps harden into failure. On the Natal coast, the Oranje trekkers may yet seek a road to the sea, if they dare bargain or fight with Dingane for it."
 je_sb_great_trek_desc:0 "The wagons have crossed the colonial boundary, yet the #bold Great Trek#! is not complete. A trek republic must first make itself viable in substance, then secure the homeland it claims. Only then can exile harden into statehood.\n\n#b Consolidation:#! Build a working economy, hold the full Vrystaat or Transvaal, and turn migration into lasting settlement.\n#b Natal Ambition:#! Oranje may choose to open the Natal question by expedition and negotiation, but the coast invites both Zulu war and British interference."
 je_sb_zulu_kingdom:0 "The Zulu Kingdom"
 je_sb_zulu_kingdom_reason:0 "Dingane's kingdom stands at the center of southeastern African politics, balancing Boer encroachment, British coastal intrigue, and the need to preserve Zulu military prestige."
 je_sb_zulu_kingdom_lobby:0 "The Zulu Kingdom enters 1836 as the dominant military power of southeastern Africa, but Dingane's throne is not secure. Boer trekkers are pushing toward Natal, British influence lingers at Port Natal, and every concession on the frontier risks opening the door to a larger challenge to Zulu sovereignty."
 je_sb_zulu_kingdom_desc:0 "The Zulu kingdom still commands fear across the southeast, yet its position is more precarious than it appears. Dingane must manage Boer settlement pressure in Natal, British traders and missionaries on the coast, and the long-term strain of preserving a centralized military kingdom in a rapidly changing regional balance of power."
 je_sb_zulu_kingdom_status:0 "The kingdom watches Natal. Boer migration, British interference, and dynastic weakness all threaten to turn the frontier into a test of Dingane's rule."

 # Trek Events
 # Stage 1 reward — ORA economy established
 sb_trek.030.t:0 "A Free State Takes Shape"
 sb_trek.030.d:0 "What began as a handful of trekker camps has become a functioning economy. Our farms produce enough to sustain a growing population, traders bring goods from the coast, and the Volksraad can finally govern with a treasury behind it. The Orange Free State is no longer a frontier dream — it is a reality."
 sb_trek.030.f:0 "\"From nothing, a nation rises.\""
 sb_trek.030.a:0 "The Free State endures."

 # Stage 1 reward — TRN economy established
 sb_trek.031.t:0 "Potchefstroom Grows"
 sb_trek.031.d:0 "The settlement on the Mooi River has blossomed beyond recognition. New farms line the riverbanks, a church stands at the town centre, and the smell of cattle and gunpowder marks a community that is decidedly Boer. Our economy can sustain the republic — for now."
 sb_trek.031.f:0 "\"The Lord provides for those who labour.\""
 sb_trek.031.a:0 "Our republic stands firm."

 # Stage 2 reward — ORA controls Vrystaat, mass migration
 sb_trek.040.t:0 "Masters of the Vrystaat"
 sb_trek.040.d:0 "The Orange Free State now controls the entire Vrystaat — from the Orange River to the Vaal, the land answers to the Volksraad in Bloemfontein. Word of our success has spread through the Cape Colony. Boer families who hesitated before are now loading their wagons. A great wave of trekkers is heading north to claim their share of this new republic."
 sb_trek.040.f:0 "\"The whole Vrystaat is ours — come, brothers, there is land enough for all.\""
 sb_trek.040.a:0 "Let them come!"

 # Stage 2 reward — TRN controls Transvaal, mass migration
 sb_trek.041.t:0 "The Transvaal Secured"
 sb_trek.041.d:0 "From the Vaal to the Limpopo, the Transvaal is ours. The scattered Boer settlements have been unified under a single authority, and the native kingdoms have been pushed back from the heartland. News of our territorial consolidation has electrified the Cape Colony. Boer families are trekking north in numbers not seen since the first great exodus."
 sb_trek.041.f:0 "\"North of the Vaal, a Boer is free.\""
 sb_trek.041.a:0 "The South African Republic is born!"

 # Great Trek JE completion
 sb_trek.100.t:0 "A Republic Established"
 sb_trek.100.d:0 "Our republic has grown from a scattered collection of trekker camps into a viable state. With a growing population, established farms, and a functioning government, we can truly call this land our own."
 sb_trek.100.f:0 "From the trek, a nation is born."
 sb_trek.100.a:0 "God has blessed our endeavour."

 # Great Trek JE status descriptions
 je_sb_great_trek_stage1_status:0 "Our republic is not yet secure in substance. We must build an economy worthy of statehood before the trek can be said to have taken root."
 je_sb_great_trek_stage2_status:0 "The republic now stands on an economic footing. What remains is to secure the whole homeland we claim and turn settlement into mastery."
 je_sb_great_trek_stage1_tt:0 "Economy established (GDP ≥ £100,000)"
 je_sb_great_trek_stage2_tt:0 "Territory secured (control entire home state region)"

