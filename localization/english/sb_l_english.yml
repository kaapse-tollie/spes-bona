CAP_FLAVOR_TEXT:0 "The Cape Colony is Britain's oldest possession in Southern Africa, yet in 1836 its future is unsettled. Cape Town liberals speak of franchise, restraint, and a broader colonial order, while the eastern frontier clamors for harsher rule, stronger imperial protection, and expansion against the Xhosa."
 ORA_FLAVOR_TEXT:0 "The Orange republic remains a project rather than a settled fact. Trekker authority is thin, Griqua and Basotho claims remain alive, and the Vrystaat will belong only to the power that can feed it, hold it, and persuade settlers to stake their future there."
 TRN_FLAVOR_TEXT:0 "Beyond the Vaal, the trekkers of Transvaal stand close to statehood but closer still to disaster. If they can survive the Ndebele storm, bind the scattered settlements together, and draw fresh Boer migration north, their rough republic may yet mature into the Transvaal Republic."

 # Journal Entries - Cape Politics
 je_sb_cape_politics:0 "The Soul of the Cape"
 je_sb_cape_politics_reason:0 "No ministry can long satisfy both Cape Town and the eastern frontier. A broader civic order, a harder settler order, or an imperial partition must settle the question."
 je_sb_cape_politics_lobby:0 "The Cape's old political settlement is fraying. In Cape Town, liberals seek a broader order grounded in franchise and law. In the east, frontier settlers and discontented Boers demand a harsher policy against the Xhosa and freer scope for colonial expansion. The laws you pass, the factions you strengthen, and the fate of the frontier will decide the character of the Cape, and perhaps whether it remains one polity at all."
 je_sb_cape_politics_desc:0 "The Cape Colony is divided between #bold Cape Liberals#! and #bold Eastern Settlers#!.\n\nThe liberals seek to preserve the colony's qualified franchise tradition, broaden Cape political life, and secure a self-governing constitutional order under the Crown. The settlers demand harsher frontier government, a freer hand against the Xhosa polities, and a settlement that keeps power in eastern hands.\n\n#b Liberal Victory:#! Liberal strength reaches its full program while [GetLawType('law_cultural_exclusion').GetName] is in force.\n#b Settler Victory:#! Settler strength reaches its full program after the eastern frontier has been pacified.\n#b Pragmatic Settlement:#! The balance remains near the center while [GetLawType('law_cultural_exclusion').GetName] is in force and the eastern frontier has been pacified.\n\nIf the #bold Eastern Cape Separatist League#! reaches full secession, the constitutional contest passes beyond Cape Town and is laid before London as the Albany Question."
 je_sb_cape_politics_completion_header:0 "The Cape Question will close when:\n"
 je_sb_cape_politics_resolution_header:0 "The Cape Question Is Settled."
 je_sb_cape_politics_complete_liberal:0 "#header Liberal Victory#! - Liberal strength has reached its full programme."
 je_sb_cape_politics_complete_cultral_exclusion:0 "The [GetLawType('law_cultural_exclusion').GetName] [concept_law] has been passed." 
 je_sb_cape_politics_complete_settler:0 "#header Settler Victory#! - Settler strength has reached its full programme."
 je_sb_cape_politics_complete_frontier_pacified:0 "The Xhosa frontier has been pacified."
 je_sb_cape_politics_complete_compromise:0 "#header Pragmatic Compromise#! - Neither side dominates."
 je_sb_cape_politics_complete_secession:0 "#header Albany has seceded - #! Eastern Cape settlers have risen up and demanded London sanction Albany as a seperate colony."
 je_sb_cape_politics_complete_timeout:0 "#header Failure by Exhaustion#! - The Cape question remains unresolved by 1880."
 je_sb_cape_politics_liberal_dominant:0 "The Liberals are ascendant. A constitutional Cape, broader in franchise and less beholden to settler & imperial interests, is within reach."
 je_sb_cape_politics_liberal_advantage:0 "Liberal influence is growing. Cape Town's lawyers, merchants, and missionaries are gaining ground against settler interest."
 je_sb_cape_politics_settler_dominant:0 "Settler interests dominate. The eastern districts speak more loudly than the western ministries, and the frontier presses for expansion."
 je_sb_cape_politics_settler_advantage:0 "The settler faction is ascendant. Eastern spokesmen demand a harder frontier order and a ministry that acts before it deliberates."
 je_sb_cape_politics_balance:0 "Neither camp commands the whole colony. For now, the Cape survives by compromise and delay."

