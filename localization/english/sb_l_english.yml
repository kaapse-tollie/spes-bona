 sb_responsible_colony_monarchy_desc:0 "A monarchical responsible-colony relationship grants domestic self-government while preserving the imperial dynasty."
 sb_responsible_colony_monarchy_pact_desc:0 "A monarchical responsible-colony relationship binds this colony to its overlord while preserving the imperial dynasty."
 sb_responsible_colony_monarchy_action_notification_name:0 "Responsible Colony Relationship Established"
