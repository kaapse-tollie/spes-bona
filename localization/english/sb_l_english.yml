 # Boer-Zulu / Natal chain
zulu_raid_port_natal:0 "Raid on Port Natal"
zulu_raid_port_natal_desc:0 "With the Boer threat broken for now, the Zulu king may try to seize Port Natal itself, capture its stores of guns, and force the British to answer on the coast."
zulu_raid_port_natal_firearms_tt:0 "Seizing British arms from Port Natal will add #v +10%#! progress to the [concept_journal_entry] #bold Adoption of Firearms#!."
natalia_raid_port_natal:0 "Raid on Port Natal"
natalia_raid_port_natal_desc:0 "Seize the British foothold at Port Natal before London can dictate the coast from shore. This will almost certainly provoke a British answer, but it gives the republic a chance to force the question on its own terms."




