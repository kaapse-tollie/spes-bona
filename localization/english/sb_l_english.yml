 je_sb_zpb_crackdown:0 "Order in Zoutpansberg"
 je_sb_zpb_crackdown_reason:0 "Britain tolerated our recognition on the understanding that the northern districts would not become a standing reproach to the republic. If Zoutpansberg remains a byword for slave-raiding and lawlessness, the convention itself may be called into question."
 je_sb_zpb_crackdown_desc:0 "Zoutpansberg has made itself infamous for slave-taking frontier practices. If Transvaal means to remain recognized, it must bring the northern district under firmer order."
 je_sb_zpb_crackdown_status:0 "Recognition now depends on mastering the northern frontier and bringing Zoutpansberg to heel."
 je_sb_zpb_unity:0 "Unity on the Frontier"
 je_sb_zpb_unity_reason:0 "Transvaal has chosen Zoutpansberg's harsher frontier compact over British conditions. If the two republics can keep a stable conservative order, bind their commandos, and hold the northern frontier together, union may yet be won."
 je_sb_zpb_unity_desc:0 "Zoutpansberg will not be folded into Transvaal by lectures from London. Unity depends on proving that Pretoria can sustain the same conservative burgher order while keeping Zoutpansberg amicable and dependent."
 je_sb_zpb_unity_status:0 "Maintain a stable conservative republic, keep Zoutpansberg amicable, retain [GetLawType('law_slave_trade').GetName], and outgrow it."
 je_sb_zpb_unity_progress_tt:0 "Maintain the frontier compact with Zoutpansberg for #v 5#! cumulative years."
 je_sb_pacifying_eastern_transvaal:0 "Pacifying Eastern Transvaal"
 je_sb_pacifying_eastern_transvaal_reason:0 "A frontier-minded Transvaal cannot leave the eastern highveld unsettled. If the republic is to claim that country as truly its own, it must dominate the region and plant a durable Boer community there."
 je_sb_pacifying_eastern_transvaal_status:0 "Bring all of eastern Transvaal under Transvaal control and raise Boer settlers to at least #v 20%#! of the population."
