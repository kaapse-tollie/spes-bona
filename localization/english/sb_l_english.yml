 concept_sb_responsible_colony:0 "Responsible Colony"
 concept_sb_responsible_colony_desc:0 "A #bold Responsible Colony#! is a self-governing [concept_subject] that remains inside the imperial relationship. It keeps its ordinary colonial obligations unless those are separately altered, but governs domestic affairs through its own ministry, can start its own [concept_diplomatic_play], can hold its own subjects, and can move beyond simple Crown-colony administration in its internal constitutional order."

 sb_trek.220.t:0 "Refugees from Philippolis"
 sb_trek.220.d:0 "The fall of Philippolis has sent Griqua families eastward in search of a protector who can still offer them land, law, and room to breathe. In Cape Town the question is immediate: should these refugees be directed toward the troubled eastern frontier, where they might form a useful march, or folded more directly into the Cape's existing political society?"
 sb_trek.220.f:0 "\"A people driven from one border may yet become the keystone of another.\""
 sb_trek.220.a:0 "Direct them toward the eastern frontier."
 sb_trek.220.b:0 "Bring them into the Cape proper."

