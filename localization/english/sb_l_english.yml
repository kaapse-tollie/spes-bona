 sb_responsible_colony_pact_desc:0 "A responsible-colony relationship binds this colony to its overlord while granting domestic self-government."
 sb_responsible_colony_action_notification_name:0 "Responsible Colony Relationship Established"
 sb_responsible_colony_action_notification_desc:0 "A responsible-colony relationship has been established."
