 # Great Trek JE
 je_sb_great_trek:0 "The Great Trek Continues"
 je_sb_great_trek_reason:0 "The trek has carried the Boers beyond British rule, but not beyond danger. A republic of wagons and commandos must still become a republic of farms, magistrates, and settled frontiers."
je_sb_great_trek_lobby:0 "Beyond the colonial boundary, the Voortrekkers remain a chain of camps, commandos, and uneasy councils. They must survive Mzilikazi, carve out durable republics, and decide whether the trek belongs inland or on the Natal coast."
 je_sb_great_trek_desc:0 "The wagons have crossed the colonial boundary, but the #bold Great Trek#! is not yet complete. A trek republic must first make itself viable, then secure the homeland it claims.\n\n#b Consolidation:#! Build a working economy, hold the whole Vrystaat or the western Transvaal core, and turn migration into settlement.\n#b Natal Ambition:#! Oranje may still open the Natal Question, but the coast invites both Zulu war and British interference."
 je_sb_transvaal_unity:0 "Transvaal Reunification"
 je_sb_transvaal_unity_reason:0 "Lydenburg broke away in fear that Transvaal was abandoning the frontier compact. If the republic can prove itself stable, prosperous, and faithful to the burgher order, the eastern highveld may yet be drawn back."
 je_sb_transvaal_unity_status:0 "Lydenburg will not return for the asking. Transvaal must prove itself the stronger republic without betraying the frontier order."
 je_sb_transvaal_unity_progress_tt:0 "Maintain a stable conservative republic, keep Lydenburg amicable, and outgrow it economically for #v 5#! cumulative years."
 je_sb_zulu_kingdom:0 "The Zulu Dynasty"
 je_sb_zulu_kingdom_reason:0 "The Zulu chiefdom still commands fear, but its royal order is young and brittle. Dingane must survive frontier war, British pressure on the coast, and the politics of succession if the house of Senzangakhona is to remain secure."
je_sb_zulu_kingdom_lobby:0 "Post-Shaka Zululand is powerful but unsettled. Dingane's court stands between Boer encroachment, British interest at Port Natal, and rival claimants within the royal house."
 je_sb_zulu_kingdom_desc:0 "The chiefdom's greatest danger is no longer simple conquest, but whether the royal house can remain politically secure through the Natal crisis and the first age of gunpowder war.\n\n#b Dynastic Stability rises#! when the ruler appears strong, capable, and victorious.\n#b Dynastic Stability falls#! when he appears weak, discredited, or unfit to rule.\n\n#b At 0:#! The ruler is overthrown and the chiefdom enters dynastic crisis.\n#b At 100:#! The dynasty is secured and the court accepts the royal house as durable."
 je_sb_zulu_kingdom_status:0 "The royal house remains exposed. Prestige, personal rule, and the Natal frontier will decide whether it holds."
 je_sb_zulu_kingdom_status_secure:0 "The royal house now appears secure."
 je_sb_zulu_kingdom_status_steady:0 "The chiefdom holds together, but the throne remains secure only so long as the ruler projects strength."
 je_sb_zulu_kingdom_status_precarious:0 "Confidence in the ruler is slipping. Another defeat or humiliation could turn court murmurs into open succession politics."
 je_sb_zulu_kingdom_status_crisis:0 "The dynasty stands at the edge of collapse. Another shock may unmake the ruler."
 je_sb_zulu_kingdom_complete_dynasty:0 "Reach #v 100#! Dynastic Stability"

