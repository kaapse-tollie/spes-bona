 sb_zulu_dynastic_crisis:0 "Dynastic Crisis"
 sb_zulu_dynastic_crisis_desc:0 "The royal succession has been thrown back into dispute. Authority is weaker, rival claimants circle the throne, and the chiefdom's political order is badly shaken."
sb_trek_ai_mobilization:0 "Republican Emergency Mobilization"
sb_trek_ai_mobilization_desc:0 "The trekker republic is squeezing every available burgher into the field while the frontier crisis remains unresolved."
sb_swazi_frontier_rearmed:0 "Frontier Rearmed"
sb_swazi_frontier_rearmed_desc:0 "Fresh firearms and a temporary frontier settlement have allowed the kingdom to reorganize its defenses and steady the western marches."
sb_swazi_frontier_grievance:0 "Swazi Frontier Grievance"
sb_swazi_frontier_grievance_desc:0 "The disputed northern Swazi frontier remains a live political irritation inside the republic, and its settlers and commandants are pressing for a harder line."
sb_swazi_stand_apart:0 "Stand Apart"
sb_swazi_stand_apart_desc:0 "The kingdom has rejected outside shelter for now and is drawing prestige from a hard line of independence, even at some strategic risk."
sb_swazi_frontier_muster:0 "Swazi Frontier Muster"
sb_swazi_frontier_muster_desc:0 "The Swazi are calling up men from across the frontier districts, turning a small standing force into a much larger defensive host for the duration of the crisis."
sb_swazi_frontier_muster_vs_player:0 "Swazi Frontier Resolve"
sb_swazi_frontier_muster_vs_player_desc:0 "With an unusually dangerous enemy pressing the kingdom, the Swazi councils have committed additional reserves and command energy to the frontier defense."

 # State Traits
 state_trait_sb_xhosa_resistance:0 "Xhosa Resistance"
 state_trait_sb_xhosa_resistance_desc:0 "Xhosa tribes fiercely contest any force that tries to encroach upon their lands. Raids, reprisals, and insecure communications make the eastern districts a zone of stubborn resistance."
 state_trait_sb_mountain_fortress:0 "Mountain Fortress"
 state_trait_sb_mountain_fortress_desc:0 "The rugged Drakensberg highlands provide a natural defensive stronghold. Armies fighting here benefit from the terrain, but the mountains also limit economic development."

