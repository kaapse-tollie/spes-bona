 dp_sb_natal_crisis_tooltip:0 "Launches the Boer-Zulu struggle over Natal as a closed crisis play with [concept_humiliation] on both sides."

 # Boer-Zulu / Natal chain
sb_boer_zulu.010.t:0 "An Expedition to Natal"
sb_boer_zulu.010.d:0 "The trekkers of Oranje now look toward Natal. Beyond the Tugela lie richer pasture, a possible road to the sea, and perhaps a sister Boer republic whose coast could loosen the interior's dependence on British ports and British markets. But no settlement can be planted there without first reckoning with Dingane. Piet Retief now offers to ride to the Zulu king himself and ask leave to found a Boer community in southern Natal."
sb_boer_zulu.010.f:0 "\"If Natal is to be ours, it must first be asked for or fought for.\""
sb_boer_zulu.010.a:0 "Send Retief to Dingane."
sb_boer_zulu.010.b:0 "Natal is too dangerous a venture."
sb_boer_zulu_010_a_warning_tt:0 "#bold #n Sending Retief may still lead to war with the Zulu Chiefdom.#!#!"

 sb_boer_zulu.020.t:0 "Retief at uMgungundlovu"
 sb_boer_zulu.020.d:0 "Retief has done as he claimed he would and recovered the cattle taken on the frontier, yet the Boer deputation still stands before Dingane asking leave to settle south of the Tugela. Some councillors see an opportunity to turn these settlers into a buffer against the British at Port Natal. Others warn that men who arrive with wagons and rifles do not ask for land as guests, but as future masters."
 sb_boer_zulu.020.f:0 "\"A king may grant pasture, but he must judge what follows the herds.\""
 sb_boer_zulu.020.a:0 "Honor the bargain and grant them the southern strip."
 sb_boer_zulu.020.b:0 "Kill Retief and seize the whole frontier."

 sb_boer_zulu.021.t:0 "Murmurs at the Royal Kraal"
 sb_boer_zulu.021.d:0 "Dingane's concession has bought time on the frontier, but not silence at court. Men who already favored harder measures now whisper that the king has traded away prestige for peace, and that the southern frontier may yet become a wound the dynasty cannot easily close."
 sb_boer_zulu.021.f:0 "\"A bargain may quiet the frontier, but it does not quiet the court.\""
 sb_boer_zulu.021.a:0 "The throne must weather the whispers."

 sb_boer_zulu.030.t:0 "Natalia Proclaimed"
sb_boer_zulu.030.d:0 "Dingane has recognized Boer settlement south of the Tugela. A precarious bargain now becomes a republic of its own: Natalia, thinly peopled, ambitious, and exposed. Yet for Oranje this new Boer republic is more than a frontier experiment. It promises transit to the sea and a first step away from total dependence on British ports and British markets."
sb_boer_zulu.030.f:0 "\"The road to the ocean is open, but it will not remain unchallenged.\""
sb_boer_zulu.030.a:0 "Excellent. Let Natalia be founded."
sb_boer_zulu.030.b:0 "Found Natalia and lead it."

 sb_boer_zulu.050.t:0 "Retief is Killed"
 sb_boer_zulu.050.d:0 "Dingane has answered the Retief expedition with murder and annexation. The Qwabe lands south of the Tugela are already being absorbed into the Zulu frontier, and the whole Natal venture now stands or falls on whether Oranje is willing to turn grief into revenge. To retreat is humiliating. To fight means calling on Pretorius and staking Boer hopes on the field."
 sb_boer_zulu.050.f:0 "\"Retief is dead. If Natal is to be won now, it must be won in vengeance.\""
 sb_boer_zulu.050.a:0 "We must back down."
 sb_boer_zulu.050.b:0 "We will avenge Retief. Send for Pretorius!"

 sb_boer_zulu.056.t:0 "Retief is Dead"
 sb_boer_zulu.056.d:0 "Messengers from Oranje report that Retief has been killed and Dingane now means to hold Natal by force. If Transvaal rides to help, the Boer republics will face the Zulu together and Pretorius may help carve a new republic on the coast. If not, Oranje must fend for itself and remember the refusal."
 sb_boer_zulu.056.f:0 "\"If Natal is to be won, it will be won by the commandos together.\""
 sb_boer_zulu.056.a:0 "Ride south and stand with Oranje."
 sb_boer_zulu.056.b:0 "They must fend for themselves."

 sb_boer_zulu.070.t:0 "Victory at Blood River"
sb_boer_zulu.070.d:0 "The Zulu have been beaten back and the road to Natal has been forced open. What Dingane would not concede in council has now been decided by laager, musket, and the bitter memory of Blood River. A new Boer republic may now be founded on the coast, and with it a route that weakens Oranje's dependence on British ports and British markets."
sb_boer_zulu.070.f:0 "\"Blood River has opened Natal, but not ended the struggle for it.\""
sb_boer_zulu.070.a:0 "Excellent. Let Natalia be founded."
sb_boer_zulu.070.b:0 "Establish Natalia and lead it."

 sb_boer_zulu.071.t:0 "Victory at Blood River"
 sb_boer_zulu.071.d:0 "Pretorius and the Transvaal commandos answered Oranje's call, and the victory at Blood River has now opened the coast to a new Boer republic. Natalia is being founded whether or not Transvaal leads it directly."
 sb_boer_zulu.071.f:0 "\"The road to Natal was won in common, and a republic now stands upon it.\""
 sb_boer_zulu.071.a:0 "Excellent."
 sb_boer_zulu.071.b:0 "Then let us lead Natalia."

sb_boer_zulu.080.t:0 "Dingane Holds Natal"
sb_boer_zulu.080.d:0 "The Boers have been crushed, despite their strange weapons which we have picked a few items of up. Natal remains now fully under Zulu hands. Dingane's authority has survived its hardest trial since the first wagons crossed toward the coast. With the lands south of the Tugela river now firmly under control of the royal court, some ponder whether to press ahead and seize the small european trading port of Port Natal."
sb_boer_zulu.080.f:0 "\"Let them carry their story inland: Natal is Zulu land!\""
sb_boer_zulu.080.a:0 "We must weigh our next move carefully."
sb_boer_zulu_080_b_warning_tt:0 "#bold #n Seizing Port Natal may bring Great Britain into the war.#!#!"
zulu_raid_port_natal:0 "Raid on Port Natal"
zulu_raid_port_natal_desc:0 "With the Boer threat broken for now, the Zulu king may try to seize Port Natal itself, capture its stores of guns, and force the British to answer on the coast."
zulu_raid_port_natal_firearms_tt:0 "Seizing British arms from Port Natal will add #v +10%#! progress to the [concept_journal_entry] #bold Adoption of Firearms#!."
natalia_raid_port_natal:0 "Raid on Port Natal"
natalia_raid_port_natal_desc:0 "Seize the British foothold at Port Natal before London can dictate the coast from shore. This will almost certainly provoke a British answer, but it gives the republic a chance to force the question on its own terms."

sb_boer_zulu.085.t:0 "The Raid on Port Natal"
sb_boer_zulu.085.d:0 "Weeks after the seizure of Port Natal, reports have at last reached Britain that Dingane's victory over the Boers has spilled onto the coast itself. What began as a frontier struggle in Natal now threatens to become a direct test of British authority on the southeastern seaboard. If Britain answers now, it will be with annexation rather than a mere protectorate demand."
sb_boer_zulu.085.f:0 "\"The coast cannot be left to those who strike first and negotiate later.\""
sb_boer_zulu.085.a:0 "Then Britain must answer."
sb_boer_zulu.085.b:0 "We have larger concerns than Port Natal."

 sb_boer_zulu.090.t:0 "The Dynasty Totters"
 sb_boer_zulu.090.d:0 "Prestige has bled away from the throne. The regiments grumble, senior houses whisper, and the ruler's failures are now being weighed against the ambitions of his rivals. What could once be contained by force must now be answered in the oldest Zulu fashion: by replacing a faltering ruler with another claimant of the royal house."
 sb_boer_zulu.090.f:0 "\"When the king's name no longer steadies the regiments, another name is soon spoken.\""
 sb_boer_zulu.090.a:0 "The court turns to another prince."

sb_boer_zulu.091.t:0 "The Natal Colony Is Proclaimed"
sb_boer_zulu.091.d:0 "Britain has answered Dingane's raid with annexation. The seized coast and the conquered Zulu-held littoral are now being reorganized into the Natal Colony, binding the southeastern seaboard more tightly to imperial rule."
sb_boer_zulu.091.f:0 "\"The coast will be held for the Crown, and the Crown will give it a name of its own.\""
sb_boer_zulu.091.a:0 "Natal will be held for the Crown."

