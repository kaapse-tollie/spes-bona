 # ECSL Movement
 movement_sb_eastern_cape_separatist:0 "Eastern Cape Separatist League"
 movement_sb_eastern_cape_separatist_short:0 "ECSL"
 movement_sb_eastern_cape_separatist_name:0 "Eastern Cape Separatist League"
 movement_sb_eastern_cape_separatist_desc:0 "Eastern settlers demand separation from Cape Town, claiming that liberal ministries sacrifice frontier security to metropolitan scruple."
ideology_sb_settler_separatist:0 "Settler Colonist"
ideology_sb_settler_separatist_desc:0 "The eastern frontier should govern itself, free of Cape Town's liberal politics. Its supporters favor harder rule, wider settlement, and a sharper racial order."
 sb_no_colonial_affairs:0 "No Colonial Affairs"
 sb_enacting_no_colonial_affairs:0 "Enacting No Colonial Affairs"
ideology_sb_cape_liberal:0 "Cape Liberalism"
ideology_sb_cape_liberal_desc:0 "Cape liberals defend the Qualified Franchise and oppose a harsher racial order, even within a property- and literacy-based system."
ideology_sb_settler_colonialist:0 "Settler Colonist"
ideology_sb_settler_colonialist_desc:0 "Frontier security, land hunger, and local supremacy require continued expansion. Its supporters reject any settlement that leaves the frontier checked."
ideology_sb_boer_commandant_landowner:0 "Commandant Republicanism"
ideology_sb_boer_commandant_landowner_desc:0 "Political authority and militia service are inseparable. Its supporters favor a landholders' republic defended by mounted citizen-commandos."
amendment_sb_commando_corps:0 "Commando System"
amendment_sb_commando_corps_desc:0 "The burgher militia is organized around mounted commandos drawn from the farming districts, with rifle service treated as a duty of citizenship."
law_sb_commandant_general_republic:0 "Commandant-General Republic"
law_sb_commandant_general_republic_desc:0 "In the young Boer republics, civil authority and field command remain fused in a republican Commandant-General rather than divided under a settled civilian presidency."
law_sb_non_racialism:0 "Cape Non-Racialism"
law_sb_non_racialism_desc:0 "The Cape franchise tradition is recast into a clearer principle: civil status and political belonging do not formally rest on race, even if wealth and literacy still decide who may exercise them."
gov_boer_commandant_general_republic:0 "Commandant-General Republic"
gov_boer_commandant_general_republic_desc:0 "Civil authority and field command are vested in a single elected Commandant-General, binding the executive, the commando tradition, and the volksraad into one hard republican order."
