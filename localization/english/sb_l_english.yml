pretorius_commando:0 "Pretorius Commando"

 sb_boer_zulu.092.t:0 "Dingane Defies the British"
 sb_boer_zulu.092.d:0 "Against all expectation, Dingane has survived the British answer to the seizure of Port Natal. A victory that began against the Boers has now been crowned by defiance of a great power. The court will remember the cost, but it cannot deny the aura that now surrounds the king."
 sb_boer_zulu.092.f:0 "\"He has faced wagon and redcoat alike and yet remains king.\""
 sb_boer_zulu.092.a:0 "The king's name carries farther than ever."
 sb_boer_zulu.093.t:0 "The Dynasty Secured"
 sb_boer_zulu.093.d:0 "The throne is no longer merely surviving events. Through victory, caution, and the management of rivals, the royal house has convinced the chiefdom that the line will endure. A clear heir can now be set forward, and the court begins to treat the dynasty not as an emergency arrangement after Shaka, but as the settled order of the chiefdom."
 sb_boer_zulu.093.f:0 "\"A throne is strongest when men begin to think of tomorrow as surely as today.\""
 sb_boer_zulu.093.a:0 "The royal house is secured."

 sb_boer_zulu.100.t:0 "The Natal Question"
 sb_boer_zulu.100.d:0 "Natalia has crossed the threshold from improvised trekker settlement to functioning coastal republic. With a port now active on the southeastern seaboard, the colonial office argues that the question can no longer be postponed: a Boer-controlled coast weakens the Cape, threatens British influence in southern Africa, and cannot be left to ripen into a permanent independent power."
 sb_boer_zulu.100.f:0 "\"No uncertain sovereignty can be tolerated on this coast.\""
 sb_boer_zulu.100.a:0 "Send the ultimatum."
 sb_boer_zulu.100.b:0 "Let Natalia stand — for now."

 sb_boer_zulu.110.t:0 "An Ultimatum from Britain"
 sb_boer_zulu.110.d:0 "Britain now demands that Natalia submit to the Crown. London is not content to let a Boer republic escape imperial economic control on the southeastern coast. Submission would preserve the settlement but turn it into a British colony. Refusal means a quick strike for Port Natal and an appeal to the inland republics before Britain can close the coast."
 sb_boer_zulu.110.f:0 "\"The sea offers no shelter if it belongs to Britain.\""
 sb_boer_zulu.110.a:0 "Submit and preserve what we can."
 sb_boer_zulu.110.b:0 "Refuse — seize Port Natal and stand."

 sb_boer_zulu.111.t:0 "Natal Appeals to Oranje"
 sb_boer_zulu.111.d:0 "Britain has demanded submission from Natalia, and the republic has answered by seizing Port Natal before the Crown can dictate the coast from a foothold on shore. Oranje is now asked to renew the common Boer cause. If Oranje refuses, Natalia will face Britain alone and remember who left it so."
 sb_boer_zulu.111.f:0 "\"If Natal stands alone, the coast is lost. If we stand together, Britain must reckon with all of us.\""
 sb_boer_zulu.111.a:0 "Oranje will stand with Natalia."
 sb_boer_zulu.111.b:0 "We cannot risk war with Britain."

 sb_boer_zulu.112.t:0 "Shall Transvaal Support Natalia?"
 sb_boer_zulu.112.d:0 "Britain has demanded that Natalia submit, and the coast has answered with defiance. If Transvaal supports Natalia now, the Boer republics will stand together against imperial control of the sea-road. If not, Britain will learn that the coast can be picked off from the interior one republic at a time."
 sb_boer_zulu.112.f:0 "\"If the coast falls today, the interior may answer for it tomorrow.\""
 sb_boer_zulu.112.a:0 "We will support Natalia."
 sb_boer_zulu.112.b:0 "Natal must face its own fate."
 sb_boer_zulu.113.t:0 "Shall Zoutpansberg Support Natalia?"
 sb_boer_zulu.113.d:0 "Britain now moves openly against Natalia. If Zoutpansberg joins the struggle, the crisis becomes a wider Boer stand against imperial pressure on the coast. If it stays aloof, Natalia may fall alone and London will learn that the inland republics can be dealt with one by one."
 sb_boer_zulu.113.f:0 "\"Natalia asks whether the northern trekkers still remember the common cause.\""
 sb_boer_zulu.113.a:0 "Zoutpansberg will stand with Natalia."
 sb_boer_zulu.113.b:0 "We cannot risk war with Britain."

 sb_boer_zulu.114.t:0 "Natalia Defies the Crown"
 sb_boer_zulu.114.d:0 "Natalia has rejected the British ultimatum. What might have been resolved by submission must now be settled by force, and the road to the southeast becomes a matter of war rather than argument."
 sb_boer_zulu.114.f:0 "\"Then we shall instruct them by arms.\""
 sb_boer_zulu.114.a:0 "Compel submission."

 sb_boer_zulu.115.t:0 "The Republic Is Lost"
 sb_boer_zulu.115.d:0 "Whether by submission or by defeat, Natalia can no longer stand apart from Britain. The republic is being folded into imperial rule, and many Boer families now prepare to abandon the coast rather than live beneath the Crown."
 sb_boer_zulu.115.f:0 "\"If Natal cannot remain free, then the wagons must turn inland again.\""
 sb_boer_zulu.115.a:0 "We have no choice but to yield."

 sb_boer_zulu.116.t:0 "Refugees from Natal"
 sb_boer_zulu.116.d:0 "Natalia has fallen under British rule, and Boer families unwilling to remain on the coast now turn inland once more. Oranje receives them not as pioneers setting out in hope, but as refugees carrying stock, wagons, and resentment from a lost republic."
 sb_boer_zulu.116.f:0 "\"The sea-road is shut to us. Then we must make room inland.\""
 sb_boer_zulu.116.a:0 "Take them in."

 sb_boer_zulu.117.t:0 "Refugees from Natal"
 sb_boer_zulu.117.d:0 "Natalia has fallen under British rule, and the surviving Boer families now look north toward Transvaal. Their arrival will bring manpower, wagons, and a renewed bitterness toward the Crown in equal measure."
 sb_boer_zulu.117.f:0 "\"If the coast is barred, the highveld must receive them.\""
 sb_boer_zulu.117.a:0 "Take them in."
 sb_boer_zulu.118.t:0 "Shall Lydenburg Support Natalia?"
 sb_boer_zulu.118.d:0 "Britain's move against Natalia now tests every inland republic. If Lydenburg answers the call, the British crisis becomes a shared Boer war. If not, Natalia may be crushed alone and the empire will learn how easily the frontier can be divided."
 sb_boer_zulu.118.f:0 "\"If Natalia falls without aid, none of us should expect gentler terms later.\""
 sb_boer_zulu.118.a:0 "Lydenburg will support Natalia."
 sb_boer_zulu.118.b:0 "We must stand aside."

# Trek follow-through
 sb_trek.004.t:0 "Mzilikazi's Wrath"
 sb_trek.004.d:0 "Mzilikazi has answered the trek with open war. The Ndebele rising now threatens to break Transvaal before the northern camps have properly settled into a republic. If the Highveld is to be held, help must be summoned from Oranje at once."
 sb_trek.004.f:0 "\"Then send for Potgieter, before the wagons are overrun in detail.\""
 sb_trek.004.a:0 "Send for Potgieter!"

 sb_trek.005.t:0 "Potgieter called to arms"
 sb_trek.005.d:0 "Word from the Transvaal confirms what every trekker feared: Mzilikazi means to break the northern republic before it can entrench itself. Potgieter can no longer treat this as another district quarrel. If Oranje rides, the Highveld struggle becomes a common Boer war, and each republic will remember the debt."
 sb_trek.005.f:0 "\"If Transvaal falls alone, none of us will hold the veld for long.\""
 sb_trek.005.a:0 "Mzilikazi must be stopped!"
 sb_trek.005.b:0 "They must fend for themselves."

 sb_trek.002.t:0 "In Mzilikazi's Wake"
 sb_trek.002.d:0 "In the aftermath of the Battle of Vegkop, the [SCOPE.sCountry('ndebele').GetAdjective] realm is migrating north after grave losses against armed Trekboer parties and sustained pressure from [SCOPE.sCountry('zulu').GetName]. [SCOPE.sStateRegion('transvaal_region').GetName] now lies open to new claimants."
 sb_trek.002.f:0 "News from the High Veld arrived in fragments: some swore that the Battle of Vegkop shattered [SCOPE.sCharacter('mzilikazi').GetFirstNameNoFormatting]'s power in a single terrible day, while others insisted that [SCOPE.sCountry('zulu').GetAdjectiveNoFormatting] raids had already worn the [SCOPE.sCountry('ndebele').GetNameNoFormatting] thin before the laagers made their stand. Whatever the precise balance of blows, the outcome is plain enough. [SCOPE.sCharacter('mzilikazi').GetFirstNameNoFormatting] is leading the [SCOPE.sCountry('ndebele').GetAdjectiveNoFormatting] people north, leaving [SCOPE.sStateRegion('transvaal_region').GetNameNoFormatting] to whoever can seize and hold it."
 sb_trek.002.a:0 "Drive into the frontier while the veld lies open."
 sb_trek.002.b:0 "Leave it be! The strain of governing that land is too much for us."
 sb_trek.002.c:0 "Encourage settlement of [SCOPE.sStateRegion('transvaal_region').GetName], but do not claim these lands all at once."
 sb_trek.006.t:0 "The Founding of Potchefstroom"
 sb_trek.006.d:0 "A Boer foothold now stands beyond the Vaal. What began as Oranje's advance into the western Transvaal can now harden into a separate inland republic centered on Potchefstroom, with its own commandant, council, and defensive bond to the parent trekker state."
 sb_trek.006.f:0 "\"A laager has become a town, and a town can become a republic.\""
 sb_trek.006.a:0 "Play as the new Transvaal republic."
 sb_trek.006.b:0 "Great!"
 sb_trek.007.t:0 "Another Boer Republic"
 sb_trek.007.d:0 "A second inland Boer republic has taken shape beyond the Vaal. Some in the Colonial Office argue that it is wiser to bind this new Transvaal state to imperial ports through formal transit rights than to drive it at once into open hostility."
 sb_trek.007.f:0 "\"If their trade still runs through British ports, their freedom need not mean independence from us in all things.\""
 sb_trek.007.a:0 "Grant transit through imperial territory."
 sb_trek.007.b:0 "Ignore this inland experiment."


 sb_trek.120.t:0 "The Zoutpansbergers"
 sb_trek.110.t:0 "Discontent on the Frontier"
 sb_trek.110.d:0 "The Cape's recent political direction has deepened the estrangement of many frontier Boers. Men such as Stephanus Schoeman speak openly of leaving the colony's orbit altogether and seeking a sterner fortune beyond the settled highveld. Another trek northward now seems likely."
 sb_trek.110.f:0 "\"If Cape Town will not be ours, then we shall find a country that is.\""
 sb_trek.110.a:0 "Good riddance."
 sb_trek.110.b:0 "Perhaps we have pushed too far."
 sb_trek.120.d:0 "The far northern trekkers no longer think of themselves as mere outposts of Potchefstroom. Cape politics have convinced many Boer families that the northern interior offers a freer future than any ministry shaped in Cape Town or dictated from afar. A Zoutpansberg republic is now taking shape whether Transvaal wishes it or not."
 sb_trek.120.f:0 "\"Beyond the mountains, every commandant dreams of a state of his own.\""
 sb_trek.120.a:0 "Another northern republic is born."
 sb_trek.120.b:0 "Let us lead the northern republic ourselves."
 sb_trek.121.t:0 "A New Boer Republic Forms"
 sb_trek.121.d:0 "The northern trek has hardened into a separate Zoutpansberg republic. Its commandants control only a narrow foothold for now, but they claim the wider Limpopo frontier and mean to build a republic around it."
 sb_trek.121.f:0 "\"Another volksraad, another frontier, another claim to freedom beyond the old line.\""
 sb_trek.121.a:0 "Our own republic remains our charge."
 sb_trek.121.b:0 "Take up the Zoutpansberg cause."
 sb_trek.130.t:0 "A Republic Established"
 sb_trek.130.d:0 "The trek has succeeded. Our republic now stands as more than a chain of wagon camps and commandos, and the question before the volksraad is no longer whether we shall survive, but what kind of state we mean to become. Shall we settle into a more regular republican order, or preserve the rough frontier institutions that carried us here?"
 sb_trek.130.f:0 "\"We have won a country. We must now decide what sort of country it is to be.\""
 sb_trek.130.a:0 "Settle into a more traditional republic."
 sb_trek.130.b:0 "Keep the frontier laws."
 sb_trek.131.t:0 "Discord in the Volksraad"
 sb_trek.131.d:0 "The eastern burghers have taken alarm at the direction of the republic. Backed by Cornelis Potgieter and men of Lydenburg, they warn that the volksraad is abandoning the frontier compact for the sort of centralized order they once fled in the Cape. Their answer is no mere protest: they intend to make their own republic in the eastern highveld."
sb_trek.131.f:0 "\"If the republic will not remain a burghers' commonwealth, then we shall build one ourselves in the east.\""
sb_trek.131.a:0 "Their fears are unwarranted."
sb_trek.131.b:0 "Our destiny lies in the eastern highveld."
sb_trek_131_play_as_lyd_tt:0 "Play as Lydenburg."
 sb_cape_zoutpansberg_departure_liberal:0 "Frontier Liberals Unburdened"
 sb_cape_zoutpansberg_departure_liberal_desc:0 "A section of the discontented Boer frontier has taken its grievances inland, leaving Cape liberals freer to press their programme."
 sb_cape_zoutpansberg_departure_settler:0 "Frontier Unease Appeased"
 sb_cape_zoutpansberg_departure_settler_desc:0 "The ministry has tried to soften frontier unease, clawing back some of the settler reaction to the colony's recent direction."
 sb_trek_centralizing_republic:0 "Centralizing Republic"
 sb_trek_centralizing_republic_desc:0 "The republic is moving away from its wagon-laager origins toward a more regular presidential state, to the displeasure of the smaller frontier burghers."
 sb_trek_frontier_republic:0 "Frontier Commonwealth"
 sb_trek_frontier_republic_desc:0 "The republic has chosen to preserve its older frontier institutions, strengthening the small burgher interest against centralizing reform."

 sb_grant_responsible_government:0 "Grant Responsible Government"
 sb_grant_responsible_government_action_name:0 "$sb_grant_responsible_government$"
 sb_grant_responsible_government_desc:0 "Grant this colony a responsible ministry and a more autonomous constitutional order while keeping it inside the imperial subject relationship."
