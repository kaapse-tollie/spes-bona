 # Great Trek JE
 je_sb_great_trek:0 "The Great Trek"
 je_sb_great_trek_reason:0 "The trek has carried the Boers beyond British rule, but not beyond danger. A republic of wagons and commandos must yet become a republic of farms, magistrates, and settled frontiers."
je_sb_great_trek_lobby:0 "The Boer trek beyond the colonial frontier is still only a chain of wagon camps, commandos, and uneasy councils. The Voortrekkers must survive Mzilikazi in the interior, carve out durable republics on the highveld, and decide whether their future lies inland or on the Natal coast."
 je_sb_great_trek_desc:0 "The wagons have crossed the colonial boundary, yet the #bold Great Trek#! is not complete. A trek republic must first make itself viable in substance, then secure the homeland it claims. Only then can exile harden into statehood.\n\n#b Consolidation:#! Build a working economy, hold the full Vrystaat or the western Transvaal core, and turn migration into lasting settlement.\n#b Natal Ambition:#! Oranje may yet open the Natal Question by expedition and negotiation, but the coast invites both Zulu war and British interference."
 je_sb_transvaal_unity:0 "Transvaal Unity"
 je_sb_transvaal_unity_reason:0 "Lydenburg broke away in fear that Transvaal was abandoning the frontier compact. If the republic can prove itself stable, prosperous, and faithful to the burgher order, the eastern highveld may yet be drawn back into union."
 je_sb_transvaal_unity_status:0 "Lydenburg will not return merely because we demand it. We must show that Transvaal is stronger than the splinter republic, yet still true to the conservative frontier order its burghers claim to defend."
 je_sb_transvaal_unity_progress_tt:0 "Maintain a stable conservative republic, keep Lydenburg amicable, and outgrow it economically for 5 cumulative years"
 je_sb_zulu_kingdom:0 "Dynastic Stability"
 je_sb_zulu_kingdom_reason:0 "The Zulu chiefdom still inspires fear, but its royal order is young and brittle. Dingane must survive frontier war, British pressure on the coast, and the politics of succession if the house of Senzangakhona is to remain secure."
je_sb_zulu_kingdom_lobby:0 "Post-Shaka Zululand is powerful but unsettled. Dingane's court stands between Boer encroachment, British interest at Port Natal, and rival claimants within the royal house. Victory, prestige, and the handling of frontier bargains will decide whether the dynasty steadies itself or breaks."
 je_sb_zulu_kingdom_desc:0 "The Zulu chiefdom's greatest danger is no longer simple conquest, but whether the royal house can remain politically secure through the Natal crisis and the first age of gunpowder war. #bold Dynastic Stability#! rises when the ruler appears strong, capable, and victorious; it falls when he appears weak, discredited, or unfit to rule.\n\n#b At 0:#! The ruler is overthrown and the chiefdom enters dynastic crisis.\n#b At 100:#! The dynasty is secured, a stable heir is established, and the court accepts the royal house as durable."
 je_sb_zulu_kingdom_status:0 "The royal house remains exposed. Prestige, personal rule, and events on the Natal frontier will decide whether the dynasty holds."
 je_sb_zulu_kingdom_status_secure:0 "The royal house looks increasingly secure. The court is willing to believe the dynasty can endure the frontier storms ahead."
 je_sb_zulu_kingdom_status_steady:0 "The chiefdom is holding together, but the throne is secure only so long as the ruler continues to project strength."
 je_sb_zulu_kingdom_status_precarious:0 "Confidence in the ruler is slipping. Defeat, humiliation, or disorder could turn murmurs at court into open succession politics."
 je_sb_zulu_kingdom_status_crisis:0 "The dynasty stands on the edge of collapse. Another shock may unmake the ruler altogether."
 je_sb_zulu_kingdom_complete_dynasty:0 "Dynastic Stability has reached 100"

