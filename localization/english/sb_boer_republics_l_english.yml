l_english:
 sb_boer_republics.007.t:0 "A Republic Beyond the Vaal"
 sb_boer_republics.007.d:0 "A second inland Boer republic has taken shape beyond the Vaal. Some in the Colonial Office argue that it is wiser to bind this new Transvaal state to imperial ports through transit rights than to drive it at once into hostility."
 sb_boer_republics.007.f:0 "If their commerce still runs through British ports, some officials argue, then their freedom need not amount to independence in all things."
 sb_boer_republics.007.a:0 "Grant transit rights."
 sb_boer_republics.007.b:0 "Ignore them."
 sb_boer_republics.008.t:0 "A Republic in the Far North"
 sb_boer_republics.008.d:0 "A Zoutpansberg republic has appeared in the far northern Transvaal. Its leaders speak the language of frontier liberty, but their wagons and goods still need roads to the coast. The Colonial Office may yet bind the new republic to imperial trade before its politics harden entirely against Britain."
 sb_boer_republics.008.f:0 "Another volksraad had appeared beyond another river, and still the inland republics found that all their roads to the sea passed through someone else's hands."
 sb_boer_republics.008.a:0 "Offer trade."
 sb_boer_republics.008.b:0 "Leave them be."
 sb_boer_republics.009.t:0 "Another Splinter Republic"
 sb_boer_republics.009.d:0 "Lydenburg has broken from Transvaal's orbit, adding another Boer frontier state to an already fragmented interior. If Britain cannot prevent these republics from forming, it may at least try to keep their commerce dependent on imperial ports."
 sb_boer_republics.009.f:0 "The frontier seemed to breed republics faster than the office could draft memoranda upon them."
 sb_boer_republics.009.a:0 "Offer trade."
 sb_boer_republics.009.b:0 "Ignore the splinter."
 sb_boer_republics.120.t:0 "The Northern Breakaway"
 sb_boer_republics.110.t:0 "Frontier Discontent"
 sb_boer_republics.110.d:0 "The Cape's recent political direction has deepened the estrangement of many frontier Boers. Men such as Stephanus Schoeman now speak openly of leaving the colony's orbit altogether and seeking a sterner fortune beyond the settled highveld. Another trek northward now seems likely."
 sb_boer_republics.110.f:0 "If Cape Town could not be made into their country, then many frontier men had already decided they would find or build another."
 sb_boer_republics.110.a:0 "Let them go."
 sb_boer_republics.110.b:0 "Perhaps we have pressed too far."
 sb_boer_republics.120.d:0 "The far northern trekkers no longer think of themselves as mere outposts of Potchefstroom. Cape politics have convinced many Boer families that the northern interior offers a freer future than any ministry shaped in Cape Town or dictated from afar. A Zoutpansberg republic is taking shape whether Transvaal wills it or not."
 sb_boer_republics.120.f:0 "Beyond the mountains, men said, every commandant began to dream of a state of his own."
 sb_boer_republics.120.a:0 "Then let it be born."
 sb_boer_republics.120.b:0 "We will lead it."
 sb_boer_republics.121.t:0 "Zoutpansberg Declares Itself"
 sb_boer_republics.121.d:0 "The northern trek has hardened into a separate Zoutpansberg republic. Its commandants hold only a narrow foothold for now, but they claim the wider Limpopo frontier and mean to build a republic around it."
 sb_boer_republics.121.f:0 "Another volksraad, another frontier, another claim to freedom beyond the old line. So the inland republics multiplied."
 sb_boer_republics.121.a:0 "We have our own charge."
 sb_boer_republics.121.b:0 "Take up their cause."
 sb_boer_republics.130.t:0 "What Sort of Republic?"
 sb_boer_republics.130.d:0 "The trek has succeeded. Our republic is now more than a chain of wagon camps and commandos, and the question before the volksraad is no longer whether we shall survive, but what sort of state we mean to become. Shall we settle into a more regular order, or preserve the rough frontier institutions that carried us here?"
 sb_boer_republics.130.f:0 "A country had been won. The harder task now was to decide what manner of country it ought to be."
 sb_boer_republics.130.a:0 "Settle the republic."
 sb_boer_republics.130.b:0 "Keep the frontier order."
 sb_boer_republics.131.t:0 "A Break in the Volksraad"
 sb_boer_republics.131.d:0 "The eastern burghers have taken alarm at the direction of the republic. Backed by Cornelis Potgieter and the men of Lydenburg, they warn that the volksraad is abandoning the frontier compact for the sort of centralized order they once fled in the Cape. Their answer is no mere protest: they mean to found their own republic in the eastern highveld."
 sb_boer_republics.131.f:0 "If the republic would not remain a burghers' commonwealth, then the eastern men would build one for themselves."
 sb_boer_republics.131.a:0 "Their fears are misplaced."
 sb_boer_republics.131.b:0 "Then to the east."
 sb_boer_republics_131_play_as_lyd_tt:0 "Play as #v Lydenburg#!."
