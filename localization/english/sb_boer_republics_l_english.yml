l_english:
 sb_boer_republics.007.t:0 "Another Boer Republic"
 sb_boer_republics.007.d:0 "A second inland Boer republic has taken shape beyond the Vaal. Some in the Colonial Office argue that it is wiser to bind this new Transvaal state to imperial ports through formal transit rights than to drive it at once into open hostility."
	 sb_boer_republics.007.f:0 "\"If their trade still runs through British ports, their freedom need not mean independence from us in all things.\""
	 sb_boer_republics.007.a:0 "Grant transit through imperial territory."
	 sb_boer_republics.007.b:0 "Ignore this inland experiment."
	 sb_boer_republics.008.t:0 "Yet Another Boer Republic?"
	 sb_boer_republics.008.d:0 "A Zoutpansberg republic has appeared in the far northern Transvaal. Its leaders speak the language of frontier liberty, but its wagons and goods still need roads to the coast. The Colonial Office can try to bind the new republic to imperial trade before its politics harden entirely against Britain."
	 sb_boer_republics.008.f:0 "\"Another volksraad beyond another river, and still they ask whose road leads to the sea.\""
	 sb_boer_republics.008.a:0 "Offer trade through imperial territory."
	 sb_boer_republics.008.b:0 "Leave the far north alone."
	 sb_boer_republics.009.t:0 "So Many Boer Republics..."
	 sb_boer_republics.009.d:0 "Lydenburg has now broken from Transvaal's orbit, adding another Boer frontier state to an already fragmented interior. If Britain cannot prevent these republics from forming, it can at least try to keep their commerce dependent on imperial ports."
	 sb_boer_republics.009.f:0 "\"The frontier breeds republics faster than the office can draft memoranda.\""
	 sb_boer_republics.009.a:0 "Offer trade through imperial territory."
	 sb_boer_republics.009.b:0 "Do not dignify every splinter."
	 sb_boer_republics.120.t:0 "The Zoutpansbergers"
 sb_boer_republics.110.t:0 "Discontent on the Frontier"
 sb_boer_republics.110.d:0 "The Cape's recent political direction has deepened the estrangement of many frontier Boers. Men such as Stephanus Schoeman speak openly of leaving the colony's orbit altogether and seeking a sterner fortune beyond the settled highveld. Another trek northward now seems likely."
 sb_boer_republics.110.f:0 "\"If Cape Town will not be ours, then we shall find a country that is.\""
 sb_boer_republics.110.a:0 "Good riddance."
 sb_boer_republics.110.b:0 "Perhaps we have pushed too far."
 sb_boer_republics.120.d:0 "The far northern trekkers no longer think of themselves as mere outposts of Potchefstroom. Cape politics have convinced many Boer families that the northern interior offers a freer future than any ministry shaped in Cape Town or dictated from afar. A Zoutpansberg republic is now taking shape whether Transvaal wishes it or not."
 sb_boer_republics.120.f:0 "\"Beyond the mountains, every commandant dreams of a state of his own.\""
 sb_boer_republics.120.a:0 "Another northern republic is born."
 sb_boer_republics.120.b:0 "Let us lead the northern republic ourselves."
 sb_boer_republics.121.t:0 "A New Boer Republic Forms"
 sb_boer_republics.121.d:0 "The northern trek has hardened into a separate Zoutpansberg republic. Its commandants control only a narrow foothold for now, but they claim the wider Limpopo frontier and mean to build a republic around it."
 sb_boer_republics.121.f:0 "\"Another volksraad, another frontier, another claim to freedom beyond the old line.\""
 sb_boer_republics.121.a:0 "Our own republic remains our charge."
 sb_boer_republics.121.b:0 "Take up the Zoutpansberg cause."
 sb_boer_republics.130.t:0 "A Republic Established"
 sb_boer_republics.130.d:0 "The trek has succeeded. Our republic now stands as more than a chain of wagon camps and commandos, and the question before the volksraad is no longer whether we shall survive, but what kind of state we mean to become. Shall we settle into a more regular republican order, or preserve the rough frontier institutions that carried us here?"
 sb_boer_republics.130.f:0 "\"We have won a country. We must now decide what sort of country it is to be.\""
 sb_boer_republics.130.a:0 "Settle into a more traditional republic."
 sb_boer_republics.130.b:0 "Keep the frontier laws."
 sb_boer_republics.131.t:0 "Discord in the Volksraad"
 sb_boer_republics.131.d:0 "The eastern burghers have taken alarm at the direction of the republic. Backed by Cornelis Potgieter and men of Lydenburg, they warn that the volksraad is abandoning the frontier compact for the sort of centralized order they once fled in the Cape. Their answer is no mere protest: they intend to make their own republic in the eastern highveld."
sb_boer_republics.131.f:0 "\"If the republic will not remain a burghers' commonwealth, then we shall build one ourselves in the east.\""
sb_boer_republics.131.a:0 "Their fears are unwarranted."
sb_boer_republics.131.b:0 "Our destiny lies in the eastern highveld."
sb_boer_republics_131_play_as_lyd_tt:0 "Play as Lydenburg."
