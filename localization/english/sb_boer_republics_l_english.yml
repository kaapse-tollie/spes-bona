l_english:
 sb_boer_republics.007.t:0 "A Republic Beyond the Vaal"
 sb_boer_republics.007.d:0 "Another Boer republic has taken shape beyond the Vaal. Some in the Colonial Office argue that it would be wiser to bind this Transvaal state to imperial ports and transit than to drive it at once into open hostility."
 sb_boer_republics.007.f:0 "If their wagons still run through British ports, officials say, their freedom need not extend to all things."
 sb_boer_republics.007.a:0 "Grant transit rights."
 sb_boer_republics.007.b:0 "Ignore them."
 sb_boer_republics.008.t:0 "A Republic in the Far North"
 sb_boer_republics.008.d:0 "A Zoutpansberg republic has appeared in the far northern Transvaal. Its leaders speak of frontier liberty, yet their wagons and goods still need a road to the sea. The Colonial Office may yet bind the new state to imperial trade before its politics harden against Britain."
 sb_boer_republics.008.f:0 "A republic might rise beyond another river, but the road to the sea still belonged to others."
 sb_boer_republics.008.a:0 "Offer trade."
 sb_boer_republics.008.b:0 "Leave them be."
 sb_boer_republics.009.t:0 "Another Splinter Republic"
 sb_boer_republics.009.d:0 "Lydenburg has broken from Transvaal's orbit, adding another Boer frontier state to an already fragmented interior. If Britain cannot prevent these republics from forming, it may at least try to keep their commerce dependent on imperial ports."
 sb_boer_republics.009.f:0 "The frontier seemed to mint republics faster than Whitehall could name them."
 sb_boer_republics.009.a:0 "Offer trade."
 sb_boer_republics.009.b:0 "Ignore the splinter."
 sb_boer_republics.120.t:0 "The Northern Breakaway"
 sb_boer_republics.110.t:0 "Frontier Discontent"
 sb_boer_republics.110.d:0 "Cape politics have estranged many frontier Boers beyond recall. Men such as Stephanus Schoeman now speak openly of seeking a sterner future beyond the settled highveld, and another northward trek appears close at hand."
 sb_boer_republics.110.f:0 "If Cape Town could not be made their country, then another would have to be found."
 sb_boer_republics.110.a:0 "Let them go."
 sb_boer_republics.110.b:0 "Perhaps we have pressed too far."
 sb_boer_republics.120.d:0 "The far northern trekkers no longer think of themselves as outposts of Potchefstroom. To many Boer families, the northern interior now promises a freer future than any ministry in Cape Town or Pretoria, and a Zoutpansberg republic is taking shape regardless of Transvaal's wishes."
 sb_boer_republics.120.f:0 "Beyond the mountains, every commandant began to imagine a republic of his own."
 sb_boer_republics.120.a:0 "Then let it be born."
 sb_boer_republics.120.b:0 "We will lead it."
 sb_boer_republics.121.t:0 "Zoutpansberg Declares Itself"
 sb_boer_republics.121.d:0 "The northern trek has hardened into a separate Zoutpansberg republic. Its commandants hold only a narrow foothold for now, but they claim the wider Limpopo frontier and mean to build a republic around it."
 sb_boer_republics.121.f:0 "So the inland republics multiplied: another volksraad, another frontier, another claim to freedom."
 sb_boer_republics.121.a:0 "We have our own charge."
 sb_boer_republics.121.b:0 "Take up their cause."
 sb_boer_republics.130.t:0 "What Sort of Republic?"
 sb_boer_republics.130.d:0 "The trek has succeeded. The republic is now more than a line of camps and commandos, and the volksraad must decide whether it means to found a settled state or preserve the rougher institutions that carried it here."
 sb_boer_republics.130.f:0 "A country had been won. The harder question was what sort of country it should become."
 sb_boer_republics.130.a:0 "Settle the republic."
 sb_boer_republics.130.b:0 "Keep the frontier order."
 sb_boer_republics.131.t:0 "A Break in the Volksraad"
 sb_boer_republics.131.d:0 "The eastern burghers are alarmed by the republic's course. Backed by Cornelis Potgieter and the men of Lydenburg, they accuse the volksraad of abandoning the old frontier compact for the sort of centralized order they once fled, and now mean to found a republic of their own."
 sb_boer_republics.131.f:0 "If the republic would not remain a burghers' commonwealth, then the eastern men would build one elsewhere."
 sb_boer_republics.131.a:0 "Their fears are misplaced."
 sb_boer_republics.131.b:0 "Then to the east."
 sb_boer_republics_131_play_as_lyd_tt:0 "Switch to #v Lydenburg#!."
