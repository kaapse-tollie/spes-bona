l_english:
 sb_cape.001.t:0 "The Cape in Question"
 sb_cape.001.d:0 "The Sixth Xhosa War is over, but the eastern frontier is not settled. Cape Town speaks of law and franchise; the east demands harder rule and faster expansion. The colony cannot long satisfy both."
 sb_cape.001.f:0 "The guns had fallen silent, but on the frontier no one mistook silence for peace."
 sb_cape.001.a:0 "The question must be settled."
 sb_cape.100.t:0 "Liberal Ascendancy"
 sb_cape.100.d:0 "The liberals have prevailed. With Cultural Exclusion in force, the Cape can widen its political nation without wholly abandoning hierarchy, and the ministry now claims a distinctly Cape constitutional order."
 sb_cape.100.d_albany:0 "The liberals have prevailed, though only after the east tore itself away from Cape Town. With Albany gone, the ministry may now entrench the Qualified Franchise and pursue a more distinctly Cape constitutional order."
 sb_cape.100.d_after_secession:0 "The eastern challenge has been broken, though not before it drove the colony into open rupture. London refused partition, the separatists spent their fury, and the liberals may now consolidate their constitutional order."
 sb_cape.100.f:0 "Cape Town says the colony has chosen law over coercion. The frontier may yet render a different verdict."
 sb_cape.100.f_albany:0 "The east is gone, but the ministry consoles itself that the principle was saved."
 sb_cape.100.f_after_secession:0 "They rose against the law and spent themselves against it. For the moment, Cape Town calls that victory."
 sb_cape.100.a:0 "So stands the Cape."
 sb_cape.101.t:0 "Triumph of the Frontier"
 sb_cape.101.d:0 "The eastern settlers have carried the day. Liberal ministries are broken, frontier colonization enters the law, and the Eastern Cape Separatist League stands down with most of its program won."
 sb_cape.101.f:0 "The eastern districts had long claimed the dangers of the colony while Cape Town took the honors. Now they say the government remembers it."
 sb_cape.101.a:0 "Then let the frontier lead."
 sb_cape.102.t:0 "A Cape Compromise"
 sb_cape.102.d:0 "Neither party has mastered the colony. The ministry closes the question through compromise: the constitutional order survives, colonial policy remains in law, and neither camp can claim a full victory."
 sb_cape.102.f:0 "There would be no triumph here, only a settlement sufficient to govern by."
 sb_cape.102.a:0 "Then let compromise suffice."
 sb_cape.130.t:0 "The Franchise Principle"
 sb_cape.130.d:0 "The ministry debates Cultural Exclusion, but the Cape Liberal Movement insists that the old qualified franchise must be written into the settlement itself. They will accept a compromise of property and literacy, but not one that abandons the principle altogether."
 sb_cape.130.f:0 "The liberals say that a franchise forgotten in law soon becomes a promise forgotten in politics."
 sb_cape.130.a:0 "Accept it."
 sb_cape.130.b:0 "We will not be bound."
 sb_cape.103.t:0 "The Albany Secession"
 sb_cape.103.d:0 "The eastern settlers now judge coexistence with Cape Town impossible. Their committees are armed, their newspapers speak openly of separation, and an ultimatum has been sent to London demanding a colony of their own."
 sb_cape.103.f:0 "What the east now sought was not influence in the colony, but release from it."
 sb_cape.103.a:0 "Then we must await London."
 sb_cape.104.t:0 "An Unsettled Colony"
 sb_cape.104.d:0 "For decades the Cape question has been fought in ministries, newspapers, mission stations, and on the eastern frontier, yet no lasting settlement has taken hold. The colony has found not resolution, but exhaustion."
 sb_cape.104.f:0 "Questions left unanswered do not die in the Cape. They return harder than before."
 sb_cape.104.a:0 "So the bitterness remains."
 sb_cape.020.t:0 "Responsible Government"
 sb_cape.020.d:0 "London has granted the Cape responsible government. The colony remains within the Empire, but domestic power now rests far more firmly in Cape hands."
 sb_cape.020.f:0 "The Queen's name remained on the law, but the ministry would now answer first to the Cape."
 sb_cape.020.a:0 "A new order begins."
 sb_cape.200.t:0 "Albany Before the Crown"
 sb_cape.200.d:0 "After a full settler rising in the east, the separatist committees now demand direct recognition from London as a Colony of Albany. If we accept, we preserve imperial authority at the cost of partition; if we refuse, Cape Town must crush the revolt without imperial help."
 sb_cape.200.f:0 "To some in London the answer seemed plain: if the frontier required another government, then let the Crown provide it. To others, partition was surrender in cleaner dress."
 sb_cape.200.a:0 "Create Albany."
 sb_cape.200.b:0 "Keep the Cape whole."
 sb_cape.201.t:0 "Albany Sanctioned"
 sb_cape.201.d:0 "London has sanctioned Albany, and the eastern districts have been detached from Cape Town under direct imperial authority. What was once a separatist agitation now stands as a colony of its own."
 sb_cape.201.f:0 "A line on the map had become an act of government."
 sb_cape.201.a:0 "Albany is sanctioned."
 sb_cape.201.b:0 "Take command of Albany."
 sb_cape.202.t:0 "Separation Refused"
 sb_cape.202.d:0 "London has refused the eastern ultimatum. The settlers are furious and now claim to have been abandoned by both Cape Town and the imperial government. The constitutional question may be closed, but the frontier crisis is not."
 sb_cape.202.f:0 "If London would not divide the colony for them, the east would have to seek other remedies."
 sb_cape.202.a:0 "Then the crisis deepens."
 sb_cape.203.t:0 "Albany Established"
 sb_cape.203.d:0 "Albany now stands as a separate colony. Frontier offices are being organized, militia service regularized, and fresh migration is already being drawn toward Grahamstown and the border districts."
 sb_cape.203.f:0 "What had begun as grievance was now office, tax roll, and militia list."
 sb_cape.203.a:0 "Albany stands."
 sb_cape.111.t:0 "Convicts at the Cape"
 sb_cape.111.d:0 "London proposes to make the Cape a destination for transported convicts. To many in the colony this is not policy but insult, proof that the Cape is still treated as a receptacle for imperial burdens rather than a political community."
 sb_cape.111.f:0 "The insult cut deeper than the policy. The Cape would not accept the character of a gaol."
 sb_cape.111.a:0 "If London insists, we shall receive them."
 sb_cape.111.b:0 "The Cape is no gaol."
 sb_cape.120.t:0 "The Liberal Petition"
 sb_cape.120.d:0 "The Cape liberals insist that sentiment is no longer enough. If a broader civic order is to endure, [GetLawType('law_cultural_exclusion').GetName] must be carried into law before frontier alarm hardens into settlement."
 sb_cape.120.f:0 "Principle, the liberals said, must be written into statute before the frontier wrote over it."
 sb_cape.120.a:0 "Pass [GetLawType('law_cultural_exclusion').GetName]."
 sb_cape.120.b:0 "Let them petition."
 sb_cape.121.t:0 "Godlonton's Demand"
 sb_cape.121.d:0 "Robert Godlonton warns that the eastern frontier is once again being asked to wait upon Cape Town's scruples. If the ministry means to preserve eastern loyalty, it must commit itself to [GetLawType('law_frontier_colonization').GetName]."
 sb_cape.121.f:0 "The east, Godlonton insisted, did not endure war and alarm merely to be lectured again by Cape Town."
 sb_cape.121.a:0 "Pass [GetLawType('law_frontier_colonization').GetName]."
 sb_cape.121.b:0 "Refuse the petition."
 sb_cape.122.t:0 "The Eastern Demand"
 sb_cape.122.d:0 "The settler interest in the eastern districts now demands more than sympathetic words. If the ministry means to govern the whole colony, it must commit itself to [GetLawType('law_frontier_colonization').GetName]."
 sb_cape.122.f:0 "If the frontier is to remain loyal, the law must show it has not been forgotten."
 sb_cape.122.a:0 "Pass [GetLawType('law_frontier_colonization').GetName]."
 sb_cape.122.b:0 "Refuse their demand."
 sb_cape.123.t:0 "The Liberals Demand Settlement"
 sb_cape.123.d:0 "The Cape Liberal Movement now argues that the colony cannot drift indefinitely between constitutional language and constitutional law. If [GetLawType('law_cultural_exclusion').GetName] is not carried soon, they warn, the question of the franchise will return in a far harsher mood."
 sb_cape.123.f:0 "A ministry that promised settlement but delivered delay, the liberals said, could not expect patience forever."
 sb_cape.123.a:0 "We are bound to carry it."
 sb_cape.123.a.tt:0 "If [GetLawType('law_cultural_exclusion').GetName] has not been passed within #v 2 years#!, the Cape Liberal Movement will gain #v 50%#! [concept_activism]."
 sb_cape.123.b:0 "Then let them agitate."
 sb_cape.124.t:0 "The Frontier Demands Settlement"
 sb_cape.124.d:0 "The eastern bloc now insists that the ministry either write frontier policy into law or stop pretending the question remains under control. If [GetLawType('law_frontier_colonization').GetName] is delayed again, they warn, eastern patience will harden into agitation."
 sb_cape.124.f:0 "The frontier had listened long enough. It now demanded statute where once it had accepted speeches."
 sb_cape.124.a:0 "We are bound to carry it."
 sb_cape.124.a.tt:0 "If [GetLawType('law_frontier_colonization').GetName] has not been passed within #v 2 years#!, the Eastern Cape Separatist League will gain #v 50%#! [concept_activism]."
 sb_cape.124.b:0 "Then let them agitate."
 sb_cape.204.t:0 "The Colonial Office Presses"
 sb_cape.204.d:0 "The Colonial Office now treats the Cape frontier as an imperial priority. With Britain pressing a harder colonial policy, Cape Town is being urged to put [GetLawType('law_frontier_colonization').GetName] into law."
 sb_cape.204.f:0 "If the Empire must bear the frontier, men in London said, then the colony must first give it the force of law."
 sb_cape.204.a:0 "Pass [GetLawType('law_frontier_colonization').GetName]."
 sb_cape.204.b:0 "We will not be hurried."
