l_english:
 sb_cape.001.t:0 "The Cape in Question"
 sb_cape.001.d:0 "The Sixth Xhosa War has ended, yet the eastern frontier is settled only in name. In Cape Town, liberals speak of law, franchise, and a more distinctly Cape constitutional order. In the east, settlers demand a harder frontier, faster expansion, and a ministry that treats their grievances as the colony's first duty. The colony cannot long serve both visions."
 sb_cape.001.f:0 "The guns had fallen quiet, but no one on the frontier mistook the silence for peace. The question before the colony had merely changed from war to government."
 sb_cape.001.a:0 "The question must be settled."
 sb_cape.100.t:0 "Liberal Ascendancy"
 sb_cape.100.d:0 "The liberals have prevailed and their constitutional settlement now governs the Cape. With Cultural Exclusion in force, the colony may widen acceptance without wholly abandoning hierarchy. The Griqua are drawn more firmly into the political nation, and the Cape's reputation for guarded openness begins to attract migrants, missionaries, and merchants alike."
 sb_cape.100.d_albany:0 "The liberals have prevailed, though only after the eastern frontier tore itself away from Cape Town. London has sanctioned Albany as a separate colony, cutting the old settler bloc out of Cape politics. What remains may now entrench the Cape Qualified Franchise, draw the Griqua more fully into the political nation, and pursue a more distinctly Cape constitutional order."
 sb_cape.100.d_after_secession:0 "The eastern challenge has been broken, though not before it drove the colony into open rupture. London refused partition, the separatists spent their fury without overturning Cape Town, and the liberals may now consolidate their constitutional order and claim that the Cape has survived its gravest internal test."
 sb_cape.100.f:0 "The men of Cape Town speak now as if the colony has chosen civilization over coercion. Whether the frontier accepts the verdict is another matter."
 sb_cape.100.f_albany:0 "The east has been lost, yet the ministry consoles itself with a harder claim: that principle, at least, has been kept."
 sb_cape.100.f_after_secession:0 "They rose against the law and were spent by it. That was the judgment of Cape Town, and for the moment it stood."
 sb_cape.100.a:0 "So stands the Cape."
 sb_cape.101.t:0 "Triumph of the Frontier"
 sb_cape.101.d:0 "The eastern settlers have carried the day, and this time they have done so in law as well as agitation. Cape Town's liberals have lost command of the colony's direction. Boer settlers are folded into the accepted political nation, colonial expansion becomes a standing duty of government, and the Eastern Cape Separatist League stands down with the substance of its demands in hand."
 sb_cape.101.f:0 "The men of the eastern districts had long claimed that they bore the dangers of the colony while Cape Town claimed the honors. Now they say the government has at last been made to remember it."
 sb_cape.101.a:0 "Then let the frontier lead."
 sb_cape.102.t:0 "A Cape Compromise"
 sb_cape.102.d:0 "Neither liberals nor settlers have mastered the whole colony. Instead, the ministry closes the question through a guarded compromise: the constitutional order is preserved, colonial policy remains in law, and enough voters are reassured that the colony may still be governed. Neither party is satisfied, but neither has been broken."
 sb_cape.102.f:0 "There would be no triumphal settlement, only a serviceable one. In the Cape, that was often the nearest thing to peace available."
 sb_cape.102.a:0 "Then let compromise suffice."
 sb_cape.130.t:0 "The Franchise Principle"
 sb_cape.130.d:0 "The ministry debates Cultural Exclusion, but the Cape Liberal Movement insists that the old qualified franchise must be written into the settlement itself. They will accept a compromise of property and literacy, but not one that abandons the principle altogether."
 sb_cape.130.f:0 "The liberals warn that a constitution which forgets its own franchise teaches the colony what every Cape promise is worth."
 sb_cape.130.a:0 "Accept it."
 sb_cape.130.b:0 "We will not be bound."
 sb_cape.103.t:0 "The Albany Secession"
 sb_cape.103.d:0 "The eastern settlers now judge coexistence with Cape Town impossible. Their committees are armed, their newspapers speak openly of separation, and an ultimatum has been sent to London demanding recognition of a separate colony in the east. The constitutional struggle within the Cape has given way to an imperial question."
 sb_cape.103.f:0 "What the east now sought was not merely resistance to Cape Town, but release from it. The colony would remain one only if London chose to keep it so."
 sb_cape.103.a:0 "Then we must await London."
 sb_cape.104.t:0 "An Unsettled Colony"
 sb_cape.104.d:0 "The Cape question has been fought for decades in ministries, newspapers, mission stations, and on the eastern frontier, yet no lasting settlement has taken hold. The argument has hardened into grievance and habit. What the colony has found is not resolution, but exhaustion."
 sb_cape.104.f:0 "Questions left unanswered do not die in the Cape. They sour, harden, and return in a harsher form than before."
 sb_cape.104.a:0 "So the bitterness remains."
 sb_cape.020.t:0 "Responsible Government"
 sb_cape.020.d:0 "London has granted the Cape responsible government. The colony remains within the Empire and keeps its ordinary obligations, but domestic political authority now rests far more firmly in Cape hands. Ministries answer to a local parliamentary order, and the Cape may begin to act with a colonial autonomy more substantial than that of an ordinary Crown colony."
 sb_cape.020.f:0 "The Queen's name remained upon the law, but the colony would now be governed by a ministry that had to answer first to the Cape itself."
 sb_cape.020.a:0 "A new order begins."
 sb_cape.200.t:0 "Albany Before the Crown"
 sb_cape.200.d:0 "The Cape crisis has entered a new stage. After a full settler rising in the Eastern Cape, Cape Town reports that the separatist committees now demand direct recognition from London as a separate Colony of Albany. The ministry can no longer contain the question by constitutional means alone.\n\nIf we accept, we preserve imperial authority and deny the separatists a full break with the Crown, but we also concede that the Cape can no longer be governed as a single political body. If we refuse, we keep the colony formally whole and force Cape Town to crush the eastern revolt without imperial partition."
 sb_cape.200.f:0 "To some in London the answer seemed obvious: if the frontier required a different government, then let it be given one under the Crown. To others, partition was merely surrender in cleaner dress."
 sb_cape.200.a:0 "Create Albany."
 sb_cape.200.b:0 "Keep the Cape whole."
 sb_cape.201.t:0 "Albany Sanctioned"
 sb_cape.201.d:0 "London has sanctioned Albany, and the eastern districts have been detached from Cape Town under direct imperial authority. What was once a separatist agitation now stands as a colony of its own."
 sb_cape.201.f:0 "A line drawn upon the map had become an act of government. The eastern grievance was now an imperial administration."
 sb_cape.201.a:0 "Albany is sanctioned."
 sb_cape.201.b:0 "Take command of Albany."
 sb_cape.202.t:0 "Separation Refused"
 sb_cape.202.d:0 "London has refused the eastern ultimatum. The settlers are furious and now claim to have been abandoned by both Cape Town and the imperial government. The constitutional question may be closed, but the frontier crisis is not."
 sb_cape.202.f:0 "If London would not divide the colony for them, then the east would have to discover what remedies remained to it by other means."
 sb_cape.202.a:0 "Then the crisis deepens."
 sb_cape.203.t:0 "Albany Established"
 sb_cape.203.d:0 "Albany now stands as a separate colony, and the eastern settler cause has been translated into a government of its own. Frontier offices are being organized, militia service is being regularized, and fresh migration is already being drawn toward Grahamstown and the border districts."
 sb_cape.203.f:0 "What had begun as a grievance was now office, tax roll, and militia list. The frontier had found a government shaped in its own image."
 sb_cape.203.a:0 "Albany stands."
 sb_cape.111.t:0 "Convicts at the Cape"
 sb_cape.111.d:0 "The imperial government proposes to make the Cape a destination for transported convicts. To officials in London this is an administrative convenience; to many in the colony it is a public insult. The frontier interest mutters that labor is labor, but Cape liberals denounce the scheme as proof that the colony is still treated as a receptacle for imperial burdens rather than a political community."
 sb_cape.111.f:0 "The insult cut more deeply than the policy itself. The Cape might be a colony, but it would not willingly accept the character of a gaol."
 sb_cape.111.a:0 "If London insists, we shall receive them."
 sb_cape.111.b:0 "The Cape is no gaol."
 sb_cape.120.t:0 "The Liberal Petition"
 sb_cape.120.d:0 "The Cape liberals now insist that sentiment is no longer enough. If Cape Town truly means to preserve a wider civic order, it must carry [GetLawType('law_cultural_exclusion').GetName] into law before frontier alarm hardens into the colony's permanent settlement."
 sb_cape.120.f:0 "Principle, the liberals say, must be written into statute before the frontier has the chance to write over it."
 sb_cape.120.a:0 "Commit to [GetLawType('law_cultural_exclusion').GetName]."
 sb_cape.120.b:0 "Let them petition."
 sb_cape.121.t:0 "Godlonton's Demand"
 sb_cape.121.d:0 "Robert Godlonton warns that the eastern frontier is once more being asked to wait upon Cape Town's scruples. If the government wishes to preserve the loyalty of the eastern districts, it must commit itself to [GetLawType('law_frontier_colonization').GetName] and show that liberal ascendancy will not come at the frontier's expense."
 sb_cape.121.f:0 "The east, Godlonton insists, did not endure war and alarm merely to be lectured once again by Cape Town."
 sb_cape.121.a:0 "Commit to [GetLawType('law_frontier_colonization').GetName]."
 sb_cape.121.b:0 "Refuse the petition."
 sb_cape.122.t:0 "The Eastern Demand"
 sb_cape.122.d:0 "The settler interest in the eastern districts now demands more than sympathetic words. If the ministry means to govern the whole colony rather than merely its western constituencies, it must commit itself to [GetLawType('law_frontier_colonization').GetName] and prove that frontier security still carries weight in law as well as debate."
 sb_cape.122.f:0 "If the frontier is to remain loyal, say the eastern settlers, then the law must show that the frontier has not been forgotten."
 sb_cape.122.a:0 "Commit to [GetLawType('law_frontier_colonization').GetName]."
 sb_cape.122.b:0 "Refuse their demand."
 sb_cape.204.t:0 "The Colonial Office Presses"
 sb_cape.204.d:0 "The Colonial Office now treats the Cape frontier as an imperial priority. With Britain committed to a more assertive colonial program, Cape Town is being pressed to place [GetLawType('law_frontier_colonization').GetName] before the ministry rather than leave expansion to local agitation and petition."
 sb_cape.204.f:0 "If the Empire must bear the burden of the frontier, say men in London, then the colony must first give that burden the force of law."
 sb_cape.204.a:0 "Commit to [GetLawType('law_frontier_colonization').GetName]."
 sb_cape.204.b:0 "We will not be hurried."
